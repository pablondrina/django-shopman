repos:
  - repo: local
    hooks:
      - id: lint-omotenashi-copy
        name: Omotenashi copy lint (warning mode)
        language: python
        entry: python scripts/lint_omotenashi_copy.py
        types: [html]
        pass_filenames: false
        # Remove --error flag after 2 sprints to switch to error mode
      - id: unfold-canonical-gate
        name: Unfold canonical Admin gate
        language: system
        entry: make admin
        pass_filenames: false
