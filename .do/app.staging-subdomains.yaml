# DigitalOcean App Platform — Fase 1 (headless) em STAGING por SUBDOMÍNIOS.
#
# Valida o modelo cross-domain com pagamentos MOCK antes de virar produção.
# Ramo de teste sob `staging.nelsonboulangerie.com.br` (zona nelsonboulangerie.com.br):
#   staging.nelsonboulangerie.com.br        → thing-storefront (loja Nuxt em /)
#   api.staging.nelsonboulangerie.com.br    → web (Django headless: /api, webhooks)
#   admin.staging.nelsonboulangerie.com.br  → web (Django admin/operador)
#   pos.staging.nelsonboulangerie.com.br    → pos-uithing (PDV Nuxt em /)
#
# DEPLOY:
#   1. DNS na zona nelsonboulangerie.com.br: apontar `staging`, `api.staging`,
#      `admin.staging`, `pos.staging` para o app (a App Platform mostra o alvo CNAME
#      ao adicionar cada domínio; ou use um wildcard `*.staging`).
#   2. doctl apps update <STAGING_APP_ID> --spec .do/app.staging-subdomains.yaml
#      (atualiza o app `shopman-staging` existente — reusa o mesmo Postgres/Valkey;
#       NÃO recria banco). Para um app novo: doctl apps create --spec ...
#   3. Secrets (ManyChat etc.) seguem como variáveis ENCRIPTADAS no painel.
#
# Promoção p/ PRODUÇÃO depois: ver `.do/app.subdomains.yaml` (template no apex real)
#   + trocar adapters de pagamento mock pelos reais e desligar SHOPMAN_EXPOSE_DEBUG_OTP.
name: shopman-staging
region: nyc

alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED

domains:
  - domain: staging.nelsonboulangerie.com.br
    type: PRIMARY
    zone: nelsonboulangerie.com.br
  - domain: api.staging.nelsonboulangerie.com.br
    type: ALIAS
    zone: nelsonboulangerie.com.br
  - domain: admin.staging.nelsonboulangerie.com.br
    type: ALIAS
    zone: nelsonboulangerie.com.br
  - domain: pos.staging.nelsonboulangerie.com.br
    type: ALIAS
    zone: nelsonboulangerie.com.br

ingress:
  rules:
    - match:
        authority:
          exact: api.staging.nelsonboulangerie.com.br
        path:
          prefix: /
      component:
        name: web
    - match:
        authority:
          exact: admin.staging.nelsonboulangerie.com.br
        path:
          prefix: /
      component:
        name: web
    - match:
        authority:
          exact: pos.staging.nelsonboulangerie.com.br
        path:
          prefix: /
      component:
        name: pos-uithing
    # Catch-all do domínio primário (apex de staging) = a loja.
    - match:
        path:
          prefix: /
      component:
        name: thing-storefront

envs:
  - key: DJANGO_SETTINGS_MODULE
    value: config.settings
    scope: RUN_TIME
    type: GENERAL
  - key: DJANGO_DEBUG
    value: "false"
    scope: RUN_TIME
    type: GENERAL
  - key: DJANGO_ALLOWED_HOSTS
    value: "api.staging.nelsonboulangerie.com.br,admin.staging.nelsonboulangerie.com.br"
    scope: RUN_TIME
    type: GENERAL
  - key: CSRF_TRUSTED_ORIGINS
    value: "https://api.staging.nelsonboulangerie.com.br,https://admin.staging.nelsonboulangerie.com.br"
    scope: RUN_TIME
    type: GENERAL
  - key: DJANGO_TRUST_X_FORWARDED_PROTO
    value: "true"
    scope: RUN_TIME
    type: GENERAL
  - key: DJANGO_SECURE_SSL_REDIRECT
    value: "true"
    scope: RUN_TIME
    type: GENERAL
  # FONTE ÚNICA dos links de cliente = o apex (a loja).
  - key: SHOPMAN_STOREFRONT_BASE_URL
    value: "https://staging.nelsonboulangerie.com.br"
    scope: RUN_TIME
    type: GENERAL
  - key: SHOPMAN_DOMAIN
    value: "https://staging.nelsonboulangerie.com.br"
    scope: RUN_TIME
    type: GENERAL
  - key: AUTH_DEFAULT_DOMAIN
    value: "staging.nelsonboulangerie.com.br"
    scope: RUN_TIME
    type: GENERAL
  - key: WHATSAPP_STOREFRONT_URL
    value: "https://staging.nelsonboulangerie.com.br"
    scope: RUN_TIME
    type: GENERAL
  - key: DOORMAN_MESSAGE_SENDER_CLASS
    value: shopman.doorman.senders.LogSender
    scope: RUN_TIME
    type: GENERAL
  - key: DATABASE_URL
    value: "${postgres.shopman-staging-pool.DATABASE_URL}"
    scope: RUN_TIME
    type: GENERAL
  - key: DATABASE_CONN_MAX_AGE
    value: "60"
    scope: RUN_TIME
    type: GENERAL
  - key: DATABASE_DISABLE_SERVER_SIDE_CURSORS
    value: "true"
    scope: RUN_TIME
    type: GENERAL
  - key: REDIS_URL
    value: "${cache.REDIS_URL}"
    scope: RUN_TIME
    type: GENERAL
  - key: SHOPMAN_PIX_ADAPTER
    value: shopman.shop.adapters.payment_mock
    scope: RUN_TIME
    type: GENERAL
  - key: SHOPMAN_CARD_ADAPTER
    value: shopman.shop.adapters.payment_mock
    scope: RUN_TIME
    type: GENERAL
  - key: SHOPMAN_ALLOW_MOCK_PAYMENT_ADAPTERS
    value: "true"
    scope: RUN_TIME
    type: GENERAL
  - key: SHOPMAN_MOCK_PIX_AUTO_CONFIRM
    value: "true"
    scope: RUN_TIME
    type: GENERAL
  - key: SHOPMAN_MOCK_PIX_CONFIRM_DELAY_SECONDS
    value: "8"
    scope: RUN_TIME
    type: GENERAL
  - key: EFI_SANDBOX
    value: "true"
    scope: RUN_TIME
    type: GENERAL
  - key: STRIPE_CAPTURE_METHOD
    value: manual
    scope: RUN_TIME
    type: GENERAL
  - key: SHOPMAN_JSON_LOGS
    value: "true"
    scope: RUN_TIME
    type: GENERAL
  - key: SHOPMAN_CART_MUTATION_PERF_LOG_MS
    value: "250"
    scope: RUN_TIME
    type: GENERAL
  - key: SHOPMAN_ENVIRONMENT
    value: staging
    scope: RUN_TIME
    type: GENERAL
  - key: SHOPMAN_EXPOSE_DEBUG_OTP
    value: "true"
    scope: RUN_TIME
    type: GENERAL

services:
  - name: web
    git:
      repo_clone_url: https://github.com/pablondrina/django-shopman.git
      branch: main
    dockerfile_path: Dockerfile
    source_dir: /
    run_command: daphne -b 0.0.0.0 -p 8000 config.asgi:application
    http_port: 8000
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-1gb
    health_check:
      http_path: /ready/
      initial_delay_seconds: 30
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 5
    liveness_health_check:
      http_path: /health/
      initial_delay_seconds: 30
      period_seconds: 30
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3
    alerts:
      - rule: CPU_UTILIZATION
        operator: GREATER_THAN
        value: 80
        window: FIVE_MINUTES
      - rule: MEM_UTILIZATION
        operator: GREATER_THAN
        value: 85
        window: FIVE_MINUTES
      - rule: RESTART_COUNT
        operator: GREATER_THAN
        value: 2
        window: TEN_MINUTES
  - name: thing-storefront
    git:
      repo_clone_url: https://github.com/pablondrina/django-shopman.git
      branch: main
    source_dir: /surfaces/storefront-uithing-nuxt
    build_command: npm ci && npm run build
    run_command: node .output/server/index.mjs
    http_port: 3000
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    envs:
      - key: NUXT_DJANGO_BASE_URL
        value: "https://api.staging.nelsonboulangerie.com.br"
        scope: RUN_TIME
        type: GENERAL
      - key: NUXT_APP_BASE_URL
        value: /
        scope: RUN_TIME
        type: GENERAL
    health_check:
      http_path: /menu
      initial_delay_seconds: 30
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 5
    alerts:
      - rule: RESTART_COUNT
        operator: GREATER_THAN
        value: 2
        window: TEN_MINUTES
  - name: pos-uithing
    git:
      repo_clone_url: https://github.com/pablondrina/django-shopman.git
      branch: main
    source_dir: /surfaces/pos-uithing-nuxt
    build_command: npm ci && npm run build
    run_command: node .output/server/index.mjs
    http_port: 3000
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    envs:
      - key: NUXT_DJANGO_BASE_URL
        value: "https://api.staging.nelsonboulangerie.com.br"
        scope: RUN_TIME
        type: GENERAL
      - key: NUXT_APP_BASE_URL
        value: /
        scope: RUN_TIME
        type: GENERAL
    health_check:
      http_path: /
      initial_delay_seconds: 30
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 5
    alerts:
      - rule: RESTART_COUNT
        operator: GREATER_THAN
        value: 2
        window: TEN_MINUTES

workers:
  - name: directive-worker
    git:
      repo_clone_url: https://github.com/pablondrina/django-shopman.git
      branch: main
    dockerfile_path: Dockerfile
    source_dir: /
    run_command: python manage.py process_directives --watch
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    alerts:
      - rule: RESTART_COUNT
        operator: GREATER_THAN
        value: 2
        window: TEN_MINUTES

jobs:
  - name: release
    kind: PRE_DEPLOY
    git:
      repo_clone_url: https://github.com/pablondrina/django-shopman.git
      branch: main
    dockerfile_path: Dockerfile
    source_dir: /
    run_command: sh -c 'python manage.py check --deploy && python manage.py migrate --noinput'
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb

databases:
  - name: postgres
    engine: PG
    version: "16"
    production: true
    cluster_name: shopman-staging-postgres
    db_name: shopman
    db_user: shopman
  - name: cache
    engine: VALKEY
    version: "8"
    production: true
    cluster_name: shopman-staging-cache
