# DigitalOcean App Platform — Fase 1 (headless) em STAGING por SUBDOMÍNIOS.
#
# Valida o modelo cross-domain com pagamentos MOCK antes de virar produção.
# Ramo de teste sob `staging.nelsonboulangerie.com.br` (zona nelsonboulangerie.com.br):
#   staging.nelsonboulangerie.com.br        → storefront-nuxt (loja Nuxt em /)
#   api.staging.nelsonboulangerie.com.br    → web (Django headless: /api, webhooks)
#   admin.staging.nelsonboulangerie.com.br  → web (Django admin/operador)
#   pos.staging.nelsonboulangerie.com.br    → pos-nuxt (PDV Nuxt em /)
#
# DEPLOY (valores concretos do app de staging atual):
#   APP_ID = 40b86e35-bafe-4a1a-a1b0-e124d3d9fd0f   (app `shopman-staging`)
#
#   DNS = AUTOMÁTICO. A zona nelsonboulangerie.com.br já está na DigitalOcean
#   (nameservers ns1/ns2/ns3.digitalocean.com), na MESMA conta do app. Como cada
#   domínio abaixo declara `zone: nelsonboulangerie.com.br`, a App Platform CRIA os
#   registros (staging/api.staging/admin.staging/pos.staging) e os certificados TLS
#   sozinha no deploy. NÃO crie CNAME manualmente (causaria conflito).
#
#   Único passo:
#     doctl apps update 40b86e35-bafe-4a1a-a1b0-e124d3d9fd0f \
#       --spec .do/app.staging-subdomains.yaml --context shopman-staging-write
#     (atualiza o app existente — reusa o mesmo Postgres/Valkey; NÃO recria banco;
#      pode levar alguns minutos p/ provisionar domínios + certs.)
#   Secrets (ManyChat etc.) seguem como variáveis ENCRIPTADAS no painel.
#
# ⚠️ Esta atualização troca o staging atual (path-routed: loja em /thing) pela
#    topologia por subdomínios. Faça quando puder validar logo em seguida.
#
# Promoção p/ PRODUÇÃO depois: ver `.do/app.subdomains.yaml` (template no apex real)
#   + trocar adapters de pagamento mock pelos reais e desligar SHOPMAN_EXPOSE_DEBUG_OTP.
name: shopman-staging
region: nyc

alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED

domains:
  # Loja (cliente) no domínio de staging; operadores nos subdomínios de
  # boulangerie.com.br (cross-subdomain auth via cookie .boulangerie.com.br).
  - domain: staging.nelsonboulangerie.com.br
    type: PRIMARY
    zone: nelsonboulangerie.com.br
  - domain: api.staging.nelsonboulangerie.com.br
    type: ALIAS
    zone: nelsonboulangerie.com.br
  - domain: admin.staging.nelsonboulangerie.com.br
    type: ALIAS
    zone: nelsonboulangerie.com.br
  - domain: gestor.boulangerie.com.br
    type: ALIAS
    zone: boulangerie.com.br
  - domain: kds.boulangerie.com.br
    type: ALIAS
    zone: boulangerie.com.br
  - domain: pdv.boulangerie.com.br
    type: ALIAS
    zone: boulangerie.com.br
  - domain: prod.boulangerie.com.br
    type: ALIAS
    zone: boulangerie.com.br
  - domain: central.boulangerie.com.br
    type: ALIAS
    zone: boulangerie.com.br
  - domain: api.boulangerie.com.br
    type: ALIAS
    zone: boulangerie.com.br

ingress:
  rules:
    - match:
        authority:
          exact: api.staging.nelsonboulangerie.com.br
        path:
          prefix: /
      component:
        name: web
    - match:
        authority:
          exact: admin.staging.nelsonboulangerie.com.br
        path:
          prefix: /
      component:
        name: web
    - match:
        authority:
          exact: api.boulangerie.com.br
        path:
          prefix: /
      component:
        name: web
    - match:
        authority:
          exact: gestor.boulangerie.com.br
        path:
          prefix: /
      component:
        name: orders-nuxt
    - match:
        authority:
          exact: kds.boulangerie.com.br
        path:
          prefix: /
      component:
        name: kds-nuxt
    - match:
        authority:
          exact: pdv.boulangerie.com.br
        path:
          prefix: /
      component:
        name: pos-nuxt
    - match:
        authority:
          exact: prod.boulangerie.com.br
        path:
          prefix: /
      component:
        name: production-nuxt
    - match:
        authority:
          exact: central.boulangerie.com.br
        path:
          prefix: /
      component:
        name: hub-nuxt
    # Catch-all do domínio primário (apex de staging) = a loja.
    - match:
        path:
          prefix: /
      component:
        name: storefront-nuxt

envs:
  - key: DJANGO_SETTINGS_MODULE
    value: config.settings
    scope: RUN_TIME
    type: GENERAL
  - key: DJANGO_DEBUG
    value: "false"
    scope: RUN_TIME
    type: GENERAL
  - key: DJANGO_ALLOWED_HOSTS
    value: "api.staging.nelsonboulangerie.com.br,admin.staging.nelsonboulangerie.com.br,api.boulangerie.com.br"
    scope: RUN_TIME
    type: GENERAL
  - key: CSRF_TRUSTED_ORIGINS
    value: "https://api.staging.nelsonboulangerie.com.br,https://admin.staging.nelsonboulangerie.com.br,https://api.boulangerie.com.br,https://gestor.boulangerie.com.br,https://kds.boulangerie.com.br,https://pdv.boulangerie.com.br,https://prod.boulangerie.com.br"
    scope: RUN_TIME
    type: GENERAL
  - key: DJANGO_TRUST_X_FORWARDED_PROTO
    value: "true"
    scope: RUN_TIME
    type: GENERAL
  - key: DJANGO_SECURE_SSL_REDIRECT
    value: "true"
    scope: RUN_TIME
    type: GENERAL
  # FONTE ÚNICA dos links de cliente = o apex (a loja).
  - key: SHOPMAN_STOREFRONT_BASE_URL
    value: "https://staging.nelsonboulangerie.com.br"
    scope: RUN_TIME
    type: GENERAL
  - key: SHOPMAN_DOMAIN
    value: "https://staging.nelsonboulangerie.com.br"
    scope: RUN_TIME
    type: GENERAL
  - key: AUTH_DEFAULT_DOMAIN
    value: "staging.nelsonboulangerie.com.br"
    scope: RUN_TIME
    type: GENERAL
  # Superfícies de operador (subdomínios .boulangerie.com.br) — cookie de sessão
  # compartilhado no domínio-pai, host da API e origens dos apps Nuxt.
  - key: SHOPMAN_OPERATOR_API_HOST
    value: "api.boulangerie.com.br"
    scope: RUN_TIME
    type: GENERAL
  - key: SHOPMAN_OPERATOR_COOKIE_DOMAIN
    value: ".boulangerie.com.br"
    scope: RUN_TIME
    type: GENERAL
  - key: SHOPMAN_REQUIRE_ACTIVE_OPERATOR
    value: "true"
    scope: RUN_TIME
    type: GENERAL
  - key: SHOPMAN_ORDERS_BASE_URL
    value: "https://gestor.boulangerie.com.br"
    scope: RUN_TIME
    type: GENERAL
  - key: SHOPMAN_KDS_BASE_URL
    value: "https://kds.boulangerie.com.br"
    scope: RUN_TIME
    type: GENERAL
  - key: SHOPMAN_POS_BASE_URL
    value: "https://pdv.boulangerie.com.br"
    scope: RUN_TIME
    type: GENERAL
  - key: SHOPMAN_PRODUCTION_BASE_URL
    value: "https://prod.boulangerie.com.br"
    scope: RUN_TIME
    type: GENERAL
  - key: WHATSAPP_STOREFRONT_URL
    value: "https://staging.nelsonboulangerie.com.br"
    scope: RUN_TIME
    type: GENERAL
  - key: DOORMAN_MESSAGE_SENDER_CLASS
    value: shopman.doorman.senders.LogSender
    scope: RUN_TIME
    type: GENERAL
  - key: DATABASE_URL
    value: "${postgres.shopman-staging-pool.DATABASE_URL}"
    scope: RUN_TIME
    type: GENERAL
  - key: DATABASE_CONN_MAX_AGE
    value: "60"
    scope: RUN_TIME
    type: GENERAL
  - key: DATABASE_DISABLE_SERVER_SIDE_CURSORS
    value: "true"
    scope: RUN_TIME
    type: GENERAL
  - key: REDIS_URL
    value: "${cache.REDIS_URL}"
    scope: RUN_TIME
    type: GENERAL
  - key: SHOPMAN_PIX_ADAPTER
    value: shopman.shop.adapters.payment_mock
    scope: RUN_TIME
    type: GENERAL
  - key: SHOPMAN_CARD_ADAPTER
    value: shopman.shop.adapters.payment_mock
    scope: RUN_TIME
    type: GENERAL
  - key: SHOPMAN_ALLOW_MOCK_PAYMENT_ADAPTERS
    value: "true"
    scope: RUN_TIME
    type: GENERAL
  - key: SHOPMAN_MOCK_PIX_AUTO_CONFIRM
    value: "true"
    scope: RUN_TIME
    type: GENERAL
  - key: SHOPMAN_MOCK_PIX_CONFIRM_DELAY_SECONDS
    value: "8"
    scope: RUN_TIME
    type: GENERAL
  - key: EFI_SANDBOX
    value: "true"
    scope: RUN_TIME
    type: GENERAL
  # Fiscal (NFC-e) — resolver replicado do .env local (composição em OR: emite se o
  # operador pediu/CPF na nota OU o pagamento foi eletrônico). SHOPMAN_FISCAL_ADAPTER
  # segue SEM valor aqui de propósito — sem adapter, fiscal.emit() é no-op e o resolver
  # não roda ainda. Ligar o adapter (+ FOCUS_NFE_TOKEN/CNPJ) é decisão separada do Pablo.
  - key: SHOPMAN_FISCAL_EMISSION_RESOLVER
    value: "shopman.shop.fiscal_resolvers.on_request_or_tax_id,shopman.shop.fiscal_resolvers.eletronic_payment"
    scope: RUN_TIME
    type: GENERAL
  - key: STRIPE_CAPTURE_METHOD
    value: manual
    scope: RUN_TIME
    type: GENERAL
  - key: SHOPMAN_JSON_LOGS
    value: "true"
    scope: RUN_TIME
    type: GENERAL
  - key: SHOPMAN_CART_MUTATION_PERF_LOG_MS
    value: "250"
    scope: RUN_TIME
    type: GENERAL
  - key: SHOPMAN_ENVIRONMENT
    value: staging
    scope: RUN_TIME
    type: GENERAL
  - key: SHOPMAN_EXPOSE_DEBUG_OTP
    value: "true"
    scope: RUN_TIME
    type: GENERAL

services:
  - name: web
    git:
      repo_clone_url: https://github.com/pablondrina/django-shopman.git
      branch: main
    dockerfile_path: Dockerfile
    source_dir: /
    run_command: daphne -b 0.0.0.0 -p 8000 config.asgi:application
    http_port: 8000
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-1gb
    health_check:
      http_path: /ready/
      initial_delay_seconds: 30
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 5
    liveness_health_check:
      http_path: /health/
      initial_delay_seconds: 30
      period_seconds: 30
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3
    alerts:
      - rule: CPU_UTILIZATION
        operator: GREATER_THAN
        value: 80
        window: FIVE_MINUTES
      - rule: MEM_UTILIZATION
        operator: GREATER_THAN
        value: 85
        window: FIVE_MINUTES
      - rule: RESTART_COUNT
        operator: GREATER_THAN
        value: 2
        window: TEN_MINUTES
  - name: storefront-nuxt
    git:
      repo_clone_url: https://github.com/pablondrina/django-shopman.git
      branch: main
    source_dir: /surfaces/storefront-nuxt
    build_command: npm ci && npm run build
    run_command: node .output/server/index.mjs
    http_port: 3000
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    envs:
      - key: NUXT_DJANGO_BASE_URL
        value: "https://api.staging.nelsonboulangerie.com.br"
        scope: RUN_TIME
        type: GENERAL
      - key: NUXT_APP_BASE_URL
        value: /
        scope: RUN_TIME
        type: GENERAL
    health_check:
      http_path: /menu
      initial_delay_seconds: 30
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 5
    alerts:
      - rule: RESTART_COUNT
        operator: GREATER_THAN
        value: 2
        window: TEN_MINUTES
  # Superfícies de operador (Nuxt). Ficam em *.boulangerie.com.br e apontam
  # para a API em api.boulangerie.com.br (SHOPMAN_OPERATOR_API_HOST).
  - name: pos-nuxt
    git:
      repo_clone_url: https://github.com/pablondrina/django-shopman.git
      branch: main
    source_dir: /surfaces/pos-nuxt
    build_command: npm ci && npm run build
    run_command: node .output/server/index.mjs
    http_port: 3000
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    envs:
      - key: NUXT_DJANGO_BASE_URL
        value: "https://api.boulangerie.com.br"
        scope: RUN_TIME
        type: GENERAL
      - key: NUXT_APP_BASE_URL
        value: /
        scope: RUN_TIME
        type: GENERAL
      - key: NUXT_PUBLIC_DJANGO_BASE_URL
        value: "https://api.boulangerie.com.br"
        scope: RUN_AND_BUILD_TIME
        type: GENERAL
    health_check:
      http_path: /
      initial_delay_seconds: 30
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 5
    alerts:
      - rule: RESTART_COUNT
        operator: GREATER_THAN
        value: 2
        window: TEN_MINUTES
  - name: kds-nuxt
    git:
      repo_clone_url: https://github.com/pablondrina/django-shopman.git
      branch: main
    source_dir: /surfaces/kds-nuxt
    build_command: npm ci && npm run build
    run_command: node .output/server/index.mjs
    http_port: 3000
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    envs:
      - key: NUXT_DJANGO_BASE_URL
        value: "https://api.boulangerie.com.br"
        scope: RUN_TIME
        type: GENERAL
      - key: NUXT_APP_BASE_URL
        value: /
        scope: RUN_TIME
        type: GENERAL
      - key: NUXT_PUBLIC_DJANGO_BASE_URL
        value: "https://api.boulangerie.com.br"
        scope: RUN_AND_BUILD_TIME
        type: GENERAL
    health_check:
      http_path: /
      initial_delay_seconds: 30
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 5
    alerts:
      - rule: RESTART_COUNT
        operator: GREATER_THAN
        value: 2
        window: TEN_MINUTES
  - name: orders-nuxt
    git:
      repo_clone_url: https://github.com/pablondrina/django-shopman.git
      branch: main
    source_dir: /surfaces/orders-nuxt
    build_command: npm ci && npm run build
    run_command: node .output/server/index.mjs
    http_port: 3000
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    envs:
      - key: NUXT_DJANGO_BASE_URL
        value: "https://api.boulangerie.com.br"
        scope: RUN_TIME
        type: GENERAL
      - key: NUXT_APP_BASE_URL
        value: /
        scope: RUN_TIME
        type: GENERAL
      - key: NUXT_PUBLIC_DJANGO_BASE_URL
        value: "https://api.boulangerie.com.br"
        scope: RUN_AND_BUILD_TIME
        type: GENERAL
    health_check:
      http_path: /
      initial_delay_seconds: 30
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 5
    alerts:
      - rule: RESTART_COUNT
        operator: GREATER_THAN
        value: 2
        window: TEN_MINUTES
  - name: production-nuxt
    git:
      repo_clone_url: https://github.com/pablondrina/django-shopman.git
      branch: main
    source_dir: /surfaces/production-nuxt
    build_command: npm ci && npm run build
    run_command: node .output/server/index.mjs
    http_port: 3000
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    envs:
      - key: NUXT_DJANGO_BASE_URL
        value: "https://api.boulangerie.com.br"
        scope: RUN_TIME
        type: GENERAL
      - key: NUXT_APP_BASE_URL
        value: /
        scope: RUN_TIME
        type: GENERAL
      - key: NUXT_PUBLIC_DJANGO_BASE_URL
        value: "https://api.boulangerie.com.br"
        scope: RUN_AND_BUILD_TIME
        type: GENERAL
    health_check:
      http_path: /
      initial_delay_seconds: 30
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 5
    alerts:
      - rule: RESTART_COUNT
        operator: GREATER_THAN
        value: 2
        window: TEN_MINUTES
  # Central de Apps (central.) — launcher pós-login sobre o operator-kit.
  - name: hub-nuxt
    git:
      repo_clone_url: https://github.com/pablondrina/django-shopman.git
      branch: main
    source_dir: /surfaces/hub-nuxt
    build_command: npm ci && npm run build
    run_command: node .output/server/index.mjs
    http_port: 3000
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    envs:
      - key: NUXT_DJANGO_BASE_URL
        value: "https://api.boulangerie.com.br"
        scope: RUN_TIME
        type: GENERAL
      - key: NUXT_APP_BASE_URL
        value: /
        scope: RUN_TIME
        type: GENERAL
      - key: NUXT_PUBLIC_DJANGO_BASE_URL
        value: "https://api.boulangerie.com.br"
        scope: RUN_AND_BUILD_TIME
        type: GENERAL
    health_check:
      http_path: /
      initial_delay_seconds: 30
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 5
    alerts:
      - rule: RESTART_COUNT
        operator: GREATER_THAN
        value: 2
        window: TEN_MINUTES

workers:
  - name: directive-worker
    git:
      repo_clone_url: https://github.com/pablondrina/django-shopman.git
      branch: main
    dockerfile_path: Dockerfile
    source_dir: /
    run_command: python manage.py process_directives --watch
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    alerts:
      - rule: RESTART_COUNT
        operator: GREATER_THAN
        value: 2
        window: TEN_MINUTES

  - name: maintenance-worker
    git:
      repo_clone_url: https://github.com/pablondrina/django-shopman.git
      branch: main
    dockerfile_path: Dockerfile
    source_dir: /
    run_command: python manage.py maintenance_worker
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    alerts:
      - rule: RESTART_COUNT
        operator: GREATER_THAN
        value: 2
        window: TEN_MINUTES

  # Ingestão de pedidos iFood — polling (método primário na doc do iFood; o
  # webhook /api/webhooks/ifood/ é o canal alternativo). Inerte sem
  # IFOOD_CLIENT_ID/SECRET (só loga "OAuth não configurado" e fica ocioso).
  # Roda ao lado do directive-worker, que entrega os callbacks de status.
  - name: ifood-poll-worker
    git:
      repo_clone_url: https://github.com/pablondrina/django-shopman.git
      branch: main
    dockerfile_path: Dockerfile
    source_dir: /
    run_command: python manage.py ifood_poll --watch --interval 30
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    alerts:
      - rule: RESTART_COUNT
        operator: GREATER_THAN
        value: 2
        window: TEN_MINUTES

jobs:
  - name: release
    kind: PRE_DEPLOY
    git:
      repo_clone_url: https://github.com/pablondrina/django-shopman.git
      branch: main
    dockerfile_path: Dockerfile
    source_dir: /
    run_command: sh -c 'python manage.py check --deploy && python manage.py migrate --noinput'
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb

databases:
  - name: postgres
    engine: PG
    version: "16"
    production: true
    cluster_name: shopman-staging-postgres
    db_name: shopman
    db_user: shopman
  - name: cache
    engine: VALKEY
    version: "8"
    production: true
    cluster_name: shopman-staging-cache
