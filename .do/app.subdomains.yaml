# DigitalOcean App Platform blueprint — Fase 1 do headless: cutover por SUBDOMÍNIOS.
#
# ⚠️ Este é o TEMPLATE de PRODUÇÃO (domínio no apex real). Para validar primeiro em
#    STAGING use o blueprint concreto já pronto: `.do/app.staging-subdomains.yaml`
#    (ramo `staging.nelsonboulangerie.com.br`, pagamentos mock, schema validado).
#
# Topologia (desacoplado por domínio — a loja fica no apex `/`):
#   STORE_DOMAIN            → thing-storefront (loja Nuxt)        [apex, PRIMARY]
#   api.STORE_DOMAIN        → web (Django headless: /api, webhooks, health)
#   admin.STORE_DOMAIN      → web (Django admin/operador)
#   pos.STORE_DOMAIN        → pos-uithing (PDV Nuxt)
#
# COMO USAR:
#   1. Troque TODAS as ocorrências de `STORE_DOMAIN` pelo seu domínio real
#      (ex.: `sed -i '' 's/STORE_DOMAIN/nelson.com.br/g' .do/app.subdomains.yaml`).
#   2. No registrador/zona DNS, aponte o apex + os CNAMEs (api/admin/pos) para o app
#      (o painel da DO mostra os alvos ao adicionar cada domínio).
#   3. `doctl apps update <APP_ID> --spec .do/app.subdomains.yaml` (ou crie um app novo).
#   4. Secrets (DB/Redis/pagamento/ManyChat) entram como variáveis ENCRIPTADAS no painel —
#      NUNCA neste arquivo. Ver docs/guides/deploy-digitalocean.md.
#
# ⚠️ PAGAMENTOS: este blueprint herda os adapters MOCK (verificação). Para PRODUÇÃO,
#    troque SHOPMAN_PIX_ADAPTER/SHOPMAN_CARD_ADAPTER pelos reais e desligue os mocks
#    + SHOPMAN_EXPOSE_DEBUG_OTP. Recomendado: validar o modelo cross-domain em staging
#    (subdomínios) ANTES de virar a produção.
name: shopman-headless
region: nyc

alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED

domains:
  - domain: STORE_DOMAIN
    type: PRIMARY
    zone: STORE_DOMAIN
  - domain: api.STORE_DOMAIN
    type: ALIAS
    zone: STORE_DOMAIN
  - domain: admin.STORE_DOMAIN
    type: ALIAS
    zone: STORE_DOMAIN
  - domain: pos.STORE_DOMAIN
    type: ALIAS
    zone: STORE_DOMAIN

ingress:
  rules:
    # Django headless (API + webhooks + health) — host api.
    - match:
        authority:
          exact: api.STORE_DOMAIN
        path:
          prefix: /
      component:
        name: web
    # Django admin/operador — host admin.
    - match:
        authority:
          exact: admin.STORE_DOMAIN
        path:
          prefix: /
      component:
        name: web
    # PDV Nuxt — host pos.
    - match:
        authority:
          exact: pos.STORE_DOMAIN
        path:
          prefix: /
      component:
        name: pos-uithing
    # Loja Nuxt — apex (em /). Última regra = catch-all do domínio primário.
    - match:
        path:
          prefix: /
      component:
        name: thing-storefront

envs:
  - key: DJANGO_SETTINGS_MODULE
    value: config.settings
    scope: RUN_TIME
    type: GENERAL
  - key: DJANGO_DEBUG
    value: "false"
    scope: RUN_TIME
    type: GENERAL
  # Django só é servido em api./admin. (a loja/PDV falam com ele via BFF/admin direto).
  - key: DJANGO_ALLOWED_HOSTS
    value: "api.STORE_DOMAIN,admin.STORE_DOMAIN"
    scope: RUN_TIME
    type: GENERAL
  # CSRF: o BFF mascara origin=api. (loja/PDV); o admin é acessado direto em admin.
  - key: CSRF_TRUSTED_ORIGINS
    value: "https://api.STORE_DOMAIN,https://admin.STORE_DOMAIN"
    scope: RUN_TIME
    type: GENERAL
  - key: DJANGO_TRUST_X_FORWARDED_PROTO
    value: "true"
    scope: RUN_TIME
    type: GENERAL
  - key: DJANGO_SECURE_SSL_REDIRECT
    value: "true"
    scope: RUN_TIME
    type: GENERAL
  # FONTE ÚNICA dos links de cliente = o apex (a loja). Vira tudo de uma vez.
  - key: SHOPMAN_STOREFRONT_BASE_URL
    value: "https://STORE_DOMAIN"
    scope: RUN_TIME
    type: GENERAL
  - key: SHOPMAN_DOMAIN
    value: "https://STORE_DOMAIN"
    scope: RUN_TIME
    type: GENERAL
  - key: AUTH_DEFAULT_DOMAIN
    value: "STORE_DOMAIN"
    scope: RUN_TIME
    type: GENERAL
  - key: WHATSAPP_STOREFRONT_URL
    value: "https://STORE_DOMAIN"
    scope: RUN_TIME
    type: GENERAL
  - key: DOORMAN_MESSAGE_SENDER_CLASS
    value: shopman.doorman.senders.LogSender
    scope: RUN_TIME
    type: GENERAL
  - key: DATABASE_URL
    value: "${postgres.shopman-headless-pool.DATABASE_URL}"
    scope: RUN_TIME
    type: GENERAL
  - key: DATABASE_CONN_MAX_AGE
    value: "60"
    scope: RUN_TIME
    type: GENERAL
  - key: DATABASE_DISABLE_SERVER_SIDE_CURSORS
    value: "true"
    scope: RUN_TIME
    type: GENERAL
  - key: REDIS_URL
    value: "${cache.REDIS_URL}"
    scope: RUN_TIME
    type: GENERAL
  # ⚠️ MOCK (verificação). Troque pelos adapters reais em produção.
  - key: SHOPMAN_PIX_ADAPTER
    value: shopman.shop.adapters.payment_mock
    scope: RUN_TIME
    type: GENERAL
  - key: SHOPMAN_CARD_ADAPTER
    value: shopman.shop.adapters.payment_mock
    scope: RUN_TIME
    type: GENERAL
  - key: SHOPMAN_ALLOW_MOCK_PAYMENT_ADAPTERS
    value: "true"
    scope: RUN_TIME
    type: GENERAL
  - key: SHOPMAN_MOCK_PIX_AUTO_CONFIRM
    value: "true"
    scope: RUN_TIME
    type: GENERAL
  - key: SHOPMAN_MOCK_PIX_CONFIRM_DELAY_SECONDS
    value: "8"
    scope: RUN_TIME
    type: GENERAL
  - key: STRIPE_CAPTURE_METHOD
    value: manual
    scope: RUN_TIME
    type: GENERAL
  - key: SHOPMAN_JSON_LOGS
    value: "true"
    scope: RUN_TIME
    type: GENERAL
  - key: SHOPMAN_ENVIRONMENT
    value: staging
    scope: RUN_TIME
    type: GENERAL
  - key: SHOPMAN_EXPOSE_DEBUG_OTP
    value: "true"
    scope: RUN_TIME
    type: GENERAL

services:
  - name: web
    git:
      repo_clone_url: https://github.com/pablondrina/django-shopman.git
      branch: main
    dockerfile_path: Dockerfile
    source_dir: /
    run_command: daphne -b 0.0.0.0 -p 8000 config.asgi:application
    http_port: 8000
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-1gb
    health_check:
      http_path: /ready/
      initial_delay_seconds: 30
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 5
    liveness_health_check:
      http_path: /health/
      initial_delay_seconds: 30
      period_seconds: 30
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3
    alerts:
      - rule: CPU_UTILIZATION
        operator: GREATER_THAN
        value: 80
        window: FIVE_MINUTES
      - rule: MEM_UTILIZATION
        operator: GREATER_THAN
        value: 85
        window: FIVE_MINUTES
      - rule: RESTART_COUNT
        operator: GREATER_THAN
        value: 2
        window: TEN_MINUTES
  - name: thing-storefront
    git:
      repo_clone_url: https://github.com/pablondrina/django-shopman.git
      branch: main
    source_dir: /surfaces/storefront-uithing-nuxt
    build_command: npm ci && npm run build
    run_command: node .output/server/index.mjs
    http_port: 3000
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    envs:
      # O BFF proxia para o Django no host api. (cross-domain resolvido server-side).
      - key: NUXT_DJANGO_BASE_URL
        value: "https://api.STORE_DOMAIN"
        scope: RUN_TIME
        type: GENERAL
      # A loja vive na RAIZ do apex.
      - key: NUXT_APP_BASE_URL
        value: /
        scope: RUN_TIME
        type: GENERAL
    health_check:
      http_path: /menu
      initial_delay_seconds: 30
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 5
    alerts:
      - rule: RESTART_COUNT
        operator: GREATER_THAN
        value: 2
        window: TEN_MINUTES
  - name: pos-uithing
    git:
      repo_clone_url: https://github.com/pablondrina/django-shopman.git
      branch: main
    source_dir: /surfaces/pos-uithing-nuxt
    build_command: npm ci && npm run build
    run_command: node .output/server/index.mjs
    http_port: 3000
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    envs:
      - key: NUXT_DJANGO_BASE_URL
        value: "https://api.STORE_DOMAIN"
        scope: RUN_TIME
        type: GENERAL
      # O PDV vive na RAIZ do subdomínio pos.
      - key: NUXT_APP_BASE_URL
        value: /
        scope: RUN_TIME
        type: GENERAL
    health_check:
      http_path: /
      initial_delay_seconds: 30
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 5
    alerts:
      - rule: RESTART_COUNT
        operator: GREATER_THAN
        value: 2
        window: TEN_MINUTES

workers:
  - name: directive-worker
    git:
      repo_clone_url: https://github.com/pablondrina/django-shopman.git
      branch: main
    dockerfile_path: Dockerfile
    source_dir: /
    run_command: python manage.py process_directives --watch
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    alerts:
      - rule: RESTART_COUNT
        operator: GREATER_THAN
        value: 2
        window: TEN_MINUTES

  - name: maintenance-worker
    git:
      repo_clone_url: https://github.com/pablondrina/django-shopman.git
      branch: main
    dockerfile_path: Dockerfile
    source_dir: /
    run_command: python manage.py maintenance_worker
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    alerts:
      - rule: RESTART_COUNT
        operator: GREATER_THAN
        value: 2
        window: TEN_MINUTES

jobs:
  - name: release
    kind: PRE_DEPLOY
    git:
      repo_clone_url: https://github.com/pablondrina/django-shopman.git
      branch: main
    dockerfile_path: Dockerfile
    source_dir: /
    run_command: sh -c 'python manage.py check --deploy && python manage.py migrate --noinput'
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb

databases:
  - name: postgres
    engine: PG
    version: "16"
    production: true
    cluster_name: shopman-headless-postgres
    db_name: shopman
    db_user: shopman
  - name: cache
    engine: VALKEY
    version: "8"
    production: true
    cluster_name: shopman-headless-cache
