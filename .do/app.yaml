# DigitalOcean App Platform blueprint for the first Shopman staging deploy.
# Runtime secrets are intentionally not stored here. Add them as encrypted
# app-level RUN_TIME variables before deploying; see docs/guides/deploy-digitalocean.md.
name: shopman-staging
region: nyc

alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED

ingress:
  rules:
    - match:
        path:
          prefix: /thing
      component:
        name: thing-storefront
        preserve_path_prefix: true
    - match:
        path:
          prefix: /nuxt
      component:
        name: nuxt-storefront
        preserve_path_prefix: true
    - match:
        path:
          prefix: /pos
      component:
        name: pos-uithing
        preserve_path_prefix: true
    - match:
        path:
          prefix: /
      component:
        name: web

envs:
  - key: DJANGO_SETTINGS_MODULE
    value: config.settings
    scope: RUN_TIME
    type: GENERAL
  - key: DJANGO_DEBUG
    value: "false"
    scope: RUN_TIME
    type: GENERAL
  - key: DJANGO_ALLOWED_HOSTS
    value: "${APP_DOMAIN}"
    scope: RUN_TIME
    type: GENERAL
  - key: CSRF_TRUSTED_ORIGINS
    value: "${APP_URL}"
    scope: RUN_TIME
    type: GENERAL
  - key: DJANGO_TRUST_X_FORWARDED_PROTO
    value: "true"
    scope: RUN_TIME
    type: GENERAL
  - key: DJANGO_SECURE_SSL_REDIRECT
    value: "true"
    scope: RUN_TIME
    type: GENERAL
  - key: SHOPMAN_DOMAIN
    value: "${APP_URL}"
    scope: RUN_TIME
    type: GENERAL
  - key: AUTH_DEFAULT_DOMAIN
    value: "${APP_DOMAIN}"
    scope: RUN_TIME
    type: GENERAL
  - key: WHATSAPP_STOREFRONT_URL
    value: "${APP_URL}"
    scope: RUN_TIME
    type: GENERAL
  - key: SHOPMAN_INSTANCE_APPS
    value: nelson
    scope: RUN_TIME
    type: GENERAL
  - key: SHOPMAN_CUSTOMER_STRATEGY_MODULES
    value: nelson.customer_strategies
    scope: RUN_TIME
    type: GENERAL
  - key: SHOPMAN_INSTANCE_MODIFIERS
    value: nelson.modifiers.D1DiscountModifier,nelson.modifiers.HappyHourModifier
    scope: RUN_TIME
    type: GENERAL
  - key: DOORMAN_MESSAGE_SENDER_CLASS
    value: shopman.doorman.senders.LogSender
    scope: RUN_TIME
    type: GENERAL
  - key: DATABASE_URL
    value: "${postgres.shopman-staging-pool.DATABASE_URL}"
    scope: RUN_TIME
    type: GENERAL
  - key: DATABASE_CONN_MAX_AGE
    value: "60"
    scope: RUN_TIME
    type: GENERAL
  - key: DATABASE_DISABLE_SERVER_SIDE_CURSORS
    value: "true"
    scope: RUN_TIME
    type: GENERAL
  - key: REDIS_URL
    value: "${cache.REDIS_URL}"
    scope: RUN_TIME
    type: GENERAL
  - key: SHOPMAN_PIX_ADAPTER
    value: shopman.shop.adapters.payment_mock
    scope: RUN_TIME
    type: GENERAL
  - key: SHOPMAN_CARD_ADAPTER
    value: shopman.shop.adapters.payment_mock
    scope: RUN_TIME
    type: GENERAL
  - key: SHOPMAN_ALLOW_MOCK_PAYMENT_ADAPTERS
    value: "true"
    scope: RUN_TIME
    type: GENERAL
  - key: SHOPMAN_MOCK_PIX_AUTO_CONFIRM
    value: "true"
    scope: RUN_TIME
    type: GENERAL
  - key: SHOPMAN_MOCK_PIX_CONFIRM_DELAY_SECONDS
    value: "8"
    scope: RUN_TIME
    type: GENERAL
  - key: EFI_SANDBOX
    value: "true"
    scope: RUN_TIME
    type: GENERAL
  - key: STRIPE_CAPTURE_METHOD
    value: manual
    scope: RUN_TIME
    type: GENERAL
  - key: SHOPMAN_JSON_LOGS
    value: "true"
    scope: RUN_TIME
    type: GENERAL
  - key: SHOPMAN_CART_MUTATION_PERF_LOG_MS
    value: "250"
    scope: RUN_TIME
    type: GENERAL
  - key: SHOPMAN_ENVIRONMENT
    value: staging
    scope: RUN_TIME
    type: GENERAL
  - key: SHOPMAN_EXPOSE_DEBUG_OTP
    value: "true"
    scope: RUN_TIME
    type: GENERAL

services:
  - name: web
    git:
      repo_clone_url: https://github.com/pablondrina/django-shopman.git
      branch: feat/pos-odoo-fidelity
    dockerfile_path: Dockerfile
    source_dir: /
    run_command: daphne -b 0.0.0.0 -p 8000 config.asgi:application
    http_port: 8000
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-1gb
    health_check:
      http_path: /ready/
      initial_delay_seconds: 30
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 5
    liveness_health_check:
      http_path: /health/
      initial_delay_seconds: 30
      period_seconds: 30
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3
    alerts:
      - rule: CPU_UTILIZATION
        operator: GREATER_THAN
        value: 80
        window: FIVE_MINUTES
      - rule: MEM_UTILIZATION
        operator: GREATER_THAN
        value: 85
        window: FIVE_MINUTES
      - rule: RESTART_COUNT
        operator: GREATER_THAN
        value: 2
        window: TEN_MINUTES
  - name: nuxt-storefront
    git:
      repo_clone_url: https://github.com/pablondrina/django-shopman.git
      branch: feat/pos-odoo-fidelity
    source_dir: /surfaces/storefront-nuxt
    build_command: npm ci && npm run build
    run_command: node .output/server/index.mjs
    http_port: 3000
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    envs:
      - key: NUXT_DJANGO_BASE_URL
        value: "${APP_URL}"
        scope: RUN_TIME
        type: GENERAL
    health_check:
      http_path: /nuxt/menu
      initial_delay_seconds: 30
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 5
    alerts:
      - rule: RESTART_COUNT
        operator: GREATER_THAN
        value: 2
        window: TEN_MINUTES
  - name: thing-storefront
    git:
      repo_clone_url: https://github.com/pablondrina/django-shopman.git
      branch: feat/pos-odoo-fidelity
    source_dir: /surfaces/storefront-uithing-nuxt
    build_command: npm ci && npm run build
    run_command: node .output/server/index.mjs
    http_port: 3000
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    envs:
      - key: NUXT_DJANGO_BASE_URL
        value: "${APP_URL}"
        scope: RUN_TIME
        type: GENERAL
      - key: NUXT_APP_BASE_URL
        value: /thing/
        scope: RUN_TIME
        type: GENERAL
    health_check:
      http_path: /thing/menu
      initial_delay_seconds: 30
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 5
    alerts:
      - rule: RESTART_COUNT
        operator: GREATER_THAN
        value: 2
        window: TEN_MINUTES
  - name: pos-uithing
    git:
      repo_clone_url: https://github.com/pablondrina/django-shopman.git
      branch: feat/pos-odoo-fidelity
    source_dir: /surfaces/pos-uithing-nuxt
    build_command: npm ci && npm run build
    run_command: node .output/server/index.mjs
    http_port: 3000
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    envs:
      - key: NUXT_DJANGO_BASE_URL
        value: "${APP_URL}"
        scope: RUN_TIME
        type: GENERAL
      - key: NUXT_APP_BASE_URL
        value: /pos/
        scope: RUN_TIME
        type: GENERAL
    health_check:
      http_path: /pos/
      initial_delay_seconds: 30
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 5
    alerts:
      - rule: RESTART_COUNT
        operator: GREATER_THAN
        value: 2
        window: TEN_MINUTES

workers:
  - name: directive-worker
    git:
      repo_clone_url: https://github.com/pablondrina/django-shopman.git
      branch: feat/pos-odoo-fidelity
    dockerfile_path: Dockerfile
    source_dir: /
    run_command: python manage.py process_directives --watch
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    alerts:
      - rule: RESTART_COUNT
        operator: GREATER_THAN
        value: 2
        window: TEN_MINUTES

jobs:
  - name: release
    kind: PRE_DEPLOY
    git:
      repo_clone_url: https://github.com/pablondrina/django-shopman.git
      branch: feat/pos-odoo-fidelity
    dockerfile_path: Dockerfile
    source_dir: /
    run_command: sh -c 'python manage.py check --deploy && python manage.py migrate --noinput'
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb

databases:
  - name: postgres
    engine: PG
    version: "16"
    production: true
    cluster_name: shopman-staging-postgres
    db_name: shopman
    db_user: shopman
  - name: cache
    engine: VALKEY
    version: "8"
    production: true
    cluster_name: shopman-staging-cache
