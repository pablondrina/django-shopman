<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Erro interno</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #FAFAF8; color: #1a1a1a;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 24px;
  }
  .container { text-align: center; max-width: 400px; }
  .code { font-size: 72px; font-weight: 700; color: #C0392B; line-height: 1; }
  h1 { font-size: 22px; margin: 16px 0 8px; font-weight: 600; }
  p { font-size: 16px; color: #666; line-height: 1.5; margin-bottom: 24px; }
  a {
    display: inline-block; padding: 14px 32px;
    background: #9E833E; color: #fff; text-decoration: none;
    border-radius: 8px; font-size: 16px; font-weight: 500;
    min-height: 44px; min-width: 44px;
  }
  a:hover { background: #8A7235; }
  .contact { margin-top: 16px; font-size: 14px; color: #999; }
  .contact a { background: none; color: #9E833E; padding: 0; display: inline; font-size: 14px; }
</style>
</head>
<body>
<div class="container">
  <div class="code">500</div>
  <h1>Algo deu errado</h1>
  <p>Estamos trabalhando para resolver. Tente novamente em alguns instantes.</p>
  <a href="/menu/">Voltar ao cardápio</a>
  <div class="contact">Problema persiste? <a href="/menu/">Fale conosco</a></div>
</div>
</body>
</html>
