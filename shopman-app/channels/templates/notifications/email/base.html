<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 0; background-color: #f5f0eb; }
  .container { max-width: 600px; margin: 0 auto; background: #ffffff; }
  .header { background-color: #3d2b1f; color: #ffffff; padding: 24px 32px; text-align: center; }
  .header h1 { margin: 0; font-size: 20px; font-weight: 600; }
  .content { padding: 32px; color: #333333; line-height: 1.6; }
  .content h2 { color: #3d2b1f; margin-top: 0; }
  .footer { padding: 24px 32px; text-align: center; font-size: 12px; color: #999999; border-top: 1px solid #eeeeee; }
  .highlight { background-color: #f5f0eb; border-radius: 8px; padding: 16px; margin: 16px 0; }
  .highlight strong { color: #3d2b1f; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>{{ shop_name|default:"Shopman" }}</h1>
  </div>
  <div class="content">
    {% block content %}{% endblock %}
  </div>
  <div class="footer">
    {{ shop_name|default:"Shopman" }} &mdash; Obrigado pela preferencia!
  </div>
</div>
</body>
</html>
