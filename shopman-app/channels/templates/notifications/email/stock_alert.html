{% extends "notifications/email/base.html" %}

{% block content %}
<h2>Alerta de Estoque</h2>
<p>Um produto atingiu o nivel minimo de estoque.</p>
<div class="highlight">
  <strong>Produto (SKU):</strong> {{ sku }}<br>
  <strong>Quantidade atual:</strong> {{ available }}<br>
  <strong>Minimo configurado:</strong> {{ min_quantity }}
</div>
<p>Providencie a reposicao.</p>
{% endblock %}
