{% load static storefront_tags %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>{% block title %}KDS{% endblock %}</title>

  {# HTMX #}
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>

  <style>
    :root {
      --kds-bg: #1a1a2e;
      --kds-surface: #16213e;
      --kds-border: #2a3a5c;
      --kds-text: #e0e0e0;
      --kds-text-muted: #8a8fa8;
      --kds-ok: #4ade80;
      --kds-warning: #fbbf24;
      --kds-late: #f87171;
      --kds-accent: #818cf8;
      --kds-radius: 8px;
      --kds-touch: 44px;
    }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--kds-bg);
      color: var(--kds-text);
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .kds-header {
      background: var(--kds-surface);
      border-bottom: 1px solid var(--kds-border);
      padding: 0.75rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .kds-header h1 {
      font-size: 1.25rem;
      font-weight: 700;
      margin: 0;
      white-space: nowrap;
    }
    .kds-clock {
      font-size: 0.875rem;
      color: var(--kds-text-muted);
      font-variant-numeric: tabular-nums;
    }
    .kds-actions {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }
    .kds-actions button {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.25rem;
      padding: 0.25rem;
      border-radius: var(--kds-radius);
      color: var(--kds-text-muted);
      min-width: var(--kds-touch);
      min-height: var(--kds-touch);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .kds-actions button:hover {
      background: var(--kds-border);
    }
    .kds-main {
      flex: 1;
      padding: 1rem;
      width: 100%;
    }
    .timer-ok { color: var(--kds-ok); }
    .timer-warning { color: var(--kds-warning); }
    .timer-late { color: var(--kds-late); }
  </style>
</head>
<body>
  {# HTMX CSRF #}
  <script>
    document.addEventListener('htmx:configRequest', function(e) {
      var csrfToken = '{{ csrf_token }}';
      if (csrfToken) {
        e.detail.headers['X-CSRFToken'] = csrfToken;
      }
    });
  </script>

  {% block body %}{% endblock %}
</body>
</html>
