{% load storefront_tags %}
<div id="cart-item-{{ item.line_id }}" class="px-6 py-4 flex items-center gap-4 border-b border-cream-dark/50 last:border-b-0">
  <!-- Product emoji -->
  <div class="w-14 h-14 bg-gradient-to-br from-cream-dark to-cream rounded-lg flex items-center justify-center flex-shrink-0">
    <span class="text-2xl">{{ item.sku|product_emoji }}</span>
  </div>

  <!-- Product info -->
  <div class="flex-1 min-w-0">
    <h4 class="font-medium text-bark text-sm truncate">{{ item.name|default:item.sku }}</h4>
    <p class="text-wheat-dark text-sm font-medium">{{ item.price_display }}</p>
  </div>

  <!-- Quantity controls -->
  <div class="flex items-center border border-cream-dark rounded-lg overflow-hidden">
    {% if item.qty > 1 %}
    <button
      type="button"
      class="px-2.5 py-1.5 text-bark hover:bg-cream-dark transition-colors text-sm"
      hx-post="{% url 'storefront:cart_update' %}"
      hx-vals='{"line_id": "{{ item.line_id }}", "qty": "{{ item.qty|add:"-1" }}"}'
      hx-target="#cart-item-{{ item.line_id }}"
      hx-swap="outerHTML"
    >-</button>
    {% else %}
    <button type="button" class="px-2.5 py-1.5 text-bark-light/30 cursor-not-allowed text-sm" disabled>-</button>
    {% endif %}
    <span class="w-10 text-center py-1.5 border-x border-cream-dark text-bark text-sm bg-white">{{ item.qty|floatformat:"0" }}</span>
    <button
      type="button"
      class="px-2.5 py-1.5 text-bark hover:bg-cream-dark transition-colors text-sm"
      hx-post="{% url 'storefront:cart_update' %}"
      hx-vals='{"line_id": "{{ item.line_id }}", "qty": "{{ item.qty|add:"1" }}"}'
      hx-target="#cart-item-{{ item.line_id }}"
      hx-swap="outerHTML"
    >+</button>
  </div>

  <!-- Line total -->
  <div class="text-right w-24 flex-shrink-0">
    <p class="font-bold text-bark text-sm">{{ item.total_display }}</p>
  </div>

  <!-- Remove button -->
  <button
    type="button"
    class="text-bark-light/50 hover:text-red-500 transition-colors p-1 flex-shrink-0"
    hx-post="{% url 'storefront:cart_remove' %}"
    hx-vals='{"line_id": "{{ item.line_id }}"}'
    hx-target="#cart-item-{{ item.line_id }}"
    hx-swap="outerHTML"
    hx-confirm="Remover este item?"
  >
    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
    </svg>
  </button>
</div>
