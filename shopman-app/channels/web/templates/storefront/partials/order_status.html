<!-- Status badge -->
<div class="text-center mb-6">
  <span class="inline-block px-5 py-2 rounded-full text-lg font-bold {{ status_color }}">
    {{ status_label }}
  </span>
</div>

<!-- Timeline -->
{% if timeline %}
<div class="bg-white rounded-xl shadow-sm p-6 mb-6">
  <h3 class="font-serif text-lg font-bold text-bark mb-4">Timeline</h3>

  <div class="relative pl-8">
    <!-- Vertical line -->
    <div class="absolute left-3 top-2 bottom-2 w-0.5 bg-cream-dark"></div>

    {% for event in timeline %}
    <div class="relative mb-6 last:mb-0">
      <!-- Dot -->
      <div class="absolute -left-5 top-1 w-3 h-3 rounded-full {% if forloop.last %}bg-wheat ring-4 ring-wheat/20{% else %}bg-bark-light{% endif %}"></div>

      <div>
        <p class="text-bark font-medium text-sm">{{ event.label }}</p>
        <p class="text-bark-light text-xs mt-0.5">
          {{ event.timestamp|date:"d/m/Y" }} às {{ event.timestamp|time:"H:i" }}
        </p>
      </div>
    </div>
    {% endfor %}
  </div>
</div>
{% endif %}
