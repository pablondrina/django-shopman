<div id="coupon-section">
  {% if coupon %}
  <!-- Coupon applied -->
  <div class="flex items-center justify-between p-3 rounded-lg bg-success-light border border-success">
    <div class="flex items-center gap-2 text-sm text-success-foreground">
      <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
      <span>Cupom <strong>{{ coupon.code }}</strong> aplicado!{% if coupon.discount_q %} <span class="text-success">-{{ coupon.discount_display }}</span>{% endif %}</span>
    </div>
    <form hx-post="{% url 'storefront:cart_remove_coupon' %}" hx-target="#coupon-section" hx-swap="outerHTML">
      {% csrf_token %}
      <button type="submit" class="text-sm font-medium text-error hover:text-error transition-colors">
        Remover
      </button>
    </form>
  </div>
  {% else %}
  <!-- Coupon input -->
  <form hx-post="{% url 'storefront:cart_apply_coupon' %}" hx-target="#coupon-section" hx-swap="outerHTML" class="flex gap-2">
    {% csrf_token %}
    <input
      type="text"
      name="code"
      placeholder="Código do cupom"
      class="flex-1 px-4 py-2.5 rounded-lg border border-border bg-input text-foreground placeholder-muted-foreground/50 focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition text-sm uppercase"
    >
    <button type="submit" class="px-4 py-2.5 bg-primary text-white rounded-lg font-medium text-sm hover:bg-primary-hover transition-colors flex-shrink-0">
      Aplicar
    </button>
  </form>
  {% if coupon_error %}
  <p class="mt-2 text-sm text-error">{{ coupon_error }}</p>
  {% endif %}
  {% endif %}
</div>
