<div class="p-4 rounded-lg bg-info-light border border-info">
  <p class="text-sm text-info-foreground mb-3">
    Enviamos um código para seu WhatsApp. Digite abaixo:
  </p>

  {% if error_message %}
  <div class="mb-3 p-2 rounded bg-error-light border border-error text-error text-sm">
    {{ error_message }}
  </div>
  {% endif %}

  <div class="space-y-3">
    <div>
      <input type="text" id="auth-code-input" name="code" maxlength="6" pattern="[0-9]{6}"
        inputmode="numeric" autocomplete="one-time-code"
        placeholder="000000"
        class="w-full px-4 py-3 rounded-lg border border-info bg-input text-foreground text-center text-2xl font-mono tracking-[0.5em] placeholder-muted-foreground/30 focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition"
        autofocus>
    </div>
    <button type="button" id="auth-verify-btn"
      hx-post="{% url 'storefront:verify_code' %}"
      hx-target="#auth-section"
      hx-swap="innerHTML"
      hx-include="#auth-code-input"
      hx-vals='{"phone": "{{ phone }}"}'
      hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
      class="w-full py-2.5 bg-primary text-white rounded-lg font-medium text-sm hover:bg-primary-hover transition-colors">
      Verificar
    </button>
  </div>

  <div class="mt-3 text-center">
    <button type="button" id="resend-btn" disabled
      hx-post="{% url 'storefront:request_code' %}"
      hx-target="#auth-section"
      hx-swap="innerHTML"
      hx-vals='{"phone": "{{ phone }}"}'
      hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
      class="text-sm text-info hover:text-info-foreground disabled:text-gray-400 disabled:cursor-not-allowed transition-colors">
      Reenviar código (<span id="resend-timer">60</span>s)
    </button>
  </div>
</div>

<script>
(function() {
  var seconds = 60;
  var timerEl = document.getElementById('resend-timer');
  var btnEl = document.getElementById('resend-btn');
  var interval = setInterval(function() {
    seconds--;
    if (timerEl) timerEl.textContent = seconds;
    if (seconds <= 0) {
      clearInterval(interval);
      if (btnEl) {
        btnEl.disabled = false;
        btnEl.textContent = 'Reenviar código';
      }
    }
  }, 1000);
})();
</script>
