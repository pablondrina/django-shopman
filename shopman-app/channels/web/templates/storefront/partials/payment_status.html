{% if is_cancelled %}
{# Order cancelled #}
<div class="text-center py-4 space-y-3">
  <div class="w-12 h-12 mx-auto rounded-full bg-error/10 flex items-center justify-center">
    <svg class="w-6 h-6 text-error" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
    </svg>
  </div>
  <p class="text-error font-medium">Pedido cancelado</p>
  <a href="{% url 'storefront:menu' %}"
     class="inline-block px-6 py-2.5 bg-primary text-white rounded-lg hover:bg-primary-hover transition-colors font-medium"
     style="min-height: var(--touch-min)">
    Fazer novo pedido
  </a>
</div>

{% elif is_expired %}
{# PIX expired #}
<div class="text-center py-4 space-y-3"
     hx-swap-oob="true"
     id="payment-status">
  <div class="w-12 h-12 mx-auto rounded-full bg-warning/10 flex items-center justify-center">
    <svg class="w-6 h-6 text-warning" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
    </svg>
  </div>
  <p class="text-warning font-medium">PIX expirado</p>
  <p class="text-sm text-muted-foreground">O tempo para pagamento acabou.</p>
  <a href="{% url 'storefront:menu' %}"
     class="inline-block px-6 py-2.5 bg-primary text-white rounded-lg hover:bg-primary-hover transition-colors font-medium"
     style="min-height: var(--touch-min)">
    Fazer novo pedido
  </a>
</div>

{% else %}
{# Waiting for payment #}
<div class="flex items-center justify-center gap-2 py-3">
  <div class="animate-spin w-4 h-4 border-2 border-primary border-t-transparent rounded-full"></div>
  <span class="text-sm text-muted-foreground">Aguardando pagamento...</span>
</div>
{% endif %}
