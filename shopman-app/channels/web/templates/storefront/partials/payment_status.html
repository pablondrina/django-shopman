{% if is_cancelled %}
<div class="text-center py-4 space-y-3">
  <p class="text-red-600 font-medium">Pagamento expirado ou cancelado.</p>
  <a
    href="{% url 'storefront:menu' %}"
    class="inline-block px-6 py-2 bg-wheat text-white rounded-lg hover:bg-wheat-dark transition-colors"
  >
    Fazer novo pedido
  </a>
</div>
{% else %}
<div class="flex items-center justify-center space-x-2 py-3">
  <div class="animate-spin w-4 h-4 border-2 border-wheat border-t-transparent rounded-full"></div>
  <span class="text-sm text-bark-light">Aguardando pagamento...</span>
</div>
{% endif %}
