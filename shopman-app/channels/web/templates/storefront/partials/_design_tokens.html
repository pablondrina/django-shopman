{# ── Design Tokens: OKLCH color system with dark mode ── #}
{# Single source of truth. All colors from Shop model via design_tokens property. #}

{% with t=storefront.design_tokens dark=storefront.design_tokens.dark %}

<!-- Fonts (self-hosted, loaded via @font-face in output.css) -->
<!-- Fallback: Google Fonts CDN for fonts not yet self-hosted -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family={{ t.heading_font|urlencode }}:ital,wght@0,400;0,600;0,700;1,400;1,600&family={{ t.body_font|urlencode }}:wght@400;500;600;700&display=swap">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family={{ t.heading_font|urlencode }}:ital,wght@0,400;0,600;0,700;1,400;1,600&family={{ t.body_font|urlencode }}:wght@400;500;600;700&display=swap">

<!-- Tailwind (local build) -->
{% load static %}
<link rel="stylesheet" href="{% static 'storefront/css/output.css' %}">

<!-- Alpine.js -->
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>

<!-- OKLCH Design Tokens -->
<style>
  /* ── Light mode (default) ── */
  :root {
    --background: {{ t.background }};
    --surface: {{ t.surface }};
    --surface-hover: {{ t.surface_hover }};
    --input: {{ t.input }};
    --muted: {{ t.muted }};
    --border: {{ t.border }};
    --border-strong: {{ t.border_strong }};
    --ring: {{ t.ring }};

    --foreground: {{ t.foreground }};
    --foreground-muted: {{ t.foreground_muted }};

    --primary: {{ t.primary }};
    --primary-hover: {{ t.primary_hover }};
    --primary-foreground: {{ t.primary_foreground }};

    --secondary: {{ t.secondary }};
    --secondary-hover: {{ t.secondary_hover }};
    --secondary-foreground: {{ t.secondary_foreground }};

    --accent: {{ t.accent }};
    --accent-hover: {{ t.accent_hover }};
    --accent-foreground: {{ t.accent_foreground }};

    --success: {{ t.success }};
    --success-light: {{ t.success_light }};
    --success-foreground: {{ t.success_foreground }};

    --warning: {{ t.warning }};
    --warning-light: {{ t.warning_light }};
    --warning-foreground: {{ t.warning_foreground }};

    --error: {{ t.error }};
    --error-light: {{ t.error_light }};
    --error-foreground: {{ t.error_foreground }};

    --info: {{ t.info }};
    --info-light: {{ t.info_light }};
    --info-foreground: {{ t.info_foreground }};

    /* Inverted: swap foreground↔background from CURRENT mode (not dark mode values) */
    --_inv-background: {{ t.foreground }};
    --_inv-foreground: {{ t.background }};
    --_inv-foreground-muted: {{ t.border_strong }};
    --_inv-surface: {{ t.foreground_muted }};
    --_inv-surface-hover: {{ t.border_strong }};
    --_inv-muted: {{ t.foreground_muted }};
    --_inv-border: {{ t.foreground_muted }};

    /* Typography */
    --font-heading: '{{ t.heading_font }}', Georgia, serif;
    --font-body: '{{ t.body_font }}', system-ui, sans-serif;

    /* Radii */
    --radius-sm: {{ t.radius_sm }};
    --radius-md: {{ t.radius_md }};
    --radius-lg: {{ t.radius_lg }};
    --radius-xl: {{ t.radius_xl }};
    --radius-full: 9999px;

    /* Shadows */
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.06);
    --shadow-lg: 0 8px 24px rgba(0,0,0,0.08);
    --shadow-xl: 0 16px 48px rgba(0,0,0,0.12);

    /* ── Typography Scale (Major Third 1.250) ── */
    --text-display:  2.441rem;   /* 39px */
    --text-h1:       1.953rem;   /* 31px */
    --text-h2:       1.563rem;   /* 25px */
    --text-h3:       1.25rem;    /* 20px */
    --text-h4:       1.125rem;   /* 18px */
    --text-body-lg:  1.063rem;   /* 17px */
    --text-body:     1rem;       /* 16px */
    --text-body-sm:  0.875rem;   /* 14px */
    --text-caption:  0.75rem;    /* 12px */
    --text-overline: 0.6875rem;  /* 11px */

    /* Line heights */
    --leading-display:  1.15;
    --leading-h1:       1.2;
    --leading-h2:       1.25;
    --leading-h3:       1.3;
    --leading-h4:       1.35;
    --leading-body-lg:  1.6;
    --leading-body:     1.6;
    --leading-body-sm:  1.5;
    --leading-caption:  1.4;
    --leading-overline: 1.2;

    /* Letter spacing */
    --tracking-display: -0.025em;
    --tracking-h1:      -0.02em;
    --tracking-h2:      -0.015em;
    --tracking-h3:      -0.01em;
    --tracking-h4:      -0.005em;
    --tracking-caption:  0.01em;
    --tracking-overline: 0.08em;

    /* Layout */
    --header-height: 72px;
    --safe-area-top: env(safe-area-inset-top, 0px);
    --safe-area-bottom: env(safe-area-inset-bottom, 0px);
    --touch-min: 44px;
  }

  /* ── Dark mode ── */
  {% if t.color_mode == "auto" %}
  @media (prefers-color-scheme: dark) {
  :root {
  {% elif t.color_mode == "dark" %}
  .dark {
  {% endif %}
  {% if t.color_mode != "light" %}
    --background: {{ dark.background }};
    --surface: {{ dark.surface }};
    --surface-hover: {{ dark.surface_hover }};
    --input: {{ dark.input }};
    --muted: {{ dark.muted }};
    --border: {{ dark.border }};
    --border-strong: {{ dark.border_strong }};
    --ring: {{ dark.ring }};

    --foreground: {{ dark.foreground }};
    --foreground-muted: {{ dark.foreground_muted }};

    --primary: {{ dark.primary }};
    --primary-hover: {{ dark.primary_hover }};
    --primary-foreground: {{ dark.primary_foreground }};

    --secondary: {{ dark.secondary }};
    --secondary-hover: {{ dark.secondary_hover }};
    --secondary-foreground: {{ dark.secondary_foreground }};

    --accent: {{ dark.accent }};
    --accent-hover: {{ dark.accent_hover }};
    --accent-foreground: {{ dark.accent_foreground }};

    --success: {{ dark.success }};
    --success-light: {{ dark.success_light }};
    --success-foreground: {{ dark.success_foreground }};

    --warning: {{ dark.warning }};
    --warning-light: {{ dark.warning_light }};
    --warning-foreground: {{ dark.warning_foreground }};

    --error: {{ dark.error }};
    --error-light: {{ dark.error_light }};
    --error-foreground: {{ dark.error_foreground }};

    --info: {{ dark.info }};
    --info-light: {{ dark.info_light }};
    --info-foreground: {{ dark.info_foreground }};

    --shadow-sm: 0 1px 2px rgba(0,0,0,0.2);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.3);
    --shadow-lg: 0 8px 24px rgba(0,0,0,0.4);
    --shadow-xl: 0 16px 48px rgba(0,0,0,0.5);
  }
  {% if t.color_mode == "auto" %}
  }
  {% endif %}
  {% endif %}

  /* Base styles, inverted sections, reduced motion → static/src/input.css (Tailwind build) */
</style>

{% endwith %}
