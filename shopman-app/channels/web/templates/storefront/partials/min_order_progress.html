{% if progress %}
<div class="px-4 py-3 bg-warning-light border-b border-warning">
  <div class="flex justify-between items-center mb-1.5">
    <span class="text-xs text-warning-foreground font-medium">Faltam {{ progress.remaining_display }}</span>
    <span class="text-xs text-warning">M&iacute;n. {{ progress.minimum_display }}</span>
  </div>
  <div class="w-full h-1.5 bg-warning-light rounded-full overflow-hidden">
    <div class="h-full bg-warning-light0 rounded-full transition-all duration-500" style="width: {{ progress.percent }}%;"></div>
  </div>
</div>
{% endif %}
