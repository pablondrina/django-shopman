<div class="modal-overlay" @click.self="dismissStockModal()">
  <div class="modal-card text-center">
    <div class="text-4xl mb-3">😔</div>
    <h3 class="text-h4 text-foreground mb-2">{{ title }}</h3>
    <p class="text-muted-foreground text-sm mb-6">{{ message }}</p>
    <button
      @click="dismissStockModal()"
      class="w-full py-3 rounded-lg text-sm font-medium bg-primary text-white hover:bg-primary-hover transition-colors"
      style="min-height: var(--touch-min);"
    >
      Entendi
    </button>
  </div>
</div>
