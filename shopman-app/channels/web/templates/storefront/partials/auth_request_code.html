<div class="p-4 rounded-lg bg-warning-light border border-warning">
  <p class="text-sm text-warning-foreground mb-3">
    Enviaremos um código de 6 dígitos via WhatsApp para confirmar seu acesso.
  </p>
  <button type="button"
    hx-post="{% url 'storefront:request_code' %}"
    hx-target="#auth-section"
    hx-swap="innerHTML"
    hx-vals='{"phone": "{{ phone }}"}'
    hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
    class="w-full py-2.5 bg-primary text-white rounded-lg font-medium text-sm hover:bg-primary-hover transition-colors">
    Enviar código de verificação
  </button>
</div>
