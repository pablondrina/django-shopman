<!DOCTYPE html>
<html lang="pt-BR" dir="ltr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sem conexão — {{ storefront.brand_name }}</title>
  <meta name="theme-color" content="{{ storefront.theme_color }}">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: {{ storefront.background_color }};
      color: #3D2B1F;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      text-align: center;
    }
    .offline-container { max-width: 400px; }
    .offline-icon { font-size: 4rem; margin-bottom: 1.5rem; }
    .offline-brand {
      font-size: 1.25rem;
      font-weight: 700;
      color: {{ storefront.theme_color }};
      margin-bottom: 0.5rem;
    }
    h1 { font-size: 1.5rem; margin-bottom: 1rem; }
    p { color: #6B5B4F; line-height: 1.6; margin-bottom: 2rem; }
    .retry-btn {
      display: inline-block;
      padding: 0.875rem 2rem;
      background: {{ storefront.theme_color }};
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
    }
    .retry-btn:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="offline-container">
    <div class="offline-icon">&#x1F4F6;</div>
    <div class="offline-brand">{{ storefront.brand_name }}</div>
    <h1>Sem conexão</h1>
    <p>Verifique sua internet e tente novamente.</p>
    <button class="retry-btn" onclick="window.location.reload()">Tentar novamente</button>
  </div>
</body>
</html>
