{% extends "storefront/base.html" %}

{% block title %}Carrinho{% endblock %}

{% block content %}

<div class="mb-6">
  <a href="{% url 'storefront:menu' %}" class="text-wheat-dark hover:text-wheat font-medium text-sm transition-colors">
    &larr; Continuar comprando
  </a>
</div>

<h2 class="font-serif text-3xl font-bold text-bark mb-6">Seu Carrinho</h2>

<div id="cart-content"
     hx-get="{% url 'storefront:cart_content' %}"
     hx-trigger="cartUpdated from:body"
     hx-swap="innerHTML">
  {% include "storefront/partials/cart_content.html" %}
</div>

<!-- Cart badge in header is updated automatically via hx-trigger="cartUpdated from:body" in base.html -->

{% endblock %}
