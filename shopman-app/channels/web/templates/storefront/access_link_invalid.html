{% extends "storefront/base.html" %}

{% block title %}Link Inválido{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-16 text-center">
  <div class="bg-surface rounded-lg shadow p-8">
    <div class="text-5xl mb-4">🔗</div>
    <h1 class="text-h3 text-foreground mb-2">Link inválido ou expirado</h1>
    <p class="text-muted-foreground mb-6">{{ error|default:"Este link não é mais válido. Solicite um novo link pelo WhatsApp." }}</p>
    <a href="{% url 'storefront:menu' %}" class="inline-block px-6 py-3 rounded-lg text-white font-medium"
       style="background-color: oklch(var(--primary));">
      Ver Cardápio
    </a>
  </div>
</div>
{% endblock %}
