{% comment %}Toast notification. Rendered once in base.html. Types: success, warning, error, info. JS: showToast(msg, type, duration). HTMX: HX-Trigger toast event.{% endcomment %}

<div
  x-data
  @toast.window="$store.toast.show($event.detail.message, $event.detail.type)"
  role="status"
  :aria-live="$store.toast.type === 'error' ? 'assertive' : 'polite'"
  x-show="$store.toast.visible"
  x-transition:enter="transition ease-out duration-300"
  x-transition:enter-start="opacity-0 translate-y-4"
  x-transition:enter-end="opacity-100 translate-y-0"
  x-transition:leave="transition ease-in duration-200"
  x-transition:leave-start="opacity-100 translate-y-0"
  x-transition:leave-end="opacity-0 translate-y-4"
  x-cloak
  @click="$store.toast.dismiss()"
  class="fixed left-1/2 -translate-x-1/2 z-50 px-5 py-3 bg-foreground text-background rounded-xl shadow-lg text-sm font-medium flex items-center gap-2.5 cursor-pointer max-w-[90vw]"
  style="bottom: calc(1.5rem + var(--safe-area-bottom))"
>
  <span x-html="$store.toast.icon" class="toast-icon"></span>
  <span x-text="$store.toast.message"></span>
</div>
