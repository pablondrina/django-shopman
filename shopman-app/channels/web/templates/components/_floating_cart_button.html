{# Floating cart button: mobile 56×56 circle above bottom nav. Visible when cart has items. #}

<div x-data="{ count: {{ cart_count|default:0 }} }"
     x-show="count > 0"
     x-transition:enter="transition ease-out duration-200"
     x-transition:enter-start="opacity-0 scale-75"
     x-transition:enter-end="opacity-100 scale-100"
     x-transition:leave="transition ease-in duration-150"
     x-transition:leave-start="opacity-100 scale-100"
     x-transition:leave-end="opacity-0 scale-75"
     x-cloak
     @cart-count-updated.window="count = $event.detail.count"
     class="md:hidden fixed z-40 right-4"
     style="bottom: calc(72px + env(safe-area-inset-bottom, 0px));">

  <button type="button"
          @click="openCartDrawer()"
          class="relative w-14 h-14 rounded-full bg-primary text-white shadow-lg flex items-center justify-center hover:bg-primary-hover transition-all active:scale-95"
          aria-label="Abrir carrinho">
    {# Cart icon #}
    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 100 4 2 2 0 000-4z"/>
    </svg>
    {# Badge #}
    <span x-show="count > 0"
          x-text="count"
          class="absolute -top-1 -right-1 bg-error text-white text-[10px] font-bold rounded-full min-w-[20px] h-5 flex items-center justify-center px-1"></span>
  </button>
</div>
