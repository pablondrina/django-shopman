{# Inner button rendering — included by _button.html with size context #}
<button
  type="{{ btn_type }}"
  class="
    touch-target inline-flex items-center justify-center gap-2 {{ py }} {{ px }} {{ text_size }}
    font-medium rounded-lg transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2
    {% if full_width %}w-full{% endif %}
    {% if variant == 'primary' %}
      bg-primary text-primary-foreground hover:bg-primary-hover focus:ring-primary
    {% elif variant == 'secondary' %}
      bg-secondary text-secondary-foreground hover:bg-secondary-hover focus:ring-secondary
    {% elif variant == 'outline' %}
      border border-border bg-transparent text-foreground hover:bg-surface-hover focus:ring-ring
    {% elif variant == 'danger' %}
      bg-error text-white hover:bg-error/90 focus:ring-error
    {% elif variant == 'ghost' %}
      bg-transparent text-foreground hover:bg-surface-hover focus:ring-ring
    {% endif %}
    {% if disabled %}opacity-50 cursor-not-allowed{% endif %}
  "
  {% if disabled %}disabled aria-disabled="true"{% endif %}
  {% if hx_post %}hx-post="{{ hx_post }}"{% endif %}
  {% if hx_get %}hx-get="{{ hx_get }}"{% endif %}
  {% if hx_target %}hx-target="{{ hx_target }}"{% endif %}
  {% if hx_swap %}hx-swap="{{ hx_swap }}"{% endif %}
  {% if hx_indicator %}hx-indicator="{{ hx_indicator }}"{% endif %}
  {% if hx_disabled_elt %}hx-disabled-elt="{{ hx_disabled_elt }}"{% endif %}
  {% if aria_label %}aria-label="{{ aria_label }}"{% endif %}
>
  {# Loading spinner (hidden by default, shown via HTMX htmx-request class) #}
  {% if loading_text %}
  <span class="htmx-indicator">
    <span class="spinner"></span>
  </span>
  {% endif %}

  {# Icon (optional) #}
  {% if icon %}
  <span class="flex-shrink-0 w-5 h-5">{{ icon|safe }}</span>
  {% endif %}

  {# Label #}
  <span>
    {% if loading_text %}
    <span class="htmx-request:hidden">{{ label }}</span>
    <span class="hidden htmx-request:inline">{{ loading_text }}</span>
    {% else %}
    {{ label }}
    {% endif %}
  </span>
</button>
