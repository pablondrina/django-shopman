<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Croissant Clássico — Nelson Boulangerie</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&display=swap">
  <style>
    :root {
      --sat: env(safe-area-inset-top, 0px);
      --sab: env(safe-area-inset-bottom, 0px);
    }
    .font-display {
      font-family: 'Playfair Display', Georgia, serif;
    }
    .hide-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }
    @keyframes flash-green {
      0%, 100% { background-color: rgb(255, 255, 255); }
      50% { background-color: rgb(16, 185, 129); }
    }
    .flash-success {
      animation: flash-green 0.6s ease-in-out;
    }
  </style>
</head>
<body class="bg-neutral-50" x-data="{
  quantity: 1,
  selectedImage: 0,
  showFullDesc: false,
  showCraftStory: false,
  showRemoveConfirm: false,
  addedToCart: false,
  flashBottom: false,
  isReturning: true,
  hour: new Date().getHours(),
  customerName: 'Maria',
  orderCount: 12,
  closingHour: 19,
  userDistance: null,
  deliveryMinutes: null,
  images: [
    'https://images.unsplash.com/photo-1509040159596-0249088772ff?w=500&h=625&fit=crop',
    'https://images.unsplash.com/photo-1607623814075-e51df1bdc82f?w=500&h=625&fit=crop',
    'https://images.unsplash.com/photo-1585080498000-6bead70c6721?w=500&h=625&fit=crop'
  ],
  product: {
    name: 'Croissant Clássico',
    category: 'Pães & Croissants',
    currentPrice: 990,
    originalPrice: 1290,
    available: true,
    description: 'Croissant manteguado feito com massa folhada em 48 camadas. Crocante por fora, macio e amanteigado por dentro. Feito diariamente com ingredientes premium da região.',
    allergens: ['Glúten', 'Leite', 'Ovos'],
    nutritionFacts: {
      calories: 320,
      fat: 18,
      carbs: 32
    },
    craftStory: {
      preparation: '48 camadas de massa folhada',
      bakingTime: '25 min no forno a 200°C',
      origin: 'Manteiga francesa AOP'
    },
    happyHour: false,
    discount: 23,
    inStock: true,
    bakedAt: new Date(Date.now() - 15 * 60 * 1000)
  },
  relatedProducts: [
    { name: 'Croissant Integ.', price: 1090, image: 'https://images.unsplash.com/photo-1603308991529-fbb62e1f89e7?w=150&h=150&fit=crop' },
    { name: 'Croissant Choco', price: 1190, image: 'https://images.unsplash.com/photo-1509040159596-0249088772ff?w=150&h=150&fit=crop' },
    { name: 'Dor de Leite', price: 890, image: 'https://images.unsplash.com/photo-1607623814075-e51df1bdc82f?w=500&h=625&fit=crop' },
    { name: 'Éclair Choco', price: 1290, image: 'https://images.unsplash.com/photo-1585080498000-6bead70c6721?w=150&h=150&fit=crop' }
  ],
  cartCount: 2,
  init() {
    const geo = sessionStorage.getItem('shopman_geo');
    if (geo) {
      try {
        const data = JSON.parse(geo);
        this.userDistance = data.distance;
        this.deliveryMinutes = data.deliveryMinutes || 18;
      } catch (e) {}
    }
  },
  freshness() {
    const minutes = Math.floor((Date.now() - this.product.bakedAt) / 60000);
    if (minutes < 60) {
      return { text: `Saiu do forno há ${minutes} min`, icon: 'local_fire', color: 'text-emerald-600' };
    }
    const nextBake = new Date(Date.now() + 3 * 60 * 60 * 1000);
    const hours = nextBake.getHours();
    const mins = String(nextBake.getMinutes()).padStart(2, '0');
    return { text: `Próxima fornada: ${hours}h${mins}`, icon: 'schedule', color: 'text-blue-600' };
  },
  get deliveryEstimate() {
    if (this.userDistance !== null && this.userDistance < 5) {
      return `Entrega em ~${this.deliveryMinutes || 18} min para sua localização`;
    } else if (this.userDistance !== null && this.userDistance >= 5) {
      return 'Retirada disponível';
    }
    return 'Entrega ou retirada disponível';
  },
  get temporalRelatedProducts() {
    if (this.hour < 12) {
      return [
        { name: 'Café Espresso', price: 690, image: 'https://images.unsplash.com/photo-1461023058943-07fcbe16d735?w=150&h=150&fit=crop' },
        { name: 'Suco Natural', price: 1290, image: 'https://images.unsplash.com/photo-1572490122747-3968b75cc699?w=150&h=150&fit=crop' },
        { name: 'Croissant Integ.', price: 1090, image: 'https://images.unsplash.com/photo-1603308991529-fbb62e1f89e7?w=150&h=150&fit=crop' },
        { name: 'Éclair Choco', price: 1290, image: 'https://images.unsplash.com/photo-1585080498000-6bead70c6721?w=150&h=150&fit=crop' }
      ];
    } else if (this.hour < 14) {
      return [
        { name: 'Salada Verde', price: 1890, image: 'https://images.unsplash.com/photo-1540189549336-e6e99c3679fe?w=150&h=150&fit=crop' },
        { name: 'Suco Natural', price: 1290, image: 'https://images.unsplash.com/photo-1572490122747-3968b75cc699?w=150&h=150&fit=crop' },
        { name: 'Pão Natural', price: 1890, image: 'https://images.unsplash.com/photo-1549931319-a545753467c8?w=150&h=150&fit=crop' },
        { name: 'Dor de Leite', price: 890, image: 'https://images.unsplash.com/photo-1607623814075-e51df1bdc82f?w=150&h=150&fit=crop' }
      ];
    } else if (this.hour < 18) {
      return [
        { name: 'Café Espresso', price: 690, image: 'https://images.unsplash.com/photo-1461023058943-07fcbe16d735?w=150&h=150&fit=crop' },
        { name: 'Éclair de Baunilha', price: 890, image: 'https://images.unsplash.com/photo-1464305795204-6f5bbfc7fb81?w=150&h=150&fit=crop' },
        { name: 'Pain au Chocolat', price: 1190, image: 'https://images.unsplash.com/photo-1587668178277-295251f900ce?w=150&h=150&fit=crop' },
        { name: 'Croissant Choco', price: 1190, image: 'https://images.unsplash.com/photo-1509040159596-0249088772ff?w=150&h=150&fit=crop' }
      ];
    } else {
      return [
        { name: 'Croissant Integ.', price: 1090, image: 'https://images.unsplash.com/photo-1603308991529-fbb62e1f89e7?w=150&h=150&fit=crop' },
        { name: 'Croissant Choco', price: 1190, image: 'https://images.unsplash.com/photo-1509040159596-0249088772ff?w=150&h=150&fit=crop' },
        { name: 'Dor de Leite', price: 890, image: 'https://images.unsplash.com/photo-1607623814075-e51df1bdc82f?w=150&h=150&fit=crop' },
        { name: 'Pão Natural', price: 1890, image: 'https://images.unsplash.com/photo-1549931319-a545753467c8?w=150&h=150&fit=crop' }
      ];
    }
  },
  formatPrice(value) {
    return new Intl.NumberFormat('pt-BR', {
      style: 'currency',
      currency: 'BRL'
    }).format(value / 100);
  },
  shareProduct() {
    const text = `${this.product.name} - ${this.formatPrice(this.product.currentPrice)} em Nelson Boulangerie`;
    const url = window.location.href;

    if (navigator.share) {
      navigator.share({
        title: this.product.name,
        text: text,
        url: url
      }).catch(() => {});
    } else {
      const waUrl = `https://wa.me/?text=${encodeURIComponent(text + ' ' + url)}`;
      window.open(waUrl, '_blank');
    }
  },
  addToCart() {
    this.cartCount += this.quantity;
    this.addedToCart = true;
    this.flashBottom = true;

    if (navigator.vibrate) {
      navigator.vibrate(15);
    }

    setTimeout(() => {
      this.flashBottom = false;
    }, 600);

    setTimeout(() => {
      this.addedToCart = false;
      this.quantity = 1;
    }, 2000);
  },
  decreaseQty() {
    if (this.quantity > 1) this.quantity--;
  },
  increaseQty() {
    this.quantity++;
  }
}">

  <!-- Sticky Header -->
  <header class="sticky top-0 z-50 h-12 bg-white border-b border-neutral-200 flex items-center px-4" style="padding-top: var(--sat)">
    <div class="flex items-center justify-between w-full max-w-lg mx-auto">
      <a href="menu.html" class="flex items-center justify-center w-10 h-10 text-neutral-900 no-underline hover:bg-neutral-100 rounded-lg transition-colors" aria-label="Voltar">
        <span class="material-symbols-rounded text-[20px]">arrow_back</span>
      </a>
      <h1 class="flex-1 text-center text-sm font-semibold text-neutral-900 truncate px-2" x-text="product.name"></h1>
      <div class="flex items-center gap-1">
        <button @click="shareProduct()" class="flex items-center justify-center w-10 h-10 text-neutral-900 no-underline hover:bg-neutral-100 rounded-lg transition-colors" aria-label="Compartilhar">
          <span class="material-symbols-rounded text-[20px]">share</span>
        </button>
        <a href="cart.html" class="relative flex items-center justify-center w-10 h-10 text-neutral-900 no-underline hover:bg-neutral-100 rounded-lg transition-colors" aria-label="Carrinho">
          <span class="material-symbols-rounded text-[20px]">shopping_bag</span>
          <span class="absolute top-1 right-1 w-4 h-4 bg-neutral-900 text-white text-[10px] font-semibold rounded-full flex items-center justify-center" x-text="cartCount" x-show="cartCount > 0"></span>
        </a>
      </div>
    </div>
  </header>

  <!-- Product Image -->
  <div class="w-full aspect-[4/5] bg-neutral-100 overflow-hidden">
    <img :src="images[selectedImage]" :alt="product.name" class="w-full h-full object-cover">
  </div>

  <!-- Image Dots -->
  <div class="flex justify-center gap-2 py-3 px-4">
    <template x-for="(_, index) in images" :key="index">
      <button @click="selectedImage = index" :class="selectedImage === index ? 'bg-neutral-900' : 'bg-neutral-300'" class="w-11 h-11 rounded-full transition-colors flex items-center justify-center" :aria-label="`Imagem ${index + 1}`">
        <div :class="selectedImage === index ? 'bg-neutral-900' : 'bg-neutral-300'" class="w-2.5 h-2.5 rounded-full"></div>
      </button>
    </template>
  </div>

  <!-- Info Card (Overlapping) -->
  <div class="relative z-10 mx-4 -mt-4 bg-white border border-neutral-200 rounded-lg p-4">
    <!-- Name & Category -->
    <div class="mb-3">
      <h2 class="font-display text-2xl font-semibold text-neutral-900 mb-0.5" x-text="product.name"></h2>
      <p class="text-xs font-medium text-neutral-500 uppercase tracking-wider" x-text="product.category"></p>
      <!-- Returning customer recognition -->
      <div x-show="isReturning" class="text-xs text-neutral-500 flex items-center gap-1 mt-2">
        <span class="material-symbols-rounded text-[14px]">history</span>
        <span>Você já pediu este item</span>
      </div>
    </div>

    <!-- Price Row -->
    <div class="flex items-baseline gap-2 mb-3">
      <span class="text-xl font-semibold text-neutral-900" x-text="formatPrice(product.currentPrice)"></span>
      <span class="text-sm font-medium text-neutral-400 line-through" x-text="formatPrice(product.originalPrice)" x-show="product.originalPrice > product.currentPrice"></span>
      <span class="rounded-md bg-amber-500 text-white text-[10px] px-1.5 py-0.5 font-semibold" x-text="`-${product.discount}%`" x-show="product.discount > 0"></span>
    </div>

    <!-- Availability -->
    <div class="flex items-center gap-2 mb-3">
      <div :class="product.inStock ? 'bg-green-500' : 'bg-neutral-300'" class="w-2 h-2 rounded-full"></div>
      <span class="text-sm text-neutral-700" x-text="product.inStock ? 'Disponível' : 'Indisponível'"></span>
    </div>

    <!-- Delivery Estimate -->
    <div class="text-xs text-neutral-600 mb-3">
      <span x-text="deliveryEstimate"></span>
    </div>

    <!-- Freshness Indicator -->
    <div class="flex items-center gap-2 mb-4 pb-3 border-b border-neutral-200">
      <span :class="freshness().color" class="material-symbols-rounded text-[18px]" x-text="freshness().icon"></span>
      <span :class="freshness().color" class="text-sm font-medium" x-text="freshness().text"></span>
    </div>

    <!-- Happy Hour Notice -->
    <div x-show="product.happyHour" class="rounded-md bg-amber-50 border border-amber-200 px-3 py-2">
      <p class="text-xs font-medium text-amber-900">🎉 Happy Hour: -20% até 15h</p>
    </div>
  </div>

  <!-- Description -->
  <div class="px-4 mt-4">
    <div :class="showFullDesc ? '' : 'line-clamp-2'" class="text-sm text-neutral-700 mb-2" x-text="product.description"></div>
    <button @click="showFullDesc = !showFullDesc" class="text-sm font-medium text-neutral-900 no-underline" x-text="showFullDesc ? 'Ler menos' : 'Ler mais'"></button>
  </div>

  <!-- Craft Story / Density -->
  <div class="px-4 mt-4 border-b border-neutral-200 pb-4">
    <button @click="showCraftStory = !showCraftStory" class="flex items-center justify-between w-full text-sm font-medium text-neutral-900">
      <span>Sobre este produto</span>
      <span class="material-symbols-rounded text-[18px]" :class="showCraftStory && 'rotate-180'" style="transition: transform 0.3s">expand_more</span>
    </button>
    <div x-show="showCraftStory" x-transition class="mt-3 space-y-2 text-sm text-neutral-700">
      <div class="flex gap-2">
        <span class="material-symbols-rounded text-[16px] text-neutral-500 flex-shrink-0">baking</span>
        <div>
          <p class="font-medium text-neutral-900">Método</p>
          <p x-text="product.craftStory.preparation"></p>
        </div>
      </div>
      <div class="flex gap-2">
        <span class="material-symbols-rounded text-[16px] text-neutral-500 flex-shrink-0">schedule</span>
        <div>
          <p class="font-medium text-neutral-900">Tempo de Forno</p>
          <p x-text="product.craftStory.bakingTime"></p>
        </div>
      </div>
      <div class="flex gap-2">
        <span class="material-symbols-rounded text-[16px] text-neutral-500 flex-shrink-0">public</span>
        <div>
          <p class="font-medium text-neutral-900">Origem</p>
          <p x-text="product.craftStory.origin"></p>
        </div>
      </div>
    </div>
  </div>

  <!-- Allergens -->
  <div class="px-4 mt-4 pb-4 border-b border-neutral-200">
    <p class="text-xs font-medium text-neutral-500 uppercase tracking-wider mb-2">Alérgenos</p>
    <div class="flex flex-wrap gap-2">
      <template x-for="allergen in product.allergens" :key="allergen">
        <span class="rounded-md bg-neutral-100 px-3 py-1.5 text-xs text-neutral-700" x-text="allergen"></span>
      </template>
    </div>
  </div>

  <!-- Nutritional Info -->
  <div class="px-4 mt-4 pb-4 border-b border-neutral-200">
    <p class="text-xs font-medium text-neutral-500 uppercase tracking-wider mb-2">Valores Nutricionais (por porção)</p>
    <div class="flex flex-wrap gap-2">
      <span class="rounded-md bg-neutral-100 px-3 py-1.5 text-xs font-medium text-neutral-900">
        <span x-text="product.nutritionFacts.calories"></span> kcal
      </span>
      <span class="rounded-md bg-neutral-100 px-3 py-1.5 text-xs font-medium text-neutral-900">
        <span x-text="product.nutritionFacts.fat"></span>g gordura
      </span>
      <span class="rounded-md bg-neutral-100 px-3 py-1.5 text-xs font-medium text-neutral-900">
        <span x-text="product.nutritionFacts.carbs"></span>g carb
      </span>
    </div>
  </div>

  <!-- Related Products: Leva bem com... -->
  <div class="mt-6 pb-28">
    <h3 class="text-xs font-medium text-neutral-500 uppercase tracking-wider px-4 mb-3">Leva bem com...</h3>
    <div class="flex gap-3 px-4 overflow-x-auto hide-scrollbar pb-1">
      <template x-for="item in temporalRelatedProducts" :key="item.name">
        <div class="flex-shrink-0 w-32">
          <div class="mb-2">
            <img :src="item.image" :alt="item.name" class="w-32 h-32 object-cover rounded-lg">
          </div>
          <p class="text-xs font-medium text-neutral-900 truncate" x-text="item.name"></p>
          <p class="text-xs font-semibold text-neutral-900 mt-1" x-text="formatPrice(item.price)"></p>
        </div>
      </template>
    </div>
  </div>

  <!-- Sticky Bottom Bar -->
  <div class="fixed bottom-0 inset-x-0 z-40 bg-white border-t border-neutral-200 transition-colors" :class="flashBottom && 'flash-success'" style="padding-bottom: var(--sab)">
    <div class="max-w-lg mx-auto px-4">
      <!-- Closing awareness note -->
      <div x-show="hour >= closingHour - 1" class="py-2 text-xs text-neutral-600 text-center border-b border-neutral-200">
        Pedido para retirada hoje
      </div>

      <div class="py-3 flex items-center gap-3">
        <!-- Quantity Controls -->
        <div class="flex items-center border border-neutral-200 rounded-lg h-10">
          <button @click="decreaseQty()" class="flex-1 flex items-center justify-center text-neutral-900 font-semibold text-[18px] min-w-[44px]">−</button>
          <div class="w-8 flex items-center justify-center border-l border-r border-neutral-200 text-sm font-medium text-neutral-900" x-text="quantity"></div>
          <button @click="increaseQty()" class="flex-1 flex items-center justify-center text-neutral-900 font-semibold text-[18px] min-w-[44px]">+</button>
        </div>

        <!-- Add to Cart Button -->
        <button @click="addToCart()" class="flex-1 rounded-lg bg-neutral-900 text-white text-sm font-semibold h-11 flex items-center justify-center active:scale-[0.97] transition-transform">
          <span x-show="!addedToCart" x-text="`Adicionar · ${formatPrice(product.currentPrice * quantity)}`"></span>
          <span x-show="addedToCart" class="flex items-center gap-1">
            <span class="material-symbols-rounded text-[18px]">check</span>
            Adicionado!
          </span>
        </button>
      </div>
    </div>
  </div>

  <script src="proto-scenarios.js"></script>
</body>
</html>
