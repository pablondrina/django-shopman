<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Minha Conta – Nelson Boulangerie</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&display=swap">
    <style>
        :root {
            --sat: env(safe-area-inset-top, 0px);
            --sab: env(safe-area-inset-bottom, 0px);
        }
        .font-display {
            font-family: 'Playfair Display', Georgia, serif;
        }
    </style>
</head>
<body class="bg-neutral-50 text-neutral-900" x-data="accountApp()">
    <div class="min-h-screen flex flex-col">
        <!-- LOGGED IN STATE -->
        <template x-if="loggedIn">
            <div class="flex flex-col flex-1">
                <!-- Header with dynamic title -->
                <header class="h-12 bg-white border-b border-neutral-200 flex items-center px-4 sticky top-0 z-50" style="padding-top: var(--sat)">
                    <template x-if="activePanel === 'main'">
                        <h1 class="text-base font-semibold" x-text="getGreeting()"></h1>
                    </template>
                    <template x-if="activePanel === 'orders'">
                        <div class="flex items-center gap-3 flex-1">
                            <button @click="activePanel = 'main'; triggerHaptic(10)" class="flex items-center justify-center w-10 h-10 rounded-lg hover:bg-neutral-100 transition">
                                <span class="material-symbols-rounded text-[20px]">arrow_back</span>
                            </button>
                            <h1 class="text-base font-semibold">Meus Pedidos</h1>
                        </div>
                    </template>
                    <template x-if="activePanel === 'addresses'">
                        <div class="flex items-center gap-3 flex-1">
                            <button @click="activePanel = 'main'; triggerHaptic(10)" class="flex items-center justify-center w-8 h-8 rounded-lg hover:bg-neutral-100 transition">
                                <span class="material-symbols-rounded text-[20px]">arrow_back</span>
                            </button>
                            <h1 class="text-base font-semibold">Endereços</h1>
                        </div>
                    </template>
                    <template x-if="activePanel === 'loyalty'">
                        <div class="flex items-center gap-3 flex-1">
                            <button @click="activePanel = 'main'; triggerHaptic(10)" class="flex items-center justify-center w-8 h-8 rounded-lg hover:bg-neutral-100 transition">
                                <span class="material-symbols-rounded text-[20px]">arrow_back</span>
                            </button>
                            <h1 class="text-base font-semibold">Fidelidade</h1>
                        </div>
                    </template>
                    <template x-if="activePanel === 'payments'">
                        <div class="flex items-center gap-3 flex-1">
                            <button @click="activePanel = 'main'; triggerHaptic(10)" class="flex items-center justify-center w-8 h-8 rounded-lg hover:bg-neutral-100 transition">
                                <span class="material-symbols-rounded text-[20px]">arrow_back</span>
                            </button>
                            <h1 class="text-base font-semibold">Pagamentos</h1>
                        </div>
                    </template>
                    <template x-if="activePanel === 'notifications'">
                        <div class="flex items-center gap-3 flex-1">
                            <button @click="activePanel = 'main'; triggerHaptic(10)" class="flex items-center justify-center w-8 h-8 rounded-lg hover:bg-neutral-100 transition">
                                <span class="material-symbols-rounded text-[20px]">arrow_back</span>
                            </button>
                            <h1 class="text-base font-semibold">Notificações</h1>
                        </div>
                    </template>
                    <template x-if="activePanel === 'personal'">
                        <div class="flex items-center gap-3 flex-1">
                            <button @click="activePanel = 'main'; triggerHaptic(10)" class="flex items-center justify-center w-8 h-8 rounded-lg hover:bg-neutral-100 transition">
                                <span class="material-symbols-rounded text-[20px]">arrow_back</span>
                            </button>
                            <h1 class="text-base font-semibold">Dados Pessoais</h1>
                        </div>
                    </template>
                    <template x-if="activePanel === 'about'">
                        <div class="flex items-center gap-3 flex-1">
                            <button @click="activePanel = 'main'; triggerHaptic(10)" class="flex items-center justify-center w-8 h-8 rounded-lg hover:bg-neutral-100 transition">
                                <span class="material-symbols-rounded text-[20px]">arrow_back</span>
                            </button>
                            <h1 class="text-base font-semibold">Sobre a Loja</h1>
                        </div>
                    </template>
                </header>

                <!-- Main Content -->
                <main class="flex-1 overflow-y-auto pb-16">
                    <!-- PANEL: main -->
                    <template x-if="activePanel === 'main'">
                        <div class="space-y-6">
                            <!-- Profile Section -->
                            <section class="bg-white border-b border-neutral-200 px-4 py-6">
                                <div class="max-w-lg mx-auto flex items-start gap-4">
                                    <div class="w-14 h-14 rounded-full bg-neutral-200 flex items-center justify-center flex-shrink-0">
                                        <span class="material-symbols-rounded text-[32px] text-neutral-500">person</span>
                                    </div>
                                    <div class="flex-1">
                                        <div class="flex items-center justify-between mb-1">
                                            <h2 class="text-base font-semibold">Maria Silva</h2>
                                            <button @click="activePanel = 'personal'; triggerHaptic(10)" class="text-xs text-neutral-500 underline hover:text-neutral-700 transition">Editar</button>
                                        </div>
                                        <p class="text-xs text-neutral-500 mb-2">(11) 99999-0000</p>
                                        <p class="text-xs text-neutral-400">Cliente desde mar/2025</p>
                                    </div>
                                </div>
                            </section>

                            <!-- Quick Actions Grid -->
                            <section class="px-4 max-w-lg mx-auto">
                                <div class="grid grid-cols-2 gap-4">
                                    <button @click="activePanel = 'orders'; triggerHaptic(10)" class="bg-white border border-neutral-200 rounded-lg p-4 flex flex-col items-center gap-2 text-center hover:border-neutral-300 transition">
                                        <span class="material-symbols-rounded text-[24px] text-neutral-700">receipt_long</span>
                                        <span class="text-sm font-semibold text-neutral-900">Meus Pedidos</span>
                                        <span class="text-[11px] text-neutral-500">3 pedidos</span>
                                    </button>

                                    <button @click="activePanel = 'addresses'; triggerHaptic(10)" class="bg-white border border-neutral-200 rounded-lg p-4 flex flex-col items-center gap-2 text-center hover:border-neutral-300 transition">
                                        <span class="material-symbols-rounded text-[24px] text-neutral-700">location_on</span>
                                        <span class="text-sm font-semibold text-neutral-900">Endereços</span>
                                        <span class="text-[11px] text-neutral-500">📍 Perto de você</span>
                                    </button>

                                    <button @click="activePanel = 'loyalty'; triggerHaptic(10)" class="bg-white border border-neutral-200 rounded-lg p-4 flex flex-col items-center gap-2 text-center hover:border-neutral-300 transition">
                                        <div class="relative">
                                            <span class="material-symbols-rounded text-[24px] text-neutral-700">loyalty</span>
                                            <span class="absolute -top-1 -right-1 inline-flex items-center justify-center w-5 h-5 rounded-full bg-amber-500 text-white text-[10px] font-bold" x-text="loyaltyPoints"></span>
                                        </div>
                                        <span class="text-sm font-semibold text-neutral-900">Fidelidade</span>
                                        <span class="text-[11px] text-neutral-500" x-text="loyaltyPoints + ' pts'"></span>
                                    </button>

                                    <button @click="activePanel = 'payments'; triggerHaptic(10)" class="bg-white border border-neutral-200 rounded-lg p-4 flex flex-col items-center gap-2 text-center hover:border-neutral-300 transition">
                                        <span class="material-symbols-rounded text-[24px] text-neutral-700">credit_card</span>
                                        <span class="text-sm font-semibold text-neutral-900">Pagamentos</span>
                                        <span class="text-[11px] text-neutral-500">PIX preferido</span>
                                    </button>
                                </div>
                            </section>

                            <!-- Loyalty Celebration -->
                            <template x-if="loyaltyPoints >= 100 && loyaltyPoints < 200">
                                <section class="px-4 max-w-lg mx-auto">
                                    <div class="bg-amber-50 border border-amber-200 rounded-lg p-4 text-center">
                                        <p class="text-sm font-medium text-amber-900">
                                            Quase lá! Faltam apenas <span x-text="200 - loyaltyPoints"></span> pts para Prata
                                        </p>
                                    </div>
                                </section>
                            </template>

                            <!-- Recent Orders Preview -->
                            <section class="px-4 max-w-lg mx-auto">
                                <div class="flex items-center justify-between mb-4">
                                    <h2 class="font-display text-lg font-semibold">Últimos Pedidos</h2>
                                    <button @click="activePanel = 'orders'; triggerHaptic(10)" class="text-sm font-medium text-neutral-500 underline hover:text-neutral-700 transition">Ver todos</button>
                                </div>
                                <div class="space-y-3">
                                    <div class="bg-white border border-neutral-200 rounded-lg p-4">
                                        <div class="flex items-start justify-between gap-3 mb-2">
                                            <div class="flex-1">
                                                <div class="flex items-center gap-2 mb-1">
                                                    <span class="text-sm font-semibold text-neutral-900">#NB-0042</span>
                                                    <span class="inline-flex items-center px-2 py-0.5 rounded-md bg-emerald-50 text-[10px] font-medium text-emerald-700">Entregue</span>
                                                </div>
                                                <p class="text-xs text-neutral-500">Há 2 dias · 3 itens · R$ 38,60</p>
                                            </div>
                                        </div>
                                        <p class="text-xs text-neutral-600 mb-3">2× Croissant, 1× Café</p>
                                        <div class="flex gap-2">
                                            <button @click="triggerHaptic(10)" class="flex-1 rounded-md bg-neutral-900 text-white text-xs font-medium py-2 hover:bg-neutral-800 transition">
                                                Repetir
                                            </button>
                                            <button @click="triggerHaptic(10)" class="flex-1 rounded-md bg-neutral-100 text-neutral-900 text-xs font-medium py-2 hover:bg-neutral-200 transition">
                                                Detalhes
                                            </button>
                                        </div>
                                    </div>

                                    <div class="bg-white border border-neutral-200 rounded-lg p-4">
                                        <div class="flex items-start justify-between gap-3 mb-2">
                                            <div class="flex-1">
                                                <div class="flex items-center gap-2 mb-1">
                                                    <span class="text-sm font-semibold text-neutral-900">#NB-0038</span>
                                                    <span class="inline-flex items-center px-2 py-0.5 rounded-md bg-emerald-50 text-[10px] font-medium text-emerald-700">Entregue</span>
                                                </div>
                                                <p class="text-xs text-neutral-500">Há 5 dias · 2 itens · R$ 25,80</p>
                                            </div>
                                        </div>
                                        <p class="text-xs text-neutral-600 mb-3">1× Pain au Chocolat, 1× Café</p>
                                        <div class="flex gap-2">
                                            <button @click="triggerHaptic(10)" class="flex-1 rounded-md bg-neutral-900 text-white text-xs font-medium py-2 hover:bg-neutral-800 transition">
                                                Repetir
                                            </button>
                                            <button @click="triggerHaptic(10)" class="flex-1 rounded-md bg-neutral-100 text-neutral-900 text-xs font-medium py-2 hover:bg-neutral-200 transition">
                                                Detalhes
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </section>

                            <!-- Settings List -->
                            <section class="mt-8 max-w-lg mx-auto">
                                <h2 class="font-display text-lg font-semibold px-4 mb-3">Configurações</h2>
                                <div class="bg-white border-t border-b border-neutral-200">
                                    <button @click="activePanel = 'notifications'; triggerHaptic(10)" class="w-full flex items-center gap-3 px-4 py-3 border-b border-neutral-100 text-neutral-900 hover:bg-neutral-50 transition">
                                        <span class="material-symbols-rounded text-[20px] text-neutral-500">notifications</span>
                                        <span class="text-sm font-medium flex-1 text-left">Notificações</span>
                                        <span class="material-symbols-rounded text-[20px] text-neutral-300">chevron_right</span>
                                    </button>

                                    <button @click="activePanel = 'personal'; triggerHaptic(10)" class="w-full flex items-center gap-3 px-4 py-3 border-b border-neutral-100 text-neutral-900 hover:bg-neutral-50 transition">
                                        <span class="material-symbols-rounded text-[20px] text-neutral-500">badge</span>
                                        <span class="text-sm font-medium flex-1 text-left">Dados Pessoais</span>
                                        <span class="material-symbols-rounded text-[20px] text-neutral-300">chevron_right</span>
                                    </button>

                                    <button @click="activePanel = 'about'; triggerHaptic(10)" class="w-full flex items-center gap-3 px-4 py-3 border-b border-neutral-100 text-neutral-900 hover:bg-neutral-50 transition">
                                        <span class="material-symbols-rounded text-[20px] text-neutral-500">storefront</span>
                                        <span class="text-sm font-medium flex-1 text-left">Sobre a Loja</span>
                                        <span class="material-symbols-rounded text-[20px] text-neutral-300">chevron_right</span>
                                    </button>

                                    <button @click="loggedIn = false; triggerHaptic(10)" class="w-full flex items-center gap-3 px-4 py-3 text-red-600 hover:bg-red-50 transition">
                                        <span class="material-symbols-rounded text-[20px] text-red-600">logout</span>
                                        <span class="text-sm font-medium flex-1 text-left">Sair</span>
                                        <span class="material-symbols-rounded text-[20px] text-neutral-300">chevron_right</span>
                                    </button>
                                </div>
                            </section>

                            <div class="h-4"></div>
                        </div>
                    </template>

                    <!-- PANEL: orders -->
                    <template x-if="activePanel === 'orders'">
                        <div class="px-4 max-w-lg mx-auto py-6 space-y-4">
                            <!-- Order 1 -->
                            <div class="bg-white border border-neutral-200 rounded-lg p-4">
                                <div class="flex items-start justify-between gap-3 mb-3">
                                    <div class="flex-1">
                                        <div class="flex items-center gap-2 mb-1">
                                            <span class="text-sm font-semibold text-neutral-900">#NB-0042</span>
                                            <span class="inline-flex items-center px-2 py-0.5 rounded-md bg-emerald-50 text-[10px] font-medium text-emerald-700">Entregue</span>
                                        </div>
                                        <p class="text-xs text-neutral-500">Há 2 dias · R$ 38,60</p>
                                    </div>
                                </div>
                                <div class="mb-3 pb-3 border-b border-neutral-100">
                                    <p class="text-xs text-neutral-600 mb-2">2× Croissant</p>
                                    <p class="text-xs text-neutral-600">1× Café com leite</p>
                                </div>
                                <div class="flex gap-2">
                                    <button @click="triggerHaptic(10)" class="flex-1 rounded-md bg-neutral-900 text-white text-xs font-medium py-2 hover:bg-neutral-800 transition">
                                        Repetir
                                    </button>
                                    <button @click="triggerHaptic(10)" class="flex-1 rounded-md bg-neutral-100 text-neutral-900 text-xs font-medium py-2 hover:bg-neutral-200 transition">
                                        Rastrear
                                    </button>
                                </div>
                            </div>

                            <!-- Order 2 -->
                            <div class="bg-white border border-neutral-200 rounded-lg p-4">
                                <div class="flex items-start justify-between gap-3 mb-3">
                                    <div class="flex-1">
                                        <div class="flex items-center gap-2 mb-1">
                                            <span class="text-sm font-semibold text-neutral-900">#NB-0038</span>
                                            <span class="inline-flex items-center px-2 py-0.5 rounded-md bg-emerald-50 text-[10px] font-medium text-emerald-700">Entregue</span>
                                        </div>
                                        <p class="text-xs text-neutral-500">Há 5 dias · R$ 25,80</p>
                                    </div>
                                </div>
                                <div class="mb-3 pb-3 border-b border-neutral-100">
                                    <p class="text-xs text-neutral-600 mb-2">1× Pain au Chocolat</p>
                                    <p class="text-xs text-neutral-600">1× Café</p>
                                </div>
                                <div class="flex gap-2">
                                    <button @click="triggerHaptic(10)" class="flex-1 rounded-md bg-neutral-900 text-white text-xs font-medium py-2 hover:bg-neutral-800 transition">
                                        Repetir
                                    </button>
                                    <button @click="triggerHaptic(10)" class="flex-1 rounded-md bg-neutral-100 text-neutral-900 text-xs font-medium py-2 hover:bg-neutral-200 transition">
                                        Rastrear
                                    </button>
                                </div>
                            </div>

                            <!-- Order 3 -->
                            <div class="bg-white border border-neutral-200 rounded-lg p-4">
                                <div class="flex items-start justify-between gap-3 mb-3">
                                    <div class="flex-1">
                                        <div class="flex items-center gap-2 mb-1">
                                            <span class="text-sm font-semibold text-neutral-900">#NB-0035</span>
                                            <span class="inline-flex items-center px-2 py-0.5 rounded-md bg-emerald-50 text-[10px] font-medium text-emerald-700">Entregue</span>
                                        </div>
                                        <p class="text-xs text-neutral-500">Há 10 dias · R$ 52,00</p>
                                    </div>
                                </div>
                                <div class="mb-3 pb-3 border-b border-neutral-100">
                                    <p class="text-xs text-neutral-600 mb-2">1× Éclair de Chocolate</p>
                                    <p class="text-xs text-neutral-600 mb-2">2× Macaron</p>
                                    <p class="text-xs text-neutral-600">1× Suco natural</p>
                                </div>
                                <div class="flex gap-2">
                                    <button @click="triggerHaptic(10)" class="flex-1 rounded-md bg-neutral-900 text-white text-xs font-medium py-2 hover:bg-neutral-800 transition">
                                        Repetir
                                    </button>
                                    <button @click="triggerHaptic(10)" class="flex-1 rounded-md bg-neutral-100 text-neutral-900 text-xs font-medium py-2 hover:bg-neutral-200 transition">
                                        Rastrear
                                    </button>
                                </div>
                            </div>

                            <div class="h-4"></div>
                        </div>
                    </template>

                    <!-- PANEL: addresses -->
                    <template x-if="activePanel === 'addresses'">
                        <div class="px-4 max-w-lg mx-auto py-6 space-y-4">
                            <div class="space-y-3">
                                <!-- Address 1 -->
                                <div class="bg-white border border-neutral-200 rounded-lg p-4">
                                    <div class="flex items-start justify-between gap-3 mb-2">
                                        <div class="flex-1">
                                            <p class="text-sm font-semibold text-neutral-900 mb-1">Casa</p>
                                            <p class="text-xs text-neutral-600 mb-2">Rua das Flores, 123 – Apto 42</p>
                                            <p class="text-xs text-neutral-600 mb-2">Vila Mariana, São Paulo, SP 01234-567</p>
                                            <p class="text-xs text-neutral-500">1,2 km de distância</p>
                                        </div>
                                    </div>
                                    <div class="pt-3 border-t border-neutral-100 flex gap-2">
                                        <button @click="openEditAddress(0); triggerHaptic(10)" class="flex-1 rounded-md bg-neutral-900 text-white text-xs font-medium py-2 hover:bg-neutral-800 transition">
                                            Editar
                                        </button>
                                        <button @click="deleteAddress(0); triggerHaptic(10)" class="flex-1 rounded-md bg-red-50 text-red-600 text-xs font-medium py-2 hover:bg-red-100 transition">
                                            Remover
                                        </button>
                                    </div>
                                </div>

                                <!-- Address 2 -->
                                <div class="bg-white border border-neutral-200 rounded-lg p-4">
                                    <div class="flex items-start justify-between gap-3 mb-2">
                                        <div class="flex-1">
                                            <p class="text-sm font-semibold text-neutral-900 mb-1">Trabalho</p>
                                            <p class="text-xs text-neutral-600 mb-2">Avenida Paulista, 1000 – Sala 512</p>
                                            <p class="text-xs text-neutral-600 mb-2">Bela Vista, São Paulo, SP 01311-200</p>
                                            <p class="text-xs text-neutral-500">3,5 km de distância</p>
                                        </div>
                                    </div>
                                    <div class="pt-3 border-t border-neutral-100 flex gap-2">
                                        <button @click="openEditAddress(1); triggerHaptic(10)" class="flex-1 rounded-md bg-neutral-900 text-white text-xs font-medium py-2 hover:bg-neutral-800 transition">
                                            Editar
                                        </button>
                                        <button @click="deleteAddress(1); triggerHaptic(10)" class="flex-1 rounded-md bg-red-50 text-red-600 text-xs font-medium py-2 hover:bg-red-100 transition">
                                            Remover
                                        </button>
                                    </div>
                                </div>
                            </div>

                            <!-- Add Address Button -->
                            <button @click="openAddressForm(); triggerHaptic(10)" class="w-full bg-neutral-900 text-white rounded-lg min-h-[44px] py-3 font-medium text-sm hover:bg-neutral-800 transition flex items-center justify-center gap-2">
                                <span class="material-symbols-rounded">add</span>
                                Adicionar endereço
                            </button>

                            <div class="h-4"></div>
                        </div>
                    </template>

                    <!-- PANEL: loyalty -->
                    <template x-if="activePanel === 'loyalty'">
                        <div class="px-4 max-w-lg mx-auto py-6 space-y-6">
                            <!-- Loyalty Card -->
                            <div class="bg-gradient-to-br from-amber-50 to-amber-100 border border-amber-200 rounded-lg p-6">
                                <div class="flex items-center justify-between mb-4">
                                    <div class="flex items-center gap-2">
                                        <span class="material-symbols-rounded text-[24px] text-amber-600">loyalty</span>
                                        <span class="text-sm font-medium text-amber-900">Seu Tier</span>
                                    </div>
                                    <span class="text-lg font-semibold text-amber-900">Bronze</span>
                                </div>
                                <div class="mb-4">
                                    <p class="text-3xl font-semibold text-amber-900 mb-1" x-text="loyaltyPoints + ' pontos'"></p>
                                    <p class="text-xs text-amber-800" x-text="'Faltam ' + (200 - loyaltyPoints) + ' pts para Prata'"></p>
                                </div>
                                <div class="w-full h-2 bg-amber-200 rounded-full overflow-hidden">
                                    <div class="h-full bg-amber-600 rounded-full" :style="'width: ' + Math.min(100, (loyaltyPoints / 2)) + '%'"></div>
                                </div>
                            </div>

                            <!-- Benefits -->
                            <div class="bg-white border border-neutral-200 rounded-lg p-4">
                                <h3 class="font-display text-base font-semibold mb-3">Benefícios do Bronze</h3>
                                <ul class="space-y-2">
                                    <li class="flex items-start gap-2 text-sm text-neutral-600">
                                        <span class="material-symbols-rounded text-emerald-600 text-[20px] flex-shrink-0">check_circle</span>
                                        <span>1 ponto por real gasto</span>
                                    </li>
                                    <li class="flex items-start gap-2 text-sm text-neutral-600">
                                        <span class="material-symbols-rounded text-emerald-600 text-[20px] flex-shrink-0">check_circle</span>
                                        <span>Cupom de boas-vindas de 10%</span>
                                    </li>
                                    <li class="flex items-start gap-2 text-sm text-neutral-600">
                                        <span class="material-symbols-rounded text-emerald-600 text-[20px] flex-shrink-0">check_circle</span>
                                        <span>Acesso a ofertas semanais</span>
                                    </li>
                                    <li class="flex items-start gap-2 text-sm text-neutral-600">
                                        <span class="material-symbols-rounded text-emerald-600 text-[20px] flex-shrink-0">check_circle</span>
                                        <span>Birthday coupon</span>
                                    </li>
                                </ul>
                            </div>

                            <!-- Recent Point Events -->
                            <div class="bg-white border border-neutral-200 rounded-lg p-4">
                                <h3 class="font-display text-base font-semibold mb-3">Histórico Recente</h3>
                                <div class="space-y-3">
                                    <div class="flex items-center justify-between pb-3 border-b border-neutral-100">

                },

                saveAddress() {
                    if (this.editingAddressIndex !== null) {
                        this.addresses[this.editingAddressIndex] = { ...this.addressForm };
                    } else {
                        this.addresses.push({ ...this.addressForm });
                    }
                    this.closeAddressForm();
                    this.triggerHaptic(10);
                },

                deleteAddress(index) {
                    this.addresses.splice(index, 1);
                },

                savePersonalData() {
                    this.triggerHaptic(10);
                    this.activePanel = 'main';
                }
            };
        }
    </script>
    <script src="proto-scenarios.js"></script>
</body>
</html>
