<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout — Nelson Boulangerie</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&display=swap">
  <style>
    :root { --sat: env(safe-area-inset-top, 0px); --sab: env(safe-area-inset-bottom, 0px); }
    .font-display { font-family: 'Playfair Display', Georgia, serif; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .animate-slide-up { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
  </style>
</head>
<body class="bg-neutral-50 text-neutral-900" x-data="checkoutApp()" x-init="init()">
  <!-- Header -->
  <header class="fixed top-0 inset-x-0 z-50 h-12 bg-white border-b border-neutral-200 flex items-center px-4" style="padding-top: var(--sat)">
    <a href="cart.html" class="flex items-center justify-center w-10 h-10 text-neutral-900 no-underline hover:bg-neutral-100 rounded-lg transition">
      <span class="material-symbols-rounded text-[20px]">arrow_back</span>
    </a>
    <h1 class="flex-1 text-center text-sm font-semibold">Checkout</h1>
    <span class="flex-none text-xs font-medium text-neutral-500"><span x-text="step"></span>/4</span>
  </header>

  <!-- Step Indicator: Single Row with Dots and Lines -->
  <div class="mt-12 px-4 py-4">
    <div class="max-w-lg mx-auto">
      <!-- Dots, Lines, and Labels in single row -->
      <div class="flex items-center gap-0 mb-4">
        <template x-for="(label, s) in ['Dados', 'Entrega', 'Pagamento', 'Revisão']" :key="s">
          <div class="flex items-center flex-1">
            <!-- Dot -->
            <div :class="[
              'flex-shrink-0 w-8 h-8 rounded-full flex items-center justify-center text-[12px] font-semibold',
              (s + 1) < step ? 'bg-neutral-900 text-white' : (s + 1) === step ? 'bg-neutral-900 text-white' : 'bg-neutral-200 text-neutral-400'
            ]">
              <template x-if="(s + 1) < step">
                <span class="material-symbols-rounded text-[16px]">check</span>
              </template>
              <template x-if="(s + 1) >= step">
                <span x-text="s + 1"></span>
              </template>
            </div>
            <!-- Line (between dots) -->
            <template x-if="s < 3">
              <div :class="[s < (step - 1) ? 'bg-neutral-900' : 'bg-neutral-200', 'flex-1 h-0.5 mx-1']"></div>
            </template>
          </div>
        </template>
      </div>
      <!-- Labels row below dots -->
      <div class="flex items-start gap-0">
        <template x-for="(label, s) in ['Dados', 'Entrega', 'Pagamento', 'Revisão']" :key="s">
          <div class="flex-1 text-center">
            <p class="text-[9px] font-medium text-neutral-500" x-text="label"></p>
          </div>
        </template>
      </div>
    </div>
  </div>

  <!-- Content -->
  <div class="max-w-lg mx-auto px-4 pb-28">
    <!-- Step 1: Identificação -->
    <template x-if="step === 1">
      <div class="space-y-6">
        <template x-if="isReturning">
          <div class="bg-emerald-50 border border-emerald-200 rounded-lg p-3">
            <p class="text-sm text-emerald-900">Olá de novo, <span x-text="form.name" class="font-semibold"></span>!</p>
          </div>
        </template>

        <div>
          <h2 class="font-display text-lg font-semibold mb-1">Para quem é esse pedido?</h2>
          <p class="text-sm text-neutral-500">Precisa de seus dados para preparar e entregar</p>
        </div>

        <div class="space-y-4">
          <div>
            <label class="text-xs font-medium text-neutral-500 mb-1 block">Nome *</label>
            <input
              type="text"
              x-model="form.name"
              placeholder="Seu nome completo"
              class="w-full h-10 px-3 text-sm border border-neutral-200 rounded-lg focus:ring-1 focus:ring-neutral-900 focus:border-neutral-900 outline-none"
            />
          </div>

          <div>
            <label class="text-xs font-medium text-neutral-500 mb-1 block">Telefone *</label>
            <input
              type="tel"
              x-model="form.phone"
              @input="maskPhone"
              placeholder="(11) 98765-4321"
              class="w-full h-10 px-3 text-sm border border-neutral-200 rounded-lg focus:ring-1 focus:ring-neutral-900 focus:border-neutral-900 outline-none"
            />
          </div>

          <div>
            <label class="text-xs font-medium text-neutral-500 mb-1 block">Email</label>
            <input
              type="email"
              x-model="form.email"
              placeholder="seu@email.com"
              class="w-full h-10 px-3 text-sm border border-neutral-200 rounded-lg focus:ring-1 focus:ring-neutral-900 focus:border-neutral-900 outline-none"
            />
          </div>
        </div>

        <div class="pt-2 border-t border-neutral-200">
          <a href="account.html" class="text-sm text-neutral-500 hover:text-neutral-900">Já tem conta? Faça login</a>
        </div>
      </div>
    </template>

    <!-- Step 2: Retirada -->
    <template x-if="step === 2">
      <div class="space-y-6">
        <div>
          <h2 class="font-display text-lg font-semibold mb-1">Como você quer receber?</h2>
          <p class="text-sm text-neutral-500">Escolha o método mais conveniente</p>
        </div>

        <div class="grid grid-cols-2 gap-3">
          <button
            @click="form.fulfillment = 'pickup'; form.delivery_address = null; triggerHaptic(15)"
            :class="[
              'p-3 border-2 rounded-lg text-center transition',
              form.fulfillment === 'pickup' ? 'border-neutral-900 bg-neutral-50' : 'border-neutral-200 hover:border-neutral-300'
            ]"
          >
            <span class="material-symbols-rounded text-[24px] block mx-auto mb-1">storefront</span>
            <p class="text-xs font-semibold">Retirada</p>
            <p class="text-[10px] text-neutral-500 mt-1" x-text="getEstimatedTime('pickup')"></p>
          </button>

          <button
            @click="form.fulfillment = 'delivery'; showAddressForm = true; triggerHaptic(15)"
            :class="[
              'p-3 border-2 rounded-lg text-center transition',
              form.fulfillment === 'delivery' ? 'border-neutral-900 bg-neutral-50' : 'border-neutral-200 hover:border-neutral-300'
            ]"
          >
            <span class="material-symbols-rounded text-[24px] block mx-auto mb-1">two_wheeler</span>
            <p class="text-xs font-semibold">Entrega</p>
            <p class="text-[10px] text-neutral-500 mt-1" x-text="getEstimatedTime('delivery')"></p>
          </button>
        </div>

        <template x-if="form.fulfillment === 'pickup'">
          <div class="bg-white border border-neutral-200 rounded-lg p-4 space-y-2">
            <p class="text-xs font-medium text-neutral-500">Local de retirada</p>
            <p class="text-sm font-semibold">Rua das Flores, 1234</p>
            <p class="text-xs text-neutral-500 mt-2">Seg–Sab: 8h–19h | Dom: 9h–18h</p>
          </div>
        </template>

        <template x-if="form.fulfillment === 'delivery'">
          <div class="space-y-3 bg-white border border-neutral-200 rounded-lg p-4">
            <div>
              <button
                @click="useGeolocation()"
                :disabled="geoLoading"
                class="text-xs font-medium text-emerald-600 hover:text-emerald-700 disabled:text-neutral-400 flex items-center gap-1 mb-2"
              >
                <span class="material-symbols-rounded text-[16px]">location_on</span>
                <span x-text="geoLoading ? 'Buscando localização...' : 'Usar minha localização'"></span>
              </button>
              <label class="text-xs font-medium text-neutral-500 mb-1 block">Endereço *</label>
              <input
                type="text"
                x-model="form.delivery_address"
                placeholder="Rua, número"
                class="w-full h-10 px-3 text-sm border border-neutral-200 rounded-lg focus:ring-1 focus:ring-neutral-900 focus:border-neutral-900 outline-none"
              />
            </div>
            <div>
              <label class="text-xs font-medium text-neutral-500 mb-1 block">Complemento</label>
              <input
                type="text"
                x-model="form.delivery_complement"
                placeholder="Apto, sala, etc."
                class="w-full h-10 px-3 text-sm border border-neutral-200 rounded-lg focus:ring-1 focus:ring-neutral-900 focus:border-neutral-900 outline-none"
              />
            </div>
          </div>
        </template>
      </div>
    </template>

    <!-- Step 3: Pagamento -->
    <template x-if="step === 3">
      <div class="space-y-6">
        <div>
          <h2 class="font-display text-lg font-semibold mb-1">Como você quer pagar?</h2>
          <p class="text-sm text-neutral-500">Escolha a forma de pagamento</p>
        </div>

        <div class="space-y-3">
          <button
            @click="form.payment_method = 'pix'; triggerHaptic(15)"
            :class="[
              'w-full p-3 border-2 rounded-lg flex items-center justify-between transition',
              form.payment_method === 'pix' ? 'border-neutral-900 bg-neutral-50' : 'border-neutral-200 hover:border-neutral-300'
            ]"
          >
            <div class="flex items-center gap-3">
              <span class="material-symbols-rounded text-[24px]">qr_code</span>
              <div class="text-left">
                <p class="text-sm font-semibold">PIX</p>
                <p class="text-xs text-neutral-500">Instantâneo</p>
              </div>
            </div>
            <span class="bg-emerald-50 text-emerald-700 text-[10px] px-1.5 py-0.5 rounded-md font-semibold">Recomendado</span>
          </button>

          <button
            @click="form.payment_method = 'credit_card'; triggerHaptic(15)"
            :class="[
              'w-full p-3 border-2 rounded-lg flex items-center gap-3 transition',
              form.payment_method === 'credit_card' ? 'border-neutral-900 bg-neutral-50' : 'border-neutral-200 hover:border-neutral-300'
            ]"
          >
            <span class="material-symbols-rounded text-[24px]">credit_card</span>
            <div class="text-left">
              <p class="text-sm font-semibold">Cartão de Crédito</p>
              <p class="text-xs text-neutral-500">Até 12x</p>
            </div>
          </button>

          <button
            @click="form.payment_method = 'debit_card'; triggerHaptic(15)"
            :class="[
              'w-full p-3 border-2 rounded-lg flex items-center gap-3 transition',
              form.payment_method === 'debit_card' ? 'border-neutral-900 bg-neutral-50' : 'border-neutral-200 hover:border-neutral-300'
            ]"
          >
            <span class="material-symbols-rounded text-[24px]">atm</span>
            <div class="text-left">
              <p class="text-sm font-semibold">Cartão de Débito</p>
              <p class="text-xs text-neutral-500">Na hora</p>
            </div>
          </button>
        </div>

        <div class="pt-2 border-t border-neutral-200">
          <button @click="showCouponForm = !showCouponForm" class="text-sm text-neutral-500 hover:text-neutral-900 flex items-center gap-1">
            <span class="material-symbols-rounded text-[16px]">local_offer</span>
            Tenho um cupom
          </button>
          <template x-if="showCouponForm">
            <div class="mt-3 flex gap-2">
              <input
                type="text"
                x-model="form.coupon_code"
                placeholder="NELSON10"
                class="flex-1 h-10 px-3 text-sm border border-neutral-200 rounded-lg focus:ring-1 focus:ring-neutral-900 focus:border-neutral-900 outline-none"
              />
              <button class="px-3 h-10 bg-neutral-900 text-white text-sm font-semibold rounded-lg hover:bg-neutral-800">Aplicar</button>
            </div>
          </template>
        </div>
      </div>
    </template>

    <!-- Step 4: Revisão -->
    <template x-if="step === 4">
      <div class="space-y-6">
        <div>
          <h2 class="font-display text-lg font-semibold mb-1">Verifique seu pedido</h2>
          <p class="text-sm text-neutral-500">Tudo certo? Confirme para finalizar</p>
        </div>

        <div class="bg-white border border-neutral-200 rounded-lg p-4 space-y-3">
          <template x-for="item in items" :key="item.id">
            <div class="flex justify-between items-start pb-3 border-b border-neutral-100 last:pb-0 last:border-0">
              <div>
                <p class="text-sm font-semibold"><span x-text="item.qty"></span>× <span x-text="item.name"></span></p>
                <template x-if="item.notes">
                  <p class="text-xs text-neutral-500 mt-0.5" x-text="item.notes"></p>
                </template>
              </div>
              <p class="text-sm font-semibold" x-text="formatPrice(item.total_q)"></p>
            </div>
          </template>
        </div>

        <div class="space-y-2">
          <template x-if="form.fulfillment">
            <div class="flex gap-2">
              <span class="material-symbols-rounded text-[16px] text-neutral-500 flex-none">
                <template x-if="form.fulfillment === 'pickup'">storefront</template>
                <template x-if="form.fulfillment === 'delivery'">two_wheeler</template>
              </span>
              <div class="text-xs">
                <p class="font-medium text-neutral-700">
                  <template x-if="form.fulfillment === 'pickup'">Retirada · Rua das Flores, 1234 · ~20 min</template>
                  <template x-if="form.fulfillment === 'delivery'">Entrega · <span x-text="form.delivery_address"></span> · ~45 min</template>
                </p>
              </div>
            </div>
          </template>

          <template x-if="form.payment_method">
            <div class="flex gap-2">
              <span class="material-symbols-rounded text-[16px] text-neutral-500 flex-none">
                <template x-if="form.payment_method === 'pix'">qr_code</template>
                <template x-if="form.payment_method === 'credit_card'">credit_card</template>
                <template x-if="form.payment_method === 'debit_card'">atm</template>
              </span>
              <div class="text-xs">
                <p class="font-medium text-neutral-700">
                  <template x-if="form.payment_method === 'pix'">PIX</template>
                  <template x-if="form.payment_method === 'credit_card'">Cartão de Crédito</template>
                  <template x-if="form.payment_method === 'debit_card'">Cartão de Débito</template>
                </p>
              </div>
            </div>
          </template>
        </div>

        <div class="bg-white border border-neutral-200 rounded-lg p-4 space-y-2">
          <div class="flex justify-between text-sm">
            <span class="text-neutral-500">Subtotal</span>
            <span class="font-semibold" x-text="formatPrice(subtotal_q)"></span>
          </div>
          <template x-if="form.fulfillment === 'delivery'">
            <div class="flex justify-between text-sm">
              <span class="text-neutral-500">Taxa de entrega</span>
              <span class="font-semibold">R$ 5,00</span>
            </div>
          </template>
          <template x-if="discount_q > 0">
            <div class="flex justify-between text-sm text-emerald-700">
              <span>Economia</span>
              <span class="font-semibold">–<span x-text="formatPrice(discount_q).substring(3)"></span></span>
            </div>
          </template>
          <div class="pt-2 border-t border-neutral-200 flex justify-between">
            <span class="font-semibold">Total</span>
            <span class="font-display text-lg font-semibold" x-text="formatPrice(total_q)"></span>
          </div>
        </div>
      </div>
    </template>
  </div>

  <!-- Sticky Bottom CTA -->
  <div class="fixed bottom-0 inset-x-0 z-40 bg-white border-t border-neutral-200 p-4" style="padding-bottom: var(--sab)">
    <div class="max-w-lg mx-auto space-y-2">
      <button
        @click="nextStep()"
        :disabled="!isStepValid()"
        :class="isStepValid() ? 'bg-neutral-900 hover:bg-neutral-800 text-white' : 'bg-neutral-200 text-neutral-400 cursor-not-allowed'"
        class="w-full h-12 rounded-lg font-semibold transition"
      >
        <span x-show="step < 4">Continuar</span>
        <span x-show="step === 4 && !loading">Confirmar Pedido · <span x-text="formatPrice(total_q)"></span></span>
        <span x-show="step === 4 && loading">Processando...</span>
      </button>
      <button x-show="step > 1" @click="previousStep()" class="w-full text-sm text-neutral-500 hover:text-neutral-900 py-2">
        Voltar
      </button>
    </div>
  </div>

  <!-- Success Bottom Sheet -->
  <template x-if="showSuccess">
    <div class="fixed inset-0 z-50 bg-black/50 flex items-end" @click.away="showSuccess = false">
      <div class="w-full bg-white rounded-t-2xl p-6 space-y-4 animate-slide-up" style="max-height: 80vh">
        <div class="text-center space-y-2">
          <span class="material-symbols-rounded text-[48px] text-emerald-600 block">check_circle</span>
          <h2 class="font-display text-xl font-semibold">Pedido confirmado!</h2>
          <p class="text-sm text-neutral-500" x-text="'Seu pedido #' + orderNumber + ' foi confirmado'"></p>
          <p class="text-xs text-neutral-500 mt-2" x-text="'Previsão: ' + estimatedReadyTime"></p>
        </div>
        <div class="space-y-2">
          <button @click="goToTracking()" class="w-full h-12 bg-neutral-900 text-white rounded-lg font-semibold hover:bg-neutral-800">
            Acompanhar pedido
          </button>
          <button @click="shareViaWhatsapp()" class="w-full h-12 border border-neutral-200 text-neutral-900 rounded-lg font-semibold hover:bg-neutral-50">
            <span class="material-symbols-rounded inline-block text-[18px] mr-2 align-middle">chat</span>
            Compartilhar via WhatsApp
          </button>
        </div>
      </div>
    </div>
  </template>

  <script>
    function checkoutApp() {
      return {
        step: 1,
        loading: false,
        showSuccess: false,
        showAddressForm: false,
        showCouponForm: false,
        orderNumber: null,
        estimatedReadyTime: null,
        isReturning: true,
        geoLoading: false,
        form: {
          name: 'Maria',
          phone: '(11) 99999-0000',
          email: '',
          fulfillment: 'pickup',
          delivery_address: null,
          delivery_complement: '',
          payment_method: 'pix',
          coupon_code: ''
        },
        items: [
          { id: 1, name: 'Croissant Clássico', qty: 2, total_q: 1980 },
          { id: 2, name: 'Pão Francês', qty: 3, total_q: 1470 }
        ],
        subtotal_q: 3450,
        discount_q: 0,

        get total_q() {
          let total = this.subtotal_q - this.discount_q;
          if (this.form.fulfillment === 'delivery') total += 500;
          return total;
        },

        init() {
          const savedFulfillment = sessionStorage.getItem('shopman_fulfillment');
          if (savedFulfillment) {
            this.form.fulfillment = savedFulfillment;
          }
          const saved = sessionStorage.getItem('checkout_form');
          if (saved) this.form = JSON.parse(saved);
        },

        getEstimatedTime(type) {
          if (type === 'pickup') return 'Previsão de preparo: ~20 min';
          if (type === 'delivery') return 'Previsão de entrega: ~45 min';
          return '';
        },

        useGeolocation() {
          this.geoLoading = true;
          if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
              (position) => {
                this.form.delivery_address = 'Rua Almirante Gago Coutinho, 472 - Saúde, São Paulo';
                this.geoLoading = false;
                this.triggerHaptic(15);
              },
              (error) => {
                this.form.delivery_address = 'Rua Almirante Gago Coutinho, 472 - Saúde, São Paulo';
                this.geoLoading = false;
              }
            );
          } else {
            this.form.delivery_address = 'Rua Almirante Gago Coutinho, 472 - Saúde, São Paulo';
            this.geoLoading = false;
          }
        },

        triggerHaptic(pattern) {
          if (navigator.vibrate) {
            navigator.vibrate(pattern);
          }
        },

        isStepValid() {
          if (this.step === 1) return this.form.name && this.form.phone;
          if (this.step === 2) return this.form.fulfillment && (this.form.fulfillment === 'pickup' || this.form.delivery_address);
          if (this.step === 3) return this.form.payment_method;
          if (this.step === 4) return true;
          return false;
        },

        nextStep() {
          if (!this.isStepValid()) return;
          this.triggerHaptic(15);
          sessionStorage.setItem('checkout_form', JSON.stringify(this.form));
          if (this.step < 4) {
            this.step++;
          } else {
            this.confirmOrder();
          }
        },

        previousStep() {
          if (this.step > 1) {
            this.triggerHaptic(15);
            this.step--;
          }
        },

        maskPhone(e) {
          let v = e.target.value.replace(/\D/g, '');
          if (v.length > 11) v = v.slice(0, 11);
          if (v.length > 7) v = `(${v.slice(0, 2)}) ${v.slice(2, 7)}-${v.slice(7)}`;
          else if (v.length > 2) v = `(${v.slice(0, 2)}) ${v.slice(2)}`;
          else if (v.length > 0) v = `(${v}`;
          this.form.phone = v;
        },

        formatPrice(cents) {
          return `R$ ${(cents / 100).toFixed(2).replace('.', ',')}`;
        },

        calculateEstimatedReady() {
          const now = new Date();
          const minutes = this.form.fulfillment === 'pickup' ? 20 : 45;
          const ready = new Date(now.getTime() + minutes * 60000);
          const hours = ready.getHours().toString().padStart(2, '0');
          const mins = ready.getMinutes().toString().padStart(2, '0');
          return `${hours}h${mins}`;
        },

        confirmOrder() {
          this.loading = true;
          this.triggerHaptic([50, 30, 50]);
          setTimeout(() => {
            this.loading = false;
            this.orderNumber = 'NB-' + Math.floor(Math.random() * 10000).toString().padStart(4, '0');
            this.estimatedReadyTime = this.calculateEstimatedReady();
            this.showSuccess = true;
          }, 1500);
        },

        shareViaWhatsapp() {
          const message = `Pedido confirmado! ${this.orderNumber} - Previsão: ${this.estimatedReadyTime}. Acompanhe aqui: [link]`;
          window.open(`https://wa.me/5511999999999?text=${encodeURIComponent(message)}`, '_blank');
        },

        goToTracking() {
          window.location.href = 'tracking.html?order=' + this.orderNumber;
        }
      };
    }
  </script>
  <script src="proto-scenarios.js"></script>
</body>
</html>
