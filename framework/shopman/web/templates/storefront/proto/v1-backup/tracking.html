<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rastreamento do Pedido — Nelson Boulangerie</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&display=swap">
  <style>
    :root { --sat: env(safe-area-inset-top, 0px); --sab: env(safe-area-inset-bottom, 0px); }
    .font-display { font-family: 'Playfair Display', Georgia, serif; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
  </style>
</head>
<body class="bg-neutral-50 text-neutral-900" x-data="trackingApp()" x-init="init()">
  <!-- Header -->
  <header class="fixed top-0 inset-x-0 z-50 h-12 bg-white border-b border-neutral-200 flex items-center px-4 justify-between" style="padding-top: var(--sat)">
    <a href="home.html" class="flex items-center justify-center w-10 h-10 text-neutral-900 no-underline hover:bg-neutral-100 rounded-lg transition">
      <span class="material-symbols-rounded text-[20px]">arrow_back</span>
    </a>
    <h1 class="flex-1 text-center text-sm font-display font-semibold" x-text="'Pedido #' + orderRef"></h1>
    <button @click="shareOrder()" class="flex items-center justify-center w-10 h-10 text-neutral-900 hover:bg-neutral-100 rounded-lg transition">
      <span class="material-symbols-rounded text-[20px]">share</span>
    </button>
  </header>

  <!-- Main content -->
  <main class="max-w-lg mx-auto px-4 pt-16 pb-24">
    <!-- Status Hero -->
    <div class="bg-white border border-neutral-200 rounded-lg p-6 text-center mb-6">
      <span
        class="material-symbols-rounded text-[48px] block mb-3"
        :class="[getStatusColor(currentStatus), currentStatus === 'preparing' ? 'animate-pulse' : '']"
        x-text="getStatusIcon(currentStatus)"
      ></span>
      <h2 class="font-display text-xl font-semibold mb-1" x-text="getStatusLabel(currentStatus)"></h2>
      <p class="text-sm text-neutral-500 mb-3" x-text="getStatusSubtitle(currentStatus)"></p>
      <p class="text-xs text-neutral-500">
        <template x-if="['received', 'confirmed', 'preparing'].includes(currentStatus)">
          <span>Pronto em <span x-text="remainingMinutes" class="font-medium"></span> min</span>
        </template>
        <template x-if="currentStatus === 'ready'">
          <span class="inline-block bg-emerald-50 text-emerald-700 px-2 py-1 rounded-md text-[10px] font-semibold">Pronto!</span>
        </template>
        <template x-if="currentStatus === 'delivered'">
          <span x-text="'Retirado em ' + getStatusTime('delivered')"></span>
        </template>
      </p>

      <!-- Contextual Tip -->
      <div class="mt-4 text-left bg-neutral-50 rounded-lg p-3 border border-neutral-200">
        <p class="text-xs text-neutral-600" x-text="getStatusTip(currentStatus)"></p>
      </div>
    </div>

    <!-- Timeline -->
    <div class="bg-white border border-neutral-200 rounded-lg p-4 mb-6">
      <h3 class="font-display text-base font-semibold mb-4">Andamento do pedido</h3>

      <div class="space-y-0">
        <template x-for="(status, index) in statuses" :key="status">
          <div :class="index < statuses.length - 1 ? 'pb-6' : 'pb-0'">
            <div class="flex gap-3">
              <!-- Dot column -->
              <div class="flex flex-col items-center flex-none">
                <div
                  class="w-3 h-3 rounded-full"
                  :class="[
                    index <= currentIndex ? 'bg-neutral-900' : 'bg-neutral-200',
                    index === currentIndex ? 'animate-pulse' : ''
                  ]"
                ></div>
                <template x-if="index < statuses.length - 1">
                  <div
                    class="w-0.5 flex-1 mt-2"
                    :class="index < currentIndex ? 'bg-neutral-900' : 'bg-neutral-200'"
                  ></div>
                </template>
              </div>

              <!-- Content -->
              <div class="pb-0">
                <p class="text-sm font-medium" x-text="getStatusLabel(status)"></p>
                <p class="text-[11px] text-neutral-400 mt-0.5" x-text="getStatusTime(status)"></p>
                <p class="text-xs text-neutral-500 mt-1" x-text="getStatusNote(status)"></p>
              </div>
            </div>
          </div>
        </template>
      </div>
    </div>

    <!-- Order Details (Collapsible) -->
    <div class="bg-white border border-neutral-200 rounded-lg mb-6 overflow-hidden">
      <button
        @click="detailsOpen = !detailsOpen"
        class="w-full p-4 flex items-center justify-between hover:bg-neutral-50 transition-colors"
      >
        <h3 class="font-display text-base font-semibold">Detalhes do pedido</h3>
        <span
          class="material-symbols-rounded text-[20px] text-neutral-500 transition-transform"
          :class="detailsOpen ? 'rotate-180' : ''"
        >
          <template x-if="detailsOpen">expand_less</template>
          <template x-if="!detailsOpen">expand_more</template>
        </span>
      </button>

      <template x-if="detailsOpen">
        <div class="border-t border-neutral-200 p-4 space-y-4">
          <!-- Items -->
          <div class="space-y-2">
            <template x-for="item in items" :key="item.name">
              <div class="flex justify-between text-sm">
                <span>
                  <span class="text-neutral-500" x-text="item.qty + '×'"></span>
                  <span class="font-medium" x-text="item.name"></span>
                </span>
                <span class="font-medium" x-text="formatPrice(item.price_q)"></span>
              </div>
            </template>
          </div>

          <div class="border-t border-neutral-200 pt-3 space-y-1">
            <div class="flex justify-between text-sm">
              <span class="text-neutral-500">Subtotal</span>
              <span class="font-medium" x-text="formatPrice(subtotal_q)"></span>
            </div>
            <div class="flex justify-between">
              <span class="font-semibold">Total</span>
              <span class="font-semibold" x-text="formatPrice(total_q)"></span>
            </div>
          </div>

          <div class="border-t border-neutral-200 pt-3 space-y-2">
            <div>
              <p class="text-xs text-neutral-500 mb-1">Pagamento</p>
              <div class="flex items-center gap-2">
                <span class="material-symbols-rounded text-[16px] text-emerald-600">check_circle</span>
                <span class="text-sm font-medium" x-text="paymentMethod + ' · Pago'"></span>
              </div>
            </div>

            <div>
              <p class="text-xs text-neutral-500 mb-1">Retirada</p>
              <div class="flex items-start gap-2">
                <span class="material-symbols-rounded text-[16px] text-neutral-500 flex-none mt-0.5">location_on</span>
                <div class="text-sm">
                  <p class="font-medium">Nelson Boulangerie</p>
                  <p class="text-xs text-neutral-500 mt-0.5">Rua das Flores, 123 · Vila Madalena</p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </template>
    </div>

    <!-- Notification Preference (after confirmed) -->
    <template x-if="currentStatus !== 'received' && !notificationPreferenceAnswered">
      <div class="bg-white border border-neutral-200 rounded-lg p-4 mb-6">
        <p class="text-sm font-medium mb-3">Receber notificações via WhatsApp?</p>
        <div class="flex gap-2">
          <button
            @click="notificationPreferenceAnswered = true; triggerHaptic(10)"
            class="flex-1 h-12 bg-emerald-600 hover:bg-emerald-700 text-white text-sm font-semibold rounded-lg transition"
          >
            Sim
          </button>
          <button
            @click="notificationPreferenceAnswered = true; triggerHaptic(10)"
            class="flex-1 h-12 border border-neutral-200 hover:bg-neutral-50 text-neutral-900 text-sm font-semibold rounded-lg transition"
          >
            Não
          </button>
        </div>
      </div>
    </template>

    <!-- Action Buttons -->
    <div class="space-y-3 mb-6">
      <template x-if="currentStatus === 'ready' && fulfillment === 'pickup'">
        <button
          @click="notifyArrival()"
          class="w-full h-12 bg-emerald-600 hover:bg-emerald-700 text-white font-semibold rounded-lg transition"
        >
          Estou chegando
        </button>
      </template>

      <template x-if="currentStatus === 'delivered'">
        <a
          href="menu.html"
          class="block w-full h-12 bg-neutral-900 hover:bg-neutral-800 text-white font-semibold rounded-lg transition flex items-center justify-center"
        >
          Fazer novo pedido
        </a>
      </template>

      <!-- Rating -->
      <template x-if="currentStatus === 'delivered'">
        <div class="bg-white border border-neutral-200 rounded-lg p-4">
          <p class="text-sm font-medium mb-3">Como foi sua experiência?</p>
          <div class="flex gap-2 justify-center mb-3">
            <template x-for="star in [1, 2, 3, 4, 5]" :key="star">
              <button
                @click="rating = star; triggerHaptic(10)"
                class="flex items-center justify-center w-12 h-12 text-2xl transition-transform hover:scale-110 rounded-md"
                :class="star <= rating ? 'text-amber-500' : 'text-neutral-300'"
              >
                ★
              </button>
            </template>
          </div>
          <template x-if="rating > 0">
            <button
              @click="submitRating()"
              class="w-full h-10 bg-neutral-100 hover:bg-neutral-200 text-neutral-900 font-medium text-sm rounded-lg transition"
            >
              Enviar avaliação
            </button>
          </template>
        </div>
      </template>
    </div>

    <!-- Help Section -->
    <div class="bg-white border border-neutral-200 rounded-lg p-4 space-y-2 mb-6">
      <h3 class="font-display text-base font-semibold mb-3">Precisa de ajuda?</h3>

      <button
        @click="shareOrderWhatsapp()"
        class="w-full flex items-center justify-between p-3 hover:bg-neutral-50 rounded-lg transition border border-neutral-200 min-h-[44px]"
      >
        <div class="flex items-center gap-2 text-left">
          <span class="material-symbols-rounded text-[20px] text-emerald-600">chat</span>
          <div>
            <p class="text-sm font-medium">Compartilhar pedido</p>
            <p class="text-xs text-neutral-500">Enviar via WhatsApp</p>
          </div>
        </div>
        <span class="material-symbols-rounded text-[20px] text-neutral-400">arrow_forward</span>
      </button>

      <button
        @click="openGoogleMaps()"
        class="w-full flex items-center justify-between p-3 hover:bg-neutral-50 rounded-lg transition border border-neutral-200 min-h-[44px]"
      >
        <div class="flex items-center gap-2 text-left">
          <span class="material-symbols-rounded text-[20px] text-neutral-500">directions</span>
          <div>
            <p class="text-sm font-medium">Como chegar</p>
            <p class="text-xs text-neutral-500">Abrir no Google Maps</p>
          </div>
        </div>
        <span class="material-symbols-rounded text-[20px] text-neutral-400">arrow_forward</span>
      </button>

      <button
        @click="contactWhatsapp()"
        class="w-full flex items-center justify-between p-3 hover:bg-neutral-50 rounded-lg transition border border-neutral-200 min-h-[44px]"
      >
        <div class="flex items-center gap-2 text-left">
          <span class="material-symbols-rounded text-[20px] text-emerald-600">phone</span>
          <div>
            <p class="text-sm font-medium">WhatsApp</p>
            <p class="text-xs text-neutral-500">(11) 9 9999-9999</p>
          </div>
        </div>
        <span class="material-symbols-rounded text-[20px] text-neutral-400">arrow_forward</span>
      </button>

      <button
        @click="contactPhone()"
        class="w-full flex items-center justify-between p-3 hover:bg-neutral-50 rounded-lg transition border border-neutral-200 min-h-[44px]"
      >
        <div class="flex items-center gap-2 text-left">
          <span class="material-symbols-rounded text-[20px] text-neutral-500">call</span>
          <div>
            <p class="text-sm font-medium">Ligar para a loja</p>
            <p class="text-xs text-neutral-500">(11) 3123-4567</p>
          </div>
        </div>
        <span class="material-symbols-rounded text-[20px] text-neutral-400">arrow_forward</span>
      </button>
    </div>
  </main>

  <!-- Bottom Navigation -->
  <nav class="fixed bottom-0 inset-x-0 z-40 bg-white border-t border-neutral-200" style="padding-bottom: var(--sab)">
    <div class="max-w-lg mx-auto grid grid-cols-4 h-14">
      <a href="home.html" class="flex flex-col items-center justify-center gap-0.5 text-neutral-400 no-underline hover:text-neutral-900">
        <span class="material-symbols-rounded text-[20px]">home</span>
        <span class="text-[10px] font-medium">Home</span>
      </a>
      <a href="menu.html" class="flex flex-col items-center justify-center gap-0.5 text-neutral-400 no-underline hover:text-neutral-900">
        <span class="material-symbols-rounded text-[20px]">restaurant_menu</span>
        <span class="text-[10px] font-medium">Cardápio</span>
      </a>
      <a href="cart.html" class="flex flex-col items-center justify-center gap-0.5 text-neutral-400 no-underline hover:text-neutral-900">
        <span class="material-symbols-rounded text-[20px]">shopping_bag</span>
        <span class="text-[10px] font-medium">Carrinho</span>
      </a>
      <a href="account.html" class="flex flex-col items-center justify-center gap-0.5 text-neutral-400 no-underline hover:text-neutral-900">
        <span class="material-symbols-rounded text-[20px]">person</span>
        <span class="text-[10px] font-medium">Conta</span>
      </a>
    </div>
  </nav>

  <script>
    function trackingApp() {
      return {
        orderRef: 'NB-0042',
        placedAt: '14:12',
        estimatedReady: '14:35',
        fulfillment: 'pickup',
        paymentMethod: 'PIX',
        remainingMinutes: 23,
        notificationPreferenceAnswered: false,

        items: [
          { name: 'Croissant Clássico', qty: 2, price_q: 990 },
          { name: 'Pain au Chocolat', qty: 1, price_q: 1190 },
          { name: 'Café Espresso', qty: 1, price_q: 690 }
        ],

        total_q: 3860,
        subtotal_q: 3860,

        statuses: ['received', 'confirmed', 'preparing', 'ready', 'delivered'],
        currentIndex: 0,

        autoDemo: true,
        detailsOpen: false,
        rating: 0,

        demoInterval: null,
        countdownInterval: null,

        get currentStatus() {
          return this.statuses[this.currentIndex];
        },

        statusConfig: {
          received: {
            icon: 'schedule',
            label: 'Pedido recebido',
            sub: 'Aguardando confirmação da loja...',
            color: 'text-amber-600',
            time: '14:12',
            note: 'Seu pedido foi recebido com sucesso',
            tip: 'Estamos verificando seu pagamento...'
          },
          confirmed: {
            icon: 'check_circle',
            label: 'Pedido confirmado!',
            sub: 'Previsão: 14:35',
            color: 'text-emerald-600',
            time: '14:14',
            note: 'Pagamento via PIX confirmado',
            tip: 'Separando seus ingredientes'
          },
          preparing: {
            icon: 'soup_kitchen',
            label: 'Em preparação',
            sub: 'Previsão: 14:35',
            color: 'text-blue-600',
            time: '14:16',
            note: 'Seus itens estão sendo preparados',
            tip: 'Seu pedido está no forno!'
          },
          ready: {
            icon: 'celebration',
            label: 'Pronto para retirada!',
            sub: 'Retire no balcão',
            color: 'text-emerald-600',
            time: '14:33',
            note: 'Seu pedido está aguardando retirada',
            tip: 'Dirija-se ao balcão para retirada'
          },
          delivered: {
            icon: 'done_all',
            label: 'Retirado!',
            sub: 'Bom apetite!',
            color: 'text-neutral-700',
            time: '14:38',
            note: 'Obrigado por sua compra',
            tip: 'Esperamos que aproveite!'
          }
        },

        init() {
          if (this.autoDemo) {
            this.startAutoDemo();
          }
          this.startCountdown();
        },

        startAutoDemo() {
          if (this.demoInterval) clearInterval(this.demoInterval);
          this.demoInterval = setInterval(() => {
            if (this.autoDemo && this.currentIndex < this.statuses.length - 1) {
              this.currentIndex += 1;
              this.triggerHaptic([50, 30, 50]);
            } else if (this.autoDemo && this.currentIndex === this.statuses.length - 1) {
              setTimeout(() => {
                this.currentIndex = 0;
                this.remainingMinutes = 23;
              }, 500);
            }
          }, 4000);
        },

        startCountdown() {
          if (this.countdownInterval) clearInterval(this.countdownInterval);
          this.countdownInterval = setInterval(() => {
            if (this.remainingMinutes > 0 && ['received', 'confirmed', 'preparing'].includes(this.currentStatus)) {
              this.remainingMinutes -= 1;
            }
          }, 5000);
        },

        stopAutoDemo() {
          if (this.demoInterval) {
            clearInterval(this.demoInterval);
            this.demoInterval = null;
          }
        },

        stopCountdown() {
          if (this.countdownInterval) {
            clearInterval(this.countdownInterval);
            this.countdownInterval = null;
          }
        },

        getStatusIcon(status) {
          return this.statusConfig[status]?.icon || 'help';
        },

        getStatusLabel(status) {
          return this.statusConfig[status]?.label || status;
        },

        getStatusSubtitle(status) {
          return this.statusConfig[status]?.sub || '';
        },

        getStatusColor(status) {
          return this.statusConfig[status]?.color || 'text-neutral-600';
        },

        getStatusTime(status) {
          return this.statusConfig[status]?.time || '';
        },

        getStatusNote(status) {
          return this.statusConfig[status]?.note || '';
        },

        getStatusTip(status) {
          return this.statusConfig[status]?.tip || '';
        },

        triggerHaptic(pattern) {
          if (navigator.vibrate) {
            navigator.vibrate(pattern);
          }
        },

        formatPrice(q) {
          const reais = Math.floor(q / 100);
          const centavos = q % 100;
          return `R$ ${reais},${centavos.toString().padStart(2, '0')}`;
        },

        shareOrder() {
          const message = `Meu pedido ${this.orderRef} está em andamento! Acompanhe: [link]`;
          if (navigator.share) {
            navigator.share({
              title: `Pedido ${this.orderRef}`,
              text: message
            });
          } else {
            alert(message);
          }
        },

        shareOrderWhatsapp() {
          const message = `Pedido ${this.orderRef} - Status: ${this.getStatusLabel(this.currentStatus)}. Acompanhe aqui: [link]`;
          window.open(`https://wa.me/5511999999999?text=${encodeURIComponent(message)}`, '_blank');
        },

        notifyArrival() {
          this.triggerHaptic(20);
          alert('Loja notificada! Estamos preparando seu pedido.');
        },

        submitRating() {
          this.triggerHaptic(20);
          alert(`Obrigado! Sua avaliação de ${this.rating}⭐ foi enviada.`);
          this.rating = 0;
        },

        contactWhatsapp() {
          const message = `Olá! Tenho uma dúvida sobre meu pedido ${this.orderRef}.`;
          window.open(`https://wa.me/5511999999999?text=${encodeURIComponent(message)}`, '_blank');
        },

        contactPhone() {
          window.location.href = 'tel:+551131234567';
        },

        openGoogleMaps() {
          window.open('https://www.google.com/maps/search/Rua+das+Flores+123+Sao+Paulo', '_blank');
        }
      };
    }
  </script>
  <script src="proto-scenarios.js"></script>
</body>
</html>
