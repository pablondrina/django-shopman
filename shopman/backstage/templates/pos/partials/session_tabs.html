{% for s in sessions %}
<button type="button"
        class="btn-quiet whitespace-nowrap shrink-0"
        hx-get="/gestor/pos/session/{{ s.session_key }}/load/"
        hx-swap="none"
        x-on:htmx:after-request="if(event.detail.successful){ let d=JSON.parse(event.detail.xhr.responseText); loadSession(d); htmx.trigger($refs.sessionTabs, 'load'); }">
  <span class="material-symbols-rounded icon-sm" aria-hidden="true">receipt</span>
  <span class="font-bold">{{ s.tab }}</span>
  <span class="text-on-surface/50 dark:text-on-surface-dark/50">
    {{ s.item_count }} item{% if s.item_count != 1 %}s{% endif %} · {{ s.total_display }}
  </span>
  {% if s.customer_name %}
  <span class="text-on-surface/40 dark:text-on-surface-dark/40">· {{ s.customer_name }}</span>
  {% endif %}
</button>
{% endfor %}
