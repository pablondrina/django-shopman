{% comment %}POS danger banner. data-* attributes drive the client error-focus contract.{% endcomment %}
<div class="px-3 py-2 rounded-lg bg-danger/10 border border-danger/30 text-danger text-sm"{% if frag.code %} data-error-code="{{ frag.code }}"{% endif %}{% if frag.focus %} data-focus-target="{{ frag.focus }}"{% endif %}{% if frag.field %} data-error-field="{{ frag.field }}"{% endif %}><span class="font-semibold">{{ frag.title }}</span>{% if frag.detail %} <span>— {{ frag.detail }}</span>{% endif %}{% if frag.recovery %}<br><span class="text-xs text-on-surface/50 dark:text-on-surface-dark/50">{{ frag.recovery }}</span>{% endif %}</div>
