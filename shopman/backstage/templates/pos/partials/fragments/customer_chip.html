{% comment %}Customer lookup chip. The 'found' span exposes the data-* the client reads.{% endcomment %}{% if frag.state == "found" %}<span class="text-primary font-semibold" data-customer-name="{{ frag.name }}" data-customer-ref="{{ frag.ref }}" data-customer-group="{{ frag.group }}" data-customer-email="{{ frag.email }}" data-default-address="{{ frag.default_address }}" data-favorite-item="{{ frag.favorite_item }}" data-last-order-items="{{ frag.last_order_items }}">{{ frag.name }}{{ frag.staff_badge }}</span><span class="text-on-surface/50 dark:text-on-surface-dark/50">· {{ frag.memory }}</span>{% elif frag.state == "missing" %}<span class="text-muted-foreground">Cliente não encontrado</span>{% else %}<span class="text-muted-foreground">Cliente avulso</span>{% endif %}
