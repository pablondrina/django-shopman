{% comment %}Sale-confirmed banner. The client reads data-order-ref/total-display/order-url back.{% endcomment %}
<div data-order-ref="{{ frag.order_ref }}" data-total-display="{{ frag.total_display }}" data-order-url="{{ frag.order_url }}" class="px-3 py-2 rounded-lg bg-success/10 border border-success/30 text-success text-sm font-semibold flex items-center justify-between gap-2"><span>Pedido confirmado e encaminhado{{ frag.fiscal_hint }}</span><span class="flex items-center gap-2"><span class="tabular-nums">{{ frag.order_ref }} · {{ frag.total_display }}</span><a href="{{ frag.order_url }}" class="underline underline-offset-2">Gestor</a></span></div>
