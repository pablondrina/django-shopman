{% comment %}Cancel/correction result. Keeps the #pos-cancel-result id the HTMX target swaps into.{% endcomment %}{% if frag.tone == "success" %}<div id="pos-cancel-result" class="pos-success" style="background:var(--success-light,#dcfce7);color:var(--success-foreground,#166534)">{{ frag.text }}</div>{% else %}<div id="pos-cancel-result" class="pos-error" style="background:var(--error-light);color:rgb(var(--error-foreground))">{{ frag.text }}</div>{% endif %}
