{% load unfold %}

<form method="post" action="{{ check_url }}">
  {% csrf_token %}
  <input type="hidden" name="index" value="{{ index }}">
  {% component "unfold/components/button.html" with submit=1 variant="default" size="xs" icon="check_box" %}
    {% if checked %}Desmarcar{% else %}Conferir{% endif %}
  {% endcomponent %}
</form>
