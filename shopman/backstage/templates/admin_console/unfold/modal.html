{% load unfold %}

{% if teleport %}
<template x-teleport="body">
{% endif %}
  {# unfold-canonical: allow raw-modal-overlay -- authorized-by=Pablo Valentini; authorization-ref=2026-04-29 Codex thread; reason=Unfold dialog actions are ModelAdmin primitives, but this operational matrix needs in-context row modal forms without leaving the production board. #}
  <div x-show="{{ open_var|default:'open' }}"
       x-cloak
       x-transition.opacity
       class="backdrop-blur-xs bg-base-900/80 flex flex-col fixed inset-0 p-4 lg:p-32 z-[1000]"
       x-on:click.self="{{ close_action|default:'open = false' }}"
       x-on:keydown.escape.window="{{ close_action|default:'open = false' }}"
       role="dialog"
       aria-modal="true"
       aria-label="{{ modal_title }}">
    <div class="bg-white flex flex-col max-w-sm min-h-0 mx-auto overflow-hidden rounded-default shadow-lg w-full dark:bg-base-800 max-h-full overflow-y-auto"
         x-on:click.outside="{{ close_action|default:'open = false' }}">
      {% component "unfold/components/card.html" with title=modal_title %}
        <form id="{{ form_id }}" method="{{ form_method|default:'post' }}" {% if form_action %}action="{{ form_action }}"{% endif %} novalidate>
          {% if form_method != "get" %}
            {% csrf_token %}
          {% endif %}
          {% for hidden in form.hidden_fields %}
            {{ hidden }}
          {% endfor %}

          {% component "unfold/components/text.html" with class="mb-4 text-sm text-base-500" %}
            {{ modal_description }}
          {% endcomponent %}

          {% for field in form_fields|default:form.visible_fields %}
            {% include "unfold/helpers/field.html" with field=field %}
          {% endfor %}
        </form>

        {% component "unfold/components/separator.html" %}
        {% endcomponent %}
        <div class="flex flex-wrap justify-end gap-2">
          {% if clear_href %}
            {% component "unfold/components/button.html" with href=clear_href variant="default" %}
              {{ clear_label|default:"Limpar filtros" }}
            {% endcomponent %}
          {% endif %}
          {% component "unfold/components/button.html" with variant="default" extra_attrs=cancel_attrs %}
            {{ cancel_label|default:"Cancelar" }}
          {% endcomponent %}
          {% component "unfold/components/button.html" with submit=1 form=form_id %}
            {{ submit_label|default:"Salvar" }}
          {% endcomponent %}
        </div>
      {% endcomponent %}
    </div>
  </div>
{% if teleport %}
</template>
{% endif %}
