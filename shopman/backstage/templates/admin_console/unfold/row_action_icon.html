{# unfold-canonical: allow raw-button -- authorized-by=Pablo Valentini; authorization-ref=2026-04-29 Codex thread; reason=Installed Unfold row actions use compact h-7/w-7 icon triggers, while the public button component has no small icon-size API in django-unfold 0.80.2. #}
<button type="{% if submit %}submit{% else %}button{% endif %}"
        {% if title %}title="{{ title }}" aria-label="{{ title }}"{% endif %}
        {% if form_attr %}form="{{ form_attr }}"{% endif %}
        {% if extra_attrs %}{{ extra_attrs }}{% endif %}
        class="cursor-pointer flex h-7 material-symbols-outlined md-18 -my-1 leading-7! justify-center shrink-0 rounded-default text-center text-base-400 w-7 group-hover/action:bg-base-100 group-hover/action:text-base-700 dark:text-font-default-dark dark:group-hover/action:bg-base-800 dark:group-hover/action:text-white">
  {{ icon }}
</button>
