{% comment %}
Leitura da matriz de planejamento (split canônico WP-PE4): a EDIÇÃO do
planejado vive no Fournil (/plan). Este cell só apresenta o estado.

<div class="flex items-center gap-2">

    <span class="text-xs text-base-400">Sem ordem</span>
  {% endif %}
</div>
