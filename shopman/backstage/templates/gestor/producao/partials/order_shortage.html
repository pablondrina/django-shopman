<div class="surface-modal max-w-md border-danger/30" role="dialog" aria-modal="true" aria-labelledby="order-short-title">
  <h3 id="order-short-title" class="text-base font-semibold text-on-surface-strong dark:text-on-surface-dark-strong">
    Planejamento abaixo dos pedidos vinculados
  </h3>
  <p class="field-help mt-1">{{ error }}</p>
  {% if error.order_refs %}
  <div class="mt-3 flex flex-wrap gap-1">
    {% for ref in error.order_refs %}
    <span class="badge-danger">{{ ref }}</span>
    {% endfor %}
  </div>
  {% endif %}
  <form method="post" class="mt-4 flex gap-2">
    {% csrf_token %}
    {% for key, values in post.lists %}
      {% for value in values %}
      <input type="hidden" name="{{ key }}" value="{{ value }}" />
      {% endfor %}
    {% endfor %}
    <input type="hidden" name="force" value="1" />
    <button type="submit" class="btn-secondary flex-1">Confirmar mesmo assim</button>
    <a href="{% url 'backstage:production' %}" class="btn-primary flex-1 text-center">Revisar</a>
  </form>
</div>
