{# Auth error with optional retry — Penguin UI tokens #}
<div class="rounded-radius border border-danger bg-danger/10 p-4 dark:border-danger-dark dark:bg-danger-dark/10">
  <p class="text-sm text-danger dark:text-danger-dark mb-3">{{ error_message }}</p>

  {% if can_retry and phone %}
  <button type="button"
    hx-post="{% url 'storefront:request_code' %}"
    hx-target="#auth-section"
    hx-swap="innerHTML"
    hx-vals='{"phone": "{{ phone }}"}'
    hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
    class="flex w-full items-center justify-center gap-2 rounded-radius bg-primary px-4 py-2.5 text-sm font-medium text-on-primary transition hover:opacity-90 active:scale-[0.98] focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-primary dark:bg-primary-dark dark:text-on-primary-dark dark:focus-visible:outline-primary-dark"
    style="min-height: 44px;">
    Tentar novamente
  </button>
  {% endif %}
</div>
