{% extends "storefront/base.html" %}

{% block title %}Link Inválido{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-16 text-center">
  <div class="card rounded-2xl p-8 shadow-md">
    <div class="flex justify-center mb-4">
      <span class="material-symbols-rounded text-5xl text-on-surface/40 dark:text-on-surface-dark/40" aria-hidden="true">link_off</span>
    </div>
    <h1 class="text-2xl font-bold text-on-surface-strong dark:text-on-surface-dark-strong mb-2">Link inválido ou expirado</h1>
    <p class="text-on-surface/85 dark:text-on-surface-dark/60 mb-6">{{ error|default:"Este link não é mais válido. Solicite um novo link pelo WhatsApp." }}</p>
    <a href="{% url 'storefront:menu' %}" class="btn-primary inline-block">
      Ver Cardápio
    </a>
  </div>
</div>
{% endblock %}
