<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Seu Pedido — Nelson Boulangerie</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style type="text/tailwindcss">
    @custom-variant dark (&:where(.dark, .dark *));

    @theme {
        --font-body: 'Inter', ui-sans-serif, system-ui, sans-serif, 'Apple Color Emoji', 'Segoe UI Emoji',
            'Segoe UI Symbol', 'Noto Color Emoji';
        --font-title: 'Playfair Display', ui-serif, Georgia, serif;

        --color-surface: var(--color-white);
        --color-surface-alt: var(--color-neutral-50);
        --color-on-surface: var(--color-neutral-600);
        --color-on-surface-strong: var(--color-neutral-900);
        --color-primary: var(--color-black);
        --color-on-primary: var(--color-neutral-100);
        --color-secondary: var(--color-neutral-800);
        --color-on-secondary: var(--color-white);
        --color-outline: var(--color-neutral-300);
        --color-outline-strong: var(--color-neutral-800);

        --color-surface-dark: var(--color-neutral-950);
        --color-surface-dark-alt: var(--color-neutral-900);
        --color-on-surface-dark: var(--color-neutral-300);
        --color-on-surface-dark-strong: var(--color-white);
        --color-primary-dark: var(--color-white);
        --color-on-primary-dark: var(--color-black);
        --color-secondary-dark: var(--color-neutral-300);
        --color-on-secondary-dark: var(--color-black);
        --color-outline-dark: var(--color-neutral-700);
        --color-outline-dark-strong: var(--color-neutral-300);

        --color-info: var(--color-sky-500);
        --color-on-info: var(--color-white);
        --color-success: var(--color-green-500);
        --color-on-success: var(--color-white);
        --color-warning: var(--color-amber-500);
        --color-on-warning: var(--color-white);
        --color-danger: var(--color-red-500);
        --color-on-danger: var(--color-white);

        --radius-radius: var(--radius-sm);
    }

    @layer base {
        [x-cloak] { display: none !important; }
        html { scroll-behavior: smooth; }
        ::selection { background-color: var(--color-primary); color: var(--color-on-primary); }
        body { font-family: var(--font-body); -webkit-font-smoothing: antialiased; }
        h1, h2, h3, h4, h5, h6 { font-family: var(--font-title); }
    }

    @layer components {
        .touch-target { min-height: 44px; min-width: 44px; }
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>
<body x-data="cartStore()" class="bg-surface dark:bg-surface-dark text-on-surface dark:text-on-surface-dark min-h-screen flex flex-col">

  <!-- Header -->
  <div class="sticky top-0 z-50 flex items-center gap-4 px-4 py-4 border-b border-outline dark:border-outline-dark bg-surface dark:bg-surface-dark">
    <a href="menu-v2.html" class="touch-target flex items-center justify-center rounded-radius hover:bg-surface-alt dark:hover:bg-surface-dark-alt transition-colors" title="Voltar ao menu">
      <svg class="w-6 h-6 stroke-on-surface-strong dark:stroke-on-surface-dark-strong" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5M12 19l-7-7 7-7" />
      </svg>
    </a>
    <h1 class="flex-1 font-title text-2xl font-bold text-on-surface-strong dark:text-on-surface-dark-strong">Seu Pedido</h1>
    <span class="inline-flex items-center justify-center min-w-6 h-6 px-2 bg-primary dark:bg-primary-dark text-on-primary dark:text-on-primary-dark rounded-full text-xs font-semibold" x-text="totalItems"></span>
  </div>

  <!-- Fulfillment Mode Selector -->
  <div class="flex gap-3 px-4 py-4">
    <button
      @click="fulfillmentMode = 'pickup'"
      :class="fulfillmentMode === 'pickup' ? 'bg-primary dark:bg-primary-dark text-on-primary dark:text-on-primary-dark border-primary dark:border-primary-dark' : 'bg-surface dark:bg-surface-dark text-on-surface dark:text-on-surface-dark border-outline dark:border-outline-dark'"
      class="flex-1 px-4 py-3 border-2 rounded-radius font-semibold text-sm transition-all"
    >
      🏪 Retirar
    </button>
    <button
      @click="fulfillmentMode = 'delivery'"
      :class="fulfillmentMode === 'delivery' ? 'bg-primary dark:bg-primary-dark text-on-primary dark:text-on-primary-dark border-primary dark:border-primary-dark' : 'bg-surface dark:bg-surface-dark text-on-surface dark:text-on-surface-dark border-outline dark:border-outline-dark'"
      class="flex-1 px-4 py-3 border-2 rounded-radius font-semibold text-sm transition-all"
    >
      🚗 Entregar
    </button>
  </div>

  <!-- Status Banners -->
  <div x-show="fulfillmentMode === 'pickup' && items.length > 0" class="mx-4 mb-4 px-4 py-3 flex items-center gap-3 rounded-radius bg-info text-on-info text-sm">
    <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 24 24" fill="currentColor">
      <circle cx="12" cy="12" r="1" />
      <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2m0 18c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8m3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5s.67 1.5 1.5 1.5m-7 0c.83 0 1.5-.67 1.5-1.5S9.33 8 8.5 8 7 8.67 7 9.5 7.67 11 8.5 11m3.5 6.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5z" />
    </svg>
    <span>Retirada em ~20 min</span>
  </div>

  <div x-show="fulfillmentMode === 'delivery' && items.length > 0" class="mx-4 mb-4 px-4 py-3 flex items-center gap-3 rounded-radius bg-success text-on-success text-sm">
    <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 24 24" fill="currentColor">
      <path d="M9 16.2L4.8 12l-1.4 1.4L9 19 21 7l-1.4-1.4L9 16.2z" />
    </svg>
    <span>Entrega em ~45 min</span>
  </div>

  <!-- Empty State -->
  <div x-show="items.length === 0" class="flex-1 flex flex-col items-center justify-center gap-6 px-4 py-10">
    <svg class="w-20 h-20 opacity-50 stroke-on-surface dark:stroke-on-surface-dark" viewBox="0 0 24 24" fill="none" stroke-width="1.5">
      <circle cx="9" cy="21" r="1" />
      <circle cx="20" cy="21" r="1" />
      <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6" />
    </svg>
    <h2 class="font-title text-xl font-semibold text-on-surface-strong dark:text-on-surface-dark-strong text-center">Seu carrinho está vazio</h2>
    <a href="menu-v2.html" class="px-6 py-3 bg-primary dark:bg-primary-dark text-on-primary dark:text-on-primary-dark rounded-radius font-semibold text-sm hover:opacity-90 transition-opacity">Ir para o cardápio</a>
  </div>

  <!-- Cart Items -->
  <div x-show="items.length > 0" class="flex-1 flex flex-col gap-4 px-4 py-4">
    <template x-for="(item, index) in items" :key="index">
      <div class="grid grid-cols-[80px_1fr] gap-3 pb-4 border-b border-outline dark:border-outline-dark">
        <img :src="item.image" :alt="item.name" class="w-20 h-20 rounded-radius object-cover" />
        <div class="flex flex-col justify-between">
          <div class="flex justify-between items-start gap-2">
            <div class="flex-1">
              <div class="font-semibold text-sm text-on-surface-strong dark:text-on-surface-dark-strong" x-text="item.name"></div>
              <div class="text-xs mt-1">
                <span x-show="item.originalPrice" class="line-through opacity-60 text-on-surface dark:text-on-surface-dark" x-text="formatPrice(item.originalPrice)"></span>
                <span class="font-semibold text-success dark:text-success" x-text="formatPrice(item.price)"></span>
              </div>
            </div>
            <button
              @click="removeItem(index)"
              class="touch-target flex items-center justify-center rounded-radius hover:bg-surface-alt dark:hover:bg-surface-dark-alt transition-colors"
              title="Remover item"
            >
              <svg class="w-5 h-5 stroke-danger" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="3 6 5 6 21 6" />
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
                <line x1="10" y1="11" x2="10" y2="17" />
                <line x1="14" y1="11" x2="14" y2="17" />
              </svg>
            </button>
          </div>
          <div class="flex items-center gap-2 mt-2">
            <button @click="decrementQty(index)" class="touch-target w-8 h-8 flex items-center justify-center border border-outline dark:border-outline-dark bg-surface dark:bg-surface-dark text-on-surface-strong dark:text-on-surface-dark-strong rounded hover:bg-surface-alt dark:hover:bg-surface-dark-alt transition-colors font-semibold text-sm">−</button>
            <div class="min-w-10 text-center font-semibold text-sm" x-text="item.qty"></div>
            <button @click="incrementQty(index)" class="touch-target w-8 h-8 flex items-center justify-center border border-outline dark:border-outline-dark bg-surface dark:bg-surface-dark text-on-surface-strong dark:text-on-surface-dark-strong rounded hover:bg-surface-alt dark:hover:bg-surface-dark-alt transition-colors font-semibold text-sm">+</button>
            <div class="flex-1"></div>
            <div class="font-semibold text-sm text-on-surface-strong dark:text-on-surface-dark-strong whitespace-nowrap" x-text="formatPrice(item.price * item.qty)"></div>
          </div>
        </div>
      </div>
    </template>
  </div>

  <!-- Savings Banner -->
  <div x-show="items.length > 0 && totalSavings > 0" class="mx-4 mb-4 px-4 py-3 bg-success dark:bg-success text-on-success rounded-radius text-sm font-semibold text-center">
    🎉 Você economizou <span x-text="formatPrice(totalSavings)"></span>!
  </div>

  <!-- Temporal Suggestions -->
  <div x-show="items.length > 0" class="px-4 py-4">
    <div class="text-xs font-semibold text-on-surface-strong dark:text-on-surface-dark-strong uppercase tracking-wide mb-3">Esqueceu algo?</div>
    <div class="flex gap-3 overflow-x-auto scroll-smooth pb-1">
      <a href="pdp-v2.html?id=croissant" class="flex-shrink-0 w-32 px-3 py-3 bg-surface-alt dark:bg-surface-dark-alt text-on-surface dark:text-on-surface-dark rounded-radius text-center hover:bg-surface dark:hover:bg-surface-dark transition-all hover:-translate-y-1 no-underline">
        <div class="text-2xl mb-2">🥐</div>
        <div class="text-xs font-semibold leading-tight">Mais Croissants</div>
      </a>
      <a href="pdp-v2.html?id=cafe" class="flex-shrink-0 w-32 px-3 py-3 bg-surface-alt dark:bg-surface-dark-alt text-on-surface dark:text-on-surface-dark rounded-radius text-center hover:bg-surface dark:hover:bg-surface-dark transition-all hover:-translate-y-1 no-underline">
        <div class="text-2xl mb-2">☕</div>
        <div class="text-xs font-semibold leading-tight">Mais Café</div>
      </a>
      <a href="pdp-v2.html?id=bolo" class="flex-shrink-0 w-32 px-3 py-3 bg-surface-alt dark:bg-surface-dark-alt text-on-surface dark:text-on-surface-dark rounded-radius text-center hover:bg-surface dark:hover:bg-surface-dark transition-all hover:-translate-y-1 no-underline">
        <div class="text-2xl mb-2">🎂</div>
        <div class="text-xs font-semibold leading-tight">Bolo</div>
      </a>
      <a href="pdp-v2.html?id=suco" class="flex-shrink-0 w-32 px-3 py-3 bg-surface-alt dark:bg-surface-dark-alt text-on-surface dark:text-on-surface-dark rounded-radius text-center hover:bg-surface dark:hover:bg-surface-dark transition-all hover:-translate-y-1 no-underline">
        <div class="text-2xl mb-2">🧃</div>
        <div class="text-xs font-semibold leading-tight">Suco Natural</div>
      </a>
    </div>
  </div>

  <!-- Order Summary -->
  <div x-show="items.length > 0" class="px-4 py-4 border-t border-outline dark:border-outline-dark bg-surface dark:bg-surface-dark">
    <div class="flex justify-between items-center py-2 text-sm">
      <span class="text-on-surface dark:text-on-surface-dark">Subtotal</span>
      <span class="font-semibold text-on-surface-strong dark:text-on-surface-dark-strong" x-text="formatPrice(subtotal)"></span>
    </div>
    <div x-show="fulfillmentMode === 'delivery'" class="flex justify-between items-center py-2 text-sm">
      <span class="text-on-surface dark:text-on-surface-dark">Taxa de entrega</span>
      <span class="font-semibold text-on-surface-strong dark:text-on-surface-dark-strong" x-text="formatPrice(deliveryFee)"></span>
    </div>
    <div x-show="subtotal < 50000 && fulfillmentMode === 'delivery'" class="flex gap-2 items-center my-3">
      <div class="flex-1 h-1.5 bg-surface-alt dark:bg-surface-dark-alt rounded-full overflow-hidden">
        <div class="h-full bg-success dark:bg-success rounded-full transition-all" :style="{ width: (subtotal / 50000) * 100 + '%' }"></div>
      </div>
      <span class="text-xs text-on-surface dark:text-on-surface-dark whitespace-nowrap" x-text="'R$ ' + ((50000 - subtotal) / 100).toFixed(2) + ' para frete grátis'"></span>
    </div>
    <div class="flex justify-between items-center py-3 mt-2 border-t border-outline dark:border-outline-dark font-title text-lg font-bold text-on-surface-strong dark:text-on-surface-dark-strong">
      <span>Total</span>
      <span x-text="formatPrice(total)"></span>
    </div>
  </div>

  <!-- Sticky Checkout Button -->
  <div x-show="items.length > 0" class="sticky bottom-0 px-4 py-4 bg-surface dark:bg-surface-dark border-t border-outline dark:border-outline-dark z-40">
    <a href="checkout-v2.html" class="flex items-center justify-between w-full px-4 py-3.5 bg-primary dark:bg-primary-dark text-on-primary dark:text-on-primary-dark rounded-radius font-semibold text-sm hover:opacity-90 transition-opacity no-underline">
      <span>Ir para Checkout</span>
      <span class="text-right">
        <div x-text="formatPrice(total)"></div>
        <div class="text-xs opacity-90">~45 min</div>
      </span>
    </a>
  </div>

  <!-- Continue Shopping -->
  <div x-show="items.length > 0" class="px-4 py-4 text-center">
    <a href="menu-v2.html" class="text-primary dark:text-primary-dark font-semibold text-sm hover:underline no-underline">← Continuar comprando</a>
  </div>

  <!-- Remove Confirmation Modal -->
  <div class="fixed inset-0 z-50" x-show="showRemoveModal" @click="showRemoveModal = false" x-cloak>
    <div class="fixed inset-0 bg-black/50"></div>
    <div class="fixed bottom-0 left-0 right-0 bg-surface dark:bg-surface-dark rounded-t-radius px-4 py-6 animate-slide-up" @click.stop>
      <h3 class="font-title text-lg font-semibold text-on-surface-strong dark:text-on-surface-dark-strong mb-4">Remover este item?</h3>
      <p x-show="itemToRemove !== null" x-text="items[itemToRemove]?.name" class="text-on-surface dark:text-on-surface-dark mb-4 text-sm"></p>
      <div class="flex gap-3">
        <button @click="showRemoveModal = false" class="flex-1 px-4 py-3 bg-surface-alt dark:bg-surface-dark-alt text-on-surface-strong dark:text-on-surface-dark-strong rounded-radius font-semibold text-sm hover:opacity-90 transition-opacity">Cancelar</button>
        <button @click="confirmRemove()" class="flex-1 px-4 py-3 bg-danger text-on-danger rounded-radius font-semibold text-sm hover:opacity-90 transition-opacity">Remover</button>
      </div>
    </div>
  </div>

  <script>
    function cartStore() {
      return {
        items: [
          {
            name: 'Croissant Clássico',
            price: 990,
            originalPrice: 1290,
            qty: 2,
            image: 'https://images.unsplash.com/photo-1509040159596-0249088772ff?w=200&h=200&fit=crop'
          },
          {
            name: 'Pain au Chocolat',
            price: 1190,
            originalPrice: null,
            qty: 1,
            image: 'https://images.unsplash.com/photo-1587668178277-295251f900ce?w=200&h=200&fit=crop'
          },
          {
            name: 'Café Espresso',
            price: 690,
            originalPrice: null,
            qty: 1,
            image: 'https://images.unsplash.com/photo-1461023058943-07fcbe16d735?w=200&h=200&fit=crop'
          }
        ],
        fulfillmentMode: 'pickup',
        showRemoveModal: false,
        itemToRemove: null,

        get totalItems() {
          return this.items.reduce((sum, item) => sum + item.qty, 0);
        },

        get subtotal() {
          return this.items.reduce((sum, item) => sum + (item.price * item.qty), 0);
        },

        get totalSavings() {
          return this.items.reduce((sum, item) => {
            if (item.originalPrice) {
              return sum + ((item.originalPrice - item.price) * item.qty);
            }
            return sum;
          }, 0);
        },

        get deliveryFee() {
          return this.subtotal >= 50000 ? 0 : 500;
        },

        get total() {
          return this.subtotal + (this.fulfillmentMode === 'delivery' ? this.deliveryFee : 0);
        },

        formatPrice(cents) {
          return 'R$ ' + (cents / 100).toFixed(2).replace('.', ',');
        },

        incrementQty(index) {
          this.items[index].qty += 1;
        },

        decrementQty(index) {
          if (this.items[index].qty > 1) {
            this.items[index].qty -= 1;
          } else {
            this.itemToRemove = index;
            this.showRemoveModal = true;
          }
        },

        removeItem(index) {
          this.itemToRemove = index;
          this.showRemoveModal = true;
        },

        confirmRemove() {
          if (this.itemToRemove !== null) {
            this.items.splice(this.itemToRemove, 1);
          }
          this.showRemoveModal = false;
          this.itemToRemove = null;
        }
      };
    }
  </script>

  <script src="proto-scenarios.js"></script>
</body>
</html>
