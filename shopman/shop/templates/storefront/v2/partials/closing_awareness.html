{# ── Closing Awareness Banner (Penguin UI banner) ──
   Alpine for DOM: auto-appears when closing within 1h, ticks every 60s.
   Data source: shop_status from context processor.
#}
<div x-data="closingAwareness()" x-init="check(); setInterval(() => check(), 60000)">
  <div x-show="show" x-transition x-cloak
       class="relative flex border-warning bg-warning/10 p-4 text-on-surface dark:text-on-surface-dark border-b border-warning/25 rounded-radius mb-4 max-w-2xl mx-auto">
    <div class="flex items-center gap-2.5 mx-auto">
      <div class="rounded-full bg-warning/15 p-0.5 text-warning shrink-0" aria-hidden="true">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="size-5">
          <path fill-rule="evenodd" d="M18 10a8 8 0 1 1-16 0 8 8 0 0 1 16 0Zm-8-5a.75.75 0 0 1 .75.75v4.5a.75.75 0 0 1-1.5 0v-4.5A.75.75 0 0 1 10 5Zm0 10a1 1 0 1 0 0-2 1 1 0 0 0 0 2Z" clip-rule="evenodd" />
        </svg>
      </div>
      <p class="text-xs sm:text-sm text-pretty font-medium" x-text="message"></p>
    </div>
    <button @click="show = false" class="absolute top-1/2 -translate-y-1/2 right-4 text-on-surface dark:text-on-surface-dark" aria-label="dispensar">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true" stroke="currentColor" fill="none" stroke-width="2.5" class="size-4 shrink-0">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </button>
  </div>
</div>

<script>
document.addEventListener('alpine:init', () => {
  Alpine.data('closingAwareness', () => ({
    show: false,
    message: '',

    check() {
      const isOpen = {{ shop_status.is_open|yesno:"true,false" }};
      const closesAt = '{{ shop_status.closes_at|default:"" }}';
      if (!isOpen || !closesAt) { this.show = false; return; }

      const now = new Date();
      const nowMin = now.getHours() * 60 + now.getMinutes();
      const parts = closesAt.split(':');
      const closeMin = parseInt(parts[0]) * 60 + parseInt(parts[1] || 0);
      const left = closeMin - nowMin;

      if (left > 0 && left <= 60) {
        const rounded = Math.ceil(left / 15) * 15;
        this.message = 'Ultimos pedidos — fechamos em ' + rounded + ' minutos';
        this.show = true;
      } else {
        this.show = false;
      }
    }
  }));
});
</script>
