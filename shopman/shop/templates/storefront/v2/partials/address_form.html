<form hx-post="{% url 'storefront:address_create' %}"
      hx-target="#address-list"
      hx-swap="innerHTML"
      hx-on::after-request="if(event.detail.successful) showAddressForm = false"
      class="space-y-3">
  {% csrf_token %}
  <input type="hidden" name="customer_phone" value="{{ customer.phone }}">

  <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
    <div>
      <label class="block text-xs font-medium text-on-surface dark:text-on-surface-dark mb-1">Rótulo</label>
      <select name="label"
              class="w-full px-3 py-2 rounded-radius border border-outline dark:border-outline-dark
                     bg-surface dark:bg-surface-dark text-on-surface dark:text-on-surface-dark text-sm
                     focus:outline-hidden focus:ring-2 focus:ring-primary dark:focus:ring-primary-dark">
        <option value="home">Casa</option>
        <option value="work">Trabalho</option>
        <option value="other">Outro</option>
      </select>
    </div>
    <div>
      <label class="block text-xs font-medium text-on-surface dark:text-on-surface-dark mb-1">Rótulo personalizado</label>
      <input type="text" name="label_custom"
             placeholder="Ex: Casa da vovó"
             class="w-full px-3 py-2 rounded-radius border border-outline dark:border-outline-dark
                    bg-surface dark:bg-surface-dark text-on-surface dark:text-on-surface-dark text-sm
                    placeholder:text-on-surface/30 dark:placeholder:text-on-surface-dark/30
                    focus:outline-hidden focus:ring-2 focus:ring-primary dark:focus:ring-primary-dark">
    </div>
  </div>

  <div>
    <label class="block text-xs font-medium text-on-surface dark:text-on-surface-dark mb-1">Rua *</label>
    <input type="text" name="route" required
           placeholder="Nome da rua"
           class="w-full px-3 py-2 rounded-radius border
                  {% if form_errors.formatted_address %}border-danger dark:border-danger-dark{% else %}border-outline dark:border-outline-dark{% endif %}
                  bg-surface dark:bg-surface-dark text-on-surface dark:text-on-surface-dark text-sm
                  placeholder:text-on-surface/30 dark:placeholder:text-on-surface-dark/30
                  focus:outline-hidden focus:ring-2 focus:ring-primary dark:focus:ring-primary-dark">
  </div>

  <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
    <div>
      <label class="block text-xs font-medium text-on-surface dark:text-on-surface-dark mb-1">Número</label>
      <input type="text" name="street_number"
             placeholder="123"
             class="w-full px-3 py-2 rounded-radius border border-outline dark:border-outline-dark
                    bg-surface dark:bg-surface-dark text-on-surface dark:text-on-surface-dark text-sm
                    placeholder:text-on-surface/30 dark:placeholder:text-on-surface-dark/30
                    focus:outline-hidden focus:ring-2 focus:ring-primary dark:focus:ring-primary-dark">
    </div>
    <div>
      <label class="block text-xs font-medium text-on-surface dark:text-on-surface-dark mb-1">Complemento</label>
      <input type="text" name="complement"
             placeholder="Apto, bloco..."
             class="w-full px-3 py-2 rounded-radius border border-outline dark:border-outline-dark
                    bg-surface dark:bg-surface-dark text-on-surface dark:text-on-surface-dark text-sm
                    placeholder:text-on-surface/30 dark:placeholder:text-on-surface-dark/30
                    focus:outline-hidden focus:ring-2 focus:ring-primary dark:focus:ring-primary-dark">
    </div>
  </div>

  <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
    <div>
      <label class="block text-xs font-medium text-on-surface dark:text-on-surface-dark mb-1">Bairro</label>
      <input type="text" name="neighborhood"
             placeholder="Centro"
             class="w-full px-3 py-2 rounded-radius border border-outline dark:border-outline-dark
                    bg-surface dark:bg-surface-dark text-on-surface dark:text-on-surface-dark text-sm
                    placeholder:text-on-surface/30 dark:placeholder:text-on-surface-dark/30
                    focus:outline-hidden focus:ring-2 focus:ring-primary dark:focus:ring-primary-dark">
    </div>
    <div>
      <label class="block text-xs font-medium text-on-surface dark:text-on-surface-dark mb-1">Cidade</label>
      <input type="text" name="city" value="{{ storefront.default_city }}"
             class="w-full px-3 py-2 rounded-radius border border-outline dark:border-outline-dark
                    bg-surface dark:bg-surface-dark text-on-surface dark:text-on-surface-dark text-sm
                    focus:outline-hidden focus:ring-2 focus:ring-primary dark:focus:ring-primary-dark">
    </div>
  </div>

  <div>
    <label class="block text-xs font-medium text-on-surface dark:text-on-surface-dark mb-1">Endereço formatado</label>
    <input type="text" name="formatted_address"
           placeholder="Rua das Flores, 123 - Centro, {{ storefront.default_city }}"
           class="w-full px-3 py-2 rounded-radius border border-outline dark:border-outline-dark
                  bg-surface dark:bg-surface-dark text-on-surface dark:text-on-surface-dark text-sm
                  placeholder:text-on-surface/30 dark:placeholder:text-on-surface-dark/30
                  focus:outline-hidden focus:ring-2 focus:ring-primary dark:focus:ring-primary-dark">
    <p class="text-xs text-on-surface/50 dark:text-on-surface-dark/50 mt-1">Deixe em branco para gerar automaticamente dos campos acima</p>
    {% if form_errors.formatted_address %}
    <p class="mt-1 text-xs text-danger dark:text-danger-dark">{{ form_errors.formatted_address }}</p>
    {% endif %}
  </div>

  <div>
    <label class="block text-xs font-medium text-on-surface dark:text-on-surface-dark mb-1">Instruções de entrega</label>
    <textarea name="delivery_instructions" rows="2"
              placeholder="Instruções para o entregador..."
              class="w-full px-3 py-2 rounded-radius border border-outline dark:border-outline-dark
                     bg-surface dark:bg-surface-dark text-on-surface dark:text-on-surface-dark text-sm resize-none
                     placeholder:text-on-surface/30 dark:placeholder:text-on-surface-dark/30
                     focus:outline-hidden focus:ring-2 focus:ring-primary dark:focus:ring-primary-dark"></textarea>
  </div>

  <div class="flex items-center gap-2">
    <input type="checkbox" name="is_default" id="addr-default"
           class="rounded text-primary focus:ring-primary dark:text-primary-dark dark:focus:ring-primary-dark">
    <label for="addr-default" class="text-sm text-on-surface dark:text-on-surface-dark cursor-pointer">Endereço padrão</label>
  </div>

  <div class="flex gap-2">
    <button type="submit"
            class="px-4 py-2 rounded-radius bg-primary text-white text-sm font-medium hover:opacity-90 transition
                   min-h-[36px] dark:bg-primary-dark">
      Adicionar
    </button>
    <button type="button" @click="showAddressForm = false"
            class="px-4 py-2 rounded-radius border border-outline text-on-surface text-sm font-medium
                   hover:bg-surface-alt transition min-h-[36px]
                   dark:border-outline-dark dark:text-on-surface-dark dark:hover:bg-surface-dark-alt">
      Cancelar
    </button>
  </div>
</form>
