{% comment %}
  ── Shop Status Badge (Penguin UI badge) ──
  Alpine for DOM: real-time countdown tick every 60s.
  Data source: shop_status from context processor (is_open, opens_at, closes_at).
{% endcomment %}
<div x-data="shopStatusBadge()" x-init="tick(); setInterval(() => tick(), 60000)">
  {# Open #}
  <span x-show="isOpen" x-cloak
        class="rounded-radius w-fit border border-success bg-success px-2 py-1 text-xs font-medium text-on-success"
        x-text="label">
  </span>
  {# Closed #}
  <span x-show="!isOpen" x-cloak
        class="rounded-radius w-fit border border-outline bg-surface-alt px-2 py-1 text-xs font-medium text-on-surface dark:border-outline-dark dark:bg-surface-dark-alt dark:text-on-surface-dark"
        x-text="label">
  </span>
  {# SSR fallback #}
  <noscript>
    {% if shop_status.is_open %}
    <span class="rounded-radius w-fit border border-success bg-success px-2 py-1 text-xs font-medium text-on-success">Aberto</span>
    {% else %}
    <span class="rounded-radius w-fit border border-outline bg-surface-alt px-2 py-1 text-xs font-medium text-on-surface dark:border-outline-dark dark:bg-surface-dark-alt dark:text-on-surface-dark">{{ shop_status.message }}</span>
    {% endif %}
  </noscript>
</div>

<script>
document.addEventListener('alpine:init', () => {
  Alpine.data('shopStatusBadge', () => ({
    isOpen: {{ shop_status.is_open|yesno:"true,false" }},
    label: '',
    opensAt: '{{ shop_status.opens_at|default:"" }}',
    closesAt: '{{ shop_status.closes_at|default:"" }}',

    tick() {
      const now = new Date();
      const nowMin = now.getHours() * 60 + now.getMinutes();

      if (this.isOpen && this.closesAt) {
        const closeMin = this._toMin(this.closesAt);
        const left = closeMin - nowMin;
        if (left > 0 && left <= 60) {
          const rounded = Math.ceil(left / 15) * 15;
          this.label = 'Aberto — fecha em ' + rounded + 'min';
        } else {
          this.label = 'Aberto — ate ' + this._fmtHour(this.closesAt);
        }
      } else if (this.isOpen) {
        this.label = 'Aberto agora';
      } else if (this.opensAt) {
        this.label = 'Fechado — abre as ' + this._fmtHour(this.opensAt);
      } else {
        this.label = 'Fechado';
      }
    },

    _toMin(t) {
      const p = t.split(':');
      return parseInt(p[0]) * 60 + parseInt(p[1] || 0);
    },
    _fmtHour(t) {
      const p = t.split(':');
      return parseInt(p[0]) + 'h' + (p[1] && p[1] !== '00' ? p[1] : '');
    }
  }));
});
</script>
