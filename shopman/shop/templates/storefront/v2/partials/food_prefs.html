{% for pref in food_pref_options %}
<button type="button"
        hx-post="{% url 'storefront:food_preference_toggle' %}"
        hx-vals='{"key": "{{ pref.key }}"}'
        hx-target="#food-prefs"
        hx-swap="innerHTML"
        class="inline-flex items-center px-3 py-1.5 rounded-full text-sm font-medium transition-colors min-h-[36px]
               {% if pref.is_active %}
                 bg-primary text-white dark:bg-primary-dark
               {% else %}
                 border border-outline text-on-surface hover:bg-surface-alt
                 dark:border-outline-dark dark:text-on-surface-dark dark:hover:bg-surface-dark-alt
               {% endif %}">
  {{ pref.label }}
</button>
{% endfor %}
