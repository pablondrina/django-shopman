{% for pref in food_pref_options %}
<label class="flex items-center justify-between py-3 cursor-pointer
              {% if not forloop.last %}border-b border-outline dark:border-outline-dark{% endif %}">
  <span class="text-sm font-medium text-on-surface-strong dark:text-on-surface-dark-strong">{{ pref.label }}</span>
  <button type="button"
          hx-post="{% url 'storefront:food_preference_toggle' %}"
          hx-vals='{"key": "{{ pref.key }}"}'
          hx-target="#food-prefs"
          hx-swap="innerHTML"
          role="switch"
          aria-checked="{{ pref.is_active|yesno:'true,false' }}"
          class="relative inline-flex h-6 w-11 shrink-0 items-center rounded-full transition-colors ml-4
                 {% if pref.is_active %}bg-primary dark:bg-primary-dark{% else %}bg-outline dark:bg-outline-dark{% endif %}">
    <span class="inline-block size-5 transform rounded-full bg-white shadow transition-transform
                 {% if pref.is_active %}translate-x-5{% else %}translate-x-0.5{% endif %}">
    </span>
  </button>
</label>
{% endfor %}
