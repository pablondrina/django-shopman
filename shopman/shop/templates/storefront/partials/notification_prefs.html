{% for pref in notification_prefs %}
<label for="notif-pref-{{ pref.key }}"
       class="flex items-center justify-between py-3 cursor-pointer
              {% if not forloop.last %}border-b border-outline dark:border-outline-dark{% endif %}">
  <div>
    <p class="text-sm font-medium text-on-surface-strong dark:text-on-surface-dark-strong">{{ pref.label }}</p>
    <p class="text-xs text-on-surface/60 dark:text-on-surface-dark/60">{{ pref.description }}</p>
  </div>
  <div class="inline-flex items-center gap-3 ml-4 shrink-0">
    <input id="notif-pref-{{ pref.key }}"
           type="checkbox"
           class="peer sr-only"
           role="switch"
           {% if pref.enabled %}checked{% endif %}
           hx-post="{% url 'storefront:notification_prefs_toggle' %}"
           hx-vals='{"channel": "{{ pref.key }}"}'
           hx-target="#notification-prefs"
           hx-swap="innerHTML"
           hx-trigger="change">
    <div class="relative h-6 w-11 after:h-5 after:w-5 peer-checked:after:translate-x-5 rounded-full border border-outline bg-surface-alt after:absolute after:bottom-0 after:left-[0.0625rem] after:top-0 after:my-auto after:rounded-full after:bg-on-surface after:transition-all after:content-[''] peer-checked:bg-primary peer-checked:after:bg-on-primary peer-focus:outline-2 peer-focus:outline-offset-2 peer-focus:outline-outline-strong peer-focus:peer-checked:outline-primary peer-active:outline-offset-0 dark:border-outline-dark dark:bg-surface-dark-alt dark:after:bg-on-surface-dark dark:peer-checked:bg-primary-dark dark:peer-checked:after:bg-on-primary-dark dark:peer-focus:outline-outline-dark-strong dark:peer-focus:peer-checked:outline-primary-dark" aria-hidden="true"></div>
  </div>
</label>
{% empty %}
<p class="text-sm text-on-surface/60 dark:text-on-surface-dark/60">Nenhuma preferência de notificação configurável no momento.</p>
{% endfor %}
