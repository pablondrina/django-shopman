{% for pref in notification_prefs %}
<label class="flex items-center justify-between py-2 cursor-pointer">
  <div>
    <p class="text-sm font-medium text-foreground">{{ pref.label }}</p>
    <p class="text-xs text-muted-foreground">{{ pref.description }}</p>
  </div>
  {% include "components/_toggle.html" with name=pref.key checked=pref.enabled hx_post="/minha-conta/notificacoes/" hx_target="#notification-prefs" %}
</label>
{% empty %}
<p class="text-sm text-muted-foreground">Nenhuma preferência de notificação configurável no momento.</p>
{% endfor %}
