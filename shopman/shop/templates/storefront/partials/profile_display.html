{% load storefront_tags %}
<div id="profile-section">
  <div class="flex items-center justify-between mb-4">
    <h3 class="text-h4 text-foreground">Dados pessoais</h3>
    <button
      type="button"
      hx-get="{% url 'storefront:profile_edit' %}"
      hx-target="#profile-section"
      hx-swap="outerHTML"
      class="text-sm font-medium text-secondary hover:text-secondary-hover transition-colors"
    >
      Editar
    </button>
  </div>
  <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
    <div>
      <p class="text-overline text-muted-foreground mb-1">Nome</p>
      <p class="text-foreground font-medium">{{ customer.name|default:"—" }}</p>
    </div>
    <div>
      <p class="text-overline text-muted-foreground mb-1">Telefone</p>
      <p class="text-foreground font-medium">{{ customer.phone|format_phone }}</p>
    </div>
    {% if customer.email %}
    <div>
      <p class="text-overline text-muted-foreground mb-1">Email</p>
      <p class="text-foreground font-medium">{{ customer.email }}</p>
    </div>
    {% endif %}
    {% if customer.birthday %}
    <div>
      <p class="text-overline text-muted-foreground mb-1">Data de nascimento</p>
      <p class="text-foreground font-medium">{{ customer.birthday|date:"d/m/Y" }}</p>
    </div>
    {% endif %}
  </div>
</div>
