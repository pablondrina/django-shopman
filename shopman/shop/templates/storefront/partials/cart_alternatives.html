{% load storefront_tags %}

{% if alternatives %}
<div class="px-4 py-3 bg-warning-light/30 border border-warning/30 rounded-xl mx-3 mb-2">
  <p class="text-body-sm font-semibold text-warning-foreground mb-3">Produtos similares disponíveis</p>
  <div class="space-y-2">
    {% for item in alternatives %}
    <div class="flex items-center gap-3 py-2 border-b border-border/40 last:border-b-0">
      <div class="w-9 h-9 shrink-0 rounded-lg bg-gradient-to-br from-border/80 to-muted/50 border border-border/60 flex items-center justify-center text-primary">
        {{ item.sku|product_icon:"icon-sm" }}
      </div>
      <div class="flex-1 min-w-0">
        <p class="text-sm font-medium text-foreground truncate">{{ item.name }}</p>
        <p class="text-xs text-primary font-semibold">{{ item.price_display }}</p>
      </div>
      <button
        type="button"
        class="shrink-0 inline-flex items-center gap-1 px-2.5 py-1.5 rounded-lg text-xs font-semibold bg-primary text-primary-foreground hover:bg-primary-hover transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring"
        hx-post="{% url 'storefront:cart_add' %}"
        hx-vals='{"sku": "{{ item.sku }}", "qty": "1"}'
        hx-target="#cart-badge-header"
        hx-swap="innerHTML"
        aria-label="Adicionar {{ item.name }} ao carrinho"
      >
        <span class="material-symbols-rounded" style="font-size:14px" aria-hidden="true">add</span>
        Add
      </button>
    </div>
    {% endfor %}
  </div>
</div>
{% else %}
<div class="px-4 py-2 text-center text-body-sm text-muted-foreground mx-3 mb-2">
  Sem alternativas disponíveis no momento.
</div>
{% endif %}
