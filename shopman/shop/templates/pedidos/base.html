{% load static storefront_tags %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="robots" content="noindex, nofollow">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>{% block title %}Gestor de Pedidos{% endblock %}</title>

  {% include "components/_material_symbols_embed.html" %}

  {# HTMX + Alpine.js #}
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>

  <style>
    /* ── Oxbow design tokens ────────────────────────────────────────── */
    :root {
      /* Base scale */
      --radius: 0.625rem;
      --radius-sm: 0.375rem;
      --radius-lg: 0.75rem;

      /* Gestor dark theme (Oxbow dark) */
      --ped-bg: oklch(0.145 0 0);
      --ped-surface: oklch(0.2 0 0);
      --ped-surface-hover: oklch(0.24 0 0);
      --ped-border: oklch(0.3 0 0);
      --ped-text: oklch(0.985 0 0);
      --ped-text-secondary: oklch(0.708 0 0);
      --ped-text-muted: oklch(0.556 0 0);
      --ped-input: oklch(0.18 0 0);

      /* Status colors */
      --ped-ok: oklch(0.564 0.168 143.8);
      --ped-warning: oklch(0.681 0.15 59);
      --ped-warning-fg: oklch(0.145 0 0);
      --ped-danger: oklch(0.577 0.245 27.325);
      --ped-accent: oklch(0.659 0.23 35.2);
      --ped-info: oklch(0.609 0.202 257.2);

      /* Touch target */
      --touch-min: 48px;

      /* Font */
      --font-sans: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --font-mono: 'Geist Mono', ui-monospace, 'Cascadia Mono', monospace;
    }

    /* Light mode variant */
    .ped-light {
      --ped-bg: oklch(0.97 0 0);
      --ped-surface: oklch(1 0 0);
      --ped-surface-hover: oklch(0.97 0 0);
      --ped-border: oklch(0.922 0 0);
      --ped-text: oklch(0.145 0 0);
      --ped-text-secondary: oklch(0.4 0 0);
      --ped-text-muted: oklch(0.556 0 0);
      --ped-input: oklch(0.97 0 0);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-sans);
      background: var(--ped-bg);
      color: var(--ped-text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    [x-cloak] { display: none !important; }

    /* ── Header ─────────────────────────────────────────────────────── */
    .ped-header {
      background: var(--ped-surface);
      border-bottom: 1px solid var(--ped-border);
      padding: 0.5rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      position: sticky;
      top: 0;
      z-index: 50;
      min-height: 56px;
    }

    .ped-header h1 {
      font-size: 1.125rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .ped-header-left,
    .ped-header-right {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    /* ── Buttons ────────────────────────────────────────────────────── */
    .ped-btn-icon {
      background: none;
      border: 1px solid transparent;
      cursor: pointer;
      color: var(--ped-text-secondary);
      border-radius: var(--radius);
      min-width: var(--touch-min);
      min-height: var(--touch-min);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s;
    }
    .ped-btn-icon:hover { background: var(--ped-surface-hover); border-color: var(--ped-border); }
    .ped-btn-icon:focus-visible { outline: 2px solid var(--ped-accent); outline-offset: 2px; }

    .ped-btn {
      border: none;
      cursor: pointer;
      border-radius: var(--radius);
      font-size: 0.875rem;
      font-weight: 600;
      min-height: var(--touch-min);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.375rem;
      padding: 0.5rem 1rem;
      transition: opacity 0.15s;
      flex: 1;
    }
    .ped-btn:hover { opacity: 0.9; }
    .ped-btn:active { opacity: 0.8; }
    .ped-btn:focus-visible { outline: 2px solid var(--ped-accent); outline-offset: 2px; }
    .ped-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .ped-btn--confirm {
      background: var(--ped-ok);
      color: oklch(0.145 0 0);
    }
    .ped-btn--reject {
      background: oklch(0.577 0.245 27.325 / 0.15);
      color: var(--ped-danger);
      border: 1px solid var(--ped-danger);
      flex: 0;
    }
    .ped-btn--advance {
      background: var(--ped-info);
      color: oklch(0.985 0 0);
    }
    .ped-btn--danger {
      background: var(--ped-danger);
      color: oklch(0.985 0 0);
      width: 100%;
    }
    .ped-btn--pay {
      background: oklch(0.564 0.168 143.8 / 0.15);
      color: var(--ped-ok);
      border: 1px solid var(--ped-ok);
    }
    .ped-btn--pay-confirm {
      background: var(--ped-ok);
      color: oklch(0.145 0 0);
    }
    .ped-btn--link {
      background: var(--ped-surface-hover);
      color: var(--ped-text-secondary);
      border: 1px solid var(--ped-border);
      text-decoration: none;
      flex: 0;
      font-size: 0.8125rem;
    }

    /* ── Clock ──────────────────────────────────────────────────────── */
    .ped-clock {
      font-family: var(--font-mono);
      font-size: 1rem;
      font-variant-numeric: tabular-nums;
      color: var(--ped-text-secondary);
    }

    /* ── Main content ──────────────────────────────────────────────── */
    .ped-main {
      flex: 1;
      padding: 1rem;
      width: 100%;
      max-width: 1440px;
      margin: 0 auto;
    }

    /* ── Filter pills ──────────────────────────────────────────────── */
    .ped-filters {
      padding: 0.75rem 1rem;
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--ped-border);
      background: var(--ped-surface);
    }

    .ped-pill {
      padding: 0.375rem 0.75rem;
      border-radius: 999px;
      font-size: 0.8125rem;
      font-weight: 500;
      border: 1px solid var(--ped-border);
      cursor: pointer;
      transition: all 0.15s;
      min-height: var(--touch-min);
      display: inline-flex;
      align-items: center;
      background: transparent;
      color: var(--ped-text-secondary);
    }
    .ped-pill:hover { background: var(--ped-surface-hover); }

    .ped-pill--active {
      background: var(--ped-accent);
      color: oklch(0.985 0 0);
      border-color: var(--ped-accent);
    }
    .ped-pill--active:hover { background: var(--ped-accent); opacity: 0.9; }

    /* ── Order grid ────────────────────────────────────────────────── */
    .ped-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1rem;
    }

    .ped-empty {
      text-align: center;
      padding: 4rem 1rem;
      color: var(--ped-text-muted);
      grid-column: 1 / -1;
    }
    .ped-empty .material-symbols-rounded {
      font-size: 3rem;
      display: block;
      margin-bottom: 1rem;
      opacity: 0.5;
    }
    .ped-empty p { font-size: 1.125rem; }

    /* ── Card ───────────────────────────────────────────────────────── */
    .ped-card {
      background: var(--ped-surface);
      border: 1px solid var(--ped-border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: border-color 0.2s;
    }
    .ped-card--new { border-left: 3px solid var(--ped-warning); }
    .ped-card--preparing { border-left: 3px solid var(--ped-info); }
    .ped-card--ready { border-left: 3px solid var(--ped-ok); }
    .ped-card.htmx-request { opacity: 0.6; pointer-events: none; }

    /* ── Card header ────────────────────────────────────────────────── */
    .ped-card-header {
      padding: 0.75rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      gap: 0.5rem;
    }
    .ped-card-header:hover { background: var(--ped-surface-hover); }

    .ped-card-ref {
      display: flex;
      align-items: center;
      gap: 0.375rem;
      font-size: 0.9375rem;
      min-width: 0;
    }
    .ped-card-ref strong { font-weight: 700; }

    /* ── Status badge ──────────────────────────────────────────────── */
    .ped-badge {
      font-size: 0.6875rem;
      font-weight: 700;
      padding: 0.125rem 0.5rem;
      border-radius: 999px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      white-space: nowrap;
    }
    .ped-badge--new { background: var(--ped-warning); color: var(--ped-warning-fg); }
    .ped-badge--confirmed { background: var(--ped-info); color: oklch(0.985 0 0); }
    .ped-badge--preparing { background: oklch(0.609 0.202 257.2 / 0.2); color: var(--ped-info); border: 1px solid var(--ped-info); }
    .ped-badge--ready { background: var(--ped-ok); color: oklch(0.145 0 0); }

    /* ── Timer ─────────────────────────────────────────────────────── */
    .ped-timer {
      font-family: var(--font-mono);
      font-size: 0.875rem;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      display: flex;
      align-items: center;
      gap: 0.25rem;
      flex-shrink: 0;
    }
    .timer-ok { color: var(--ped-ok); }
    .timer-warning { color: var(--ped-warning); }
    .timer-urgent { color: var(--ped-danger); }
    .timer-muted { color: var(--ped-text-muted); }

    /* ── Card body ─────────────────────────────────────────────────── */
    .ped-card-body { padding: 0 1rem 0.75rem; }

    .ped-card-customer {
      font-size: 0.875rem;
      font-weight: 500;
      margin-bottom: 0.25rem;
    }

    .ped-card-items {
      font-size: 0.8125rem;
      color: var(--ped-text-secondary);
      margin-bottom: 0.25rem;
      line-height: 1.4;
    }

    .ped-card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 0.375rem;
    }

    .ped-card-fulfillment {
      font-size: 0.8125rem;
      color: var(--ped-text-muted);
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
    }

    .ped-card-total {
      font-weight: 700;
      font-size: 0.9375rem;
      font-variant-numeric: tabular-nums;
    }

    /* ── Card actions ──────────────────────────────────────────────── */
    .ped-card-actions {
      padding: 0 1rem 0.75rem;
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .ped-paid-badge {
      padding: 0.25rem 0.625rem;
      background: oklch(0.564 0.168 143.8 / 0.15);
      color: var(--ped-ok);
      border-radius: var(--radius);
      font-size: 0.75rem;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
    }

    /* ── Reject form ───────────────────────────────────────────────── */
    .ped-reject-form { padding: 0 1rem 0.75rem; }

    .ped-textarea {
      width: 100%;
      padding: 0.5rem;
      border: 1px solid var(--ped-border);
      border-radius: var(--radius);
      font-size: 0.875rem;
      font-family: var(--font-sans);
      background: var(--ped-input);
      color: var(--ped-text);
      resize: vertical;
      box-sizing: border-box;
    }
    .ped-textarea:focus { outline: 2px solid var(--ped-accent); outline-offset: -1px; border-color: transparent; }

    /* ── Detail accordion ──────────────────────────────────────────── */
    .ped-detail {
      border-top: 1px solid var(--ped-border);
      padding: 0.75rem 1rem;
    }

    .ped-detail-heading {
      font-size: 0.875rem;
      font-weight: 600;
      margin: 0 0 0.5rem;
    }

    .ped-detail-table {
      width: 100%;
      font-size: 0.8125rem;
      border-collapse: collapse;
    }
    .ped-detail-table thead {
      color: var(--ped-text-muted);
      text-align: left;
    }
    .ped-detail-table th,
    .ped-detail-table td {
      padding: 0.3125rem 0;
    }
    .ped-detail-table tbody tr { border-top: 1px solid var(--ped-border); }
    .ped-detail-table .text-center { text-align: center; }
    .ped-detail-table .text-right { text-align: right; }

    /* ── Timeline ──────────────────────────────────────────────────── */
    .ped-timeline {
      font-size: 0.8125rem;
      color: var(--ped-text-secondary);
    }
    .ped-timeline-event {
      display: flex;
      gap: 0.5rem;
      padding: 0.125rem 0;
    }
    .ped-timeline-time {
      font-family: var(--font-mono);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      color: var(--ped-text-muted);
    }

    /* ── Notes ─────────────────────────────────────────────────────── */
    .ped-notes { display: flex; gap: 0.5rem; align-items: flex-start; }
    .ped-notes-saved {
      font-size: 0.75rem;
      color: var(--ped-ok);
      font-weight: 600;
    }

    /* ── Icon sizes ────────────────────────────────────────────────── */
    .ped-icon-sm { font-size: 1rem; }
    .ped-icon-md { font-size: 1.25rem; }

    /* ── Queue counter ─────────────────────────────────────────────── */
    .ped-queue-count {
      font-family: var(--font-mono);
      font-size: 0.8125rem;
      color: var(--ped-text-muted);
      font-variant-numeric: tabular-nums;
    }

    /* ── Responsive ────────────────────────────────────────────────── */
    @media (max-width: 640px) {
      .ped-header { padding: 0.5rem; }
      .ped-main { padding: 0.5rem; }
      .ped-filters { padding: 0.5rem; }
      .ped-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  {# HTMX CSRF #}
  <script>
    document.addEventListener('htmx:configRequest', function(e) {
      var csrfToken = '{{ csrf_token }}';
      if (csrfToken) {
        e.detail.headers['X-CSRFToken'] = csrfToken;
      }
    });
  </script>

  {% block body %}{% endblock %}
</body>
</html>
