{% load static storefront_tags %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="robots" content="noindex, nofollow">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>{% block title %}KDS{% endblock %}</title>

  {% include "components/_material_symbols_embed.html" %}

  {# HTMX #}
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>

  <style>
    /* ── Oxbow design tokens ────────────────────────────────────────── */
    :root {
      /* Base scale */
      --radius: 0.625rem;
      --radius-sm: 0.375rem;
      --radius-lg: 0.75rem;

      /* KDS dark theme (derived from Oxbow dark) */
      --kds-bg: oklch(0.145 0 0);
      --kds-surface: oklch(0.2 0 0);
      --kds-surface-hover: oklch(0.24 0 0);
      --kds-border: oklch(0.3 0 0);
      --kds-text: oklch(0.985 0 0);
      --kds-text-secondary: oklch(0.708 0 0);
      --kds-text-muted: oklch(0.556 0 0);

      /* Status colors */
      --kds-ok: oklch(0.564 0.168 143.8);
      --kds-warning: oklch(0.681 0.15 59);
      --kds-warning-fg: oklch(0.145 0 0);
      --kds-danger: oklch(0.577 0.245 27.325);
      --kds-accent: oklch(0.659 0.23 35.2);
      --kds-info: oklch(0.609 0.202 257.2);

      /* Touch target */
      --touch-min: 48px;

      /* Font */
      --font-sans: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --font-mono: 'Geist Mono', ui-monospace, 'Cascadia Mono', monospace;
    }

    /* Light mode for bright kitchens */
    .kds-light {
      --kds-bg: oklch(0.97 0 0);
      --kds-surface: oklch(1 0 0);
      --kds-surface-hover: oklch(0.97 0 0);
      --kds-border: oklch(0.922 0 0);
      --kds-text: oklch(0.145 0 0);
      --kds-text-secondary: oklch(0.4 0 0);
      --kds-text-muted: oklch(0.556 0 0);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-sans);
      background: var(--kds-bg);
      color: var(--kds-text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ──────────────────────────────────────────────────── */
    .kds-header {
      background: var(--kds-surface);
      border-bottom: 1px solid var(--kds-border);
      padding: 0.5rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      position: sticky;
      top: 0;
      z-index: 50;
      min-height: 56px;
    }

    .kds-header h1 {
      font-size: 1.125rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .kds-header-left,
    .kds-header-right {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    /* ── Buttons ─────────────────────────────────────────────────── */
    .kds-btn-icon {
      background: none;
      border: 1px solid transparent;
      cursor: pointer;
      color: var(--kds-text-secondary);
      border-radius: var(--radius);
      min-width: var(--touch-min);
      min-height: var(--touch-min);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s;
    }
    .kds-btn-icon:hover { background: var(--kds-surface-hover); border-color: var(--kds-border); }
    .kds-btn-icon:focus-visible { outline: 2px solid var(--kds-accent); outline-offset: 2px; }

    .kds-btn-primary {
      border: none;
      cursor: pointer;
      background: var(--kds-ok);
      color: oklch(0.145 0 0);
      border-radius: var(--radius);
      font-size: 1rem;
      font-weight: 700;
      min-height: var(--touch-min);
      width: 100%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      transition: opacity 0.15s;
      letter-spacing: 0.025em;
    }
    .kds-btn-primary:hover { opacity: 0.9; }
    .kds-btn-primary:active { opacity: 0.8; }
    .kds-btn-primary:focus-visible { outline: 2px solid var(--kds-accent); outline-offset: 2px; }
    .kds-btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

    .kds-btn-dispatch {
      background: var(--kds-accent);
      color: oklch(0.985 0 0);
    }

    /* ── Clock ───────────────────────────────────────────────────── */
    .kds-clock {
      font-family: var(--font-mono);
      font-size: 1rem;
      font-variant-numeric: tabular-nums;
      color: var(--kds-text-secondary);
    }

    /* ── Main content ────────────────────────────────────────────── */
    .kds-main {
      flex: 1;
      padding: 1rem;
      width: 100%;
    }

    /* ── Timer classes ────────────────────────────────────────────── */
    .timer-ok { color: var(--kds-ok); }
    .timer-warning { color: var(--kds-warning); }
    .timer-late { color: var(--kds-danger); }

    /* ── Status badge ────────────────────────────────────────────── */
    .kds-badge {
      font-size: 0.6875rem;
      font-weight: 700;
      padding: 0.125rem 0.5rem;
      border-radius: 999px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .kds-badge-pending { background: var(--kds-border); color: var(--kds-text-secondary); }
    .kds-badge-progress { background: var(--kds-info); color: oklch(0.985 0 0); }
    .kds-badge-count { background: var(--kds-danger); color: oklch(0.985 0 0); }

    /* ── Queue counter in header ─────────────────────────────────── */
    .kds-queue-count {
      font-family: var(--font-mono);
      font-size: 0.8125rem;
      color: var(--kds-text-muted);
      font-variant-numeric: tabular-nums;
    }

    /* ── Responsive ──────────────────────────────────────────────── */
    @media (max-width: 640px) {
      .kds-header { padding: 0.5rem; }
      .kds-main { padding: 0.5rem; }
    }
  </style>
</head>
<body>
  {# HTMX CSRF #}
  <script>
    document.addEventListener('htmx:configRequest', function(e) {
      var csrfToken = '{{ csrf_token }}';
      if (csrfToken) {
        e.detail.headers['X-CSRFToken'] = csrfToken;
      }
    });
  </script>

  {% block body %}{% endblock %}
</body>
</html>
