{# Global toast — Alpine store `toast`. Dispatched via @toast.window or showToast(). #}
<div
  x-data
  @toast.window="$store.toast.show($event.detail.message, $event.detail.type)"
  :role="$store.toast.type === 'error' ? 'alert' : 'status'"
  :aria-live="$store.toast.type === 'error' ? 'assertive' : 'polite'"
  x-show="$store.toast.visible"
  x-transition:enter="transition ease-out duration-300"
  x-transition:enter-start="opacity-0 translate-y-4"
  x-transition:enter-end="opacity-100 translate-y-0"
  x-transition:leave="transition ease-in duration-200"
  x-transition:leave-start="opacity-100 translate-y-0"
  x-transition:leave-end="opacity-0 translate-y-4"
  x-cloak
  @click="$store.toast.dismiss()"
  class="fixed left-1/2 -translate-x-1/2 z-50 px-5 py-3 rounded-xl shadow-lg text-sm font-medium flex items-center gap-2.5 cursor-pointer max-w-[90vw] border-l-4"
  :class="{
    'bg-foreground text-background border-success': $store.toast.type === 'success',
    'bg-foreground text-background border-warning': $store.toast.type === 'warning',
    'bg-foreground text-background border-error': $store.toast.type === 'error',
    'bg-foreground text-background border-info': $store.toast.type === 'info'
  }"
  style="bottom: calc(var(--bottom-nav-height) + var(--safe-area-bottom) + 1.5rem)"
>
  <span x-html="$store.toast.icon" class="flex-shrink-0 flex items-center justify-center text-base leading-none" aria-hidden="true"></span>
  <span x-text="$store.toast.message"></span>
</div>
