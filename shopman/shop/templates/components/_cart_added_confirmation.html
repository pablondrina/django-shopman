{# Cart added confirmation: brief toast with "Adicionado!" + actions. Auto-dismisses. #}

<div x-data="cartConfirmation()"
     @cart-item-added.window="show($event.detail)"
     x-show="visible"
     x-transition:enter="transition ease-out duration-200"
     x-transition:enter-start="opacity-0 translate-y-4"
     x-transition:enter-end="opacity-100 translate-y-0"
     x-transition:leave="transition ease-in duration-150"
     x-transition:leave-start="opacity-100 translate-y-0"
     x-transition:leave-end="opacity-0 translate-y-4"
     x-cloak
     class="fixed inset-x-0 bottom-0 z-[45] md:hidden"
     style="bottom: calc(72px + env(safe-area-inset-bottom, 0px));">

  <div class="mx-4 mb-4 bg-foreground text-background rounded-2xl shadow-xl overflow-hidden">
    {# Success indicator #}
    <div class="px-4 pt-4 pb-2 flex items-center gap-3">
      <div class="w-8 h-8 rounded-full bg-success flex items-center justify-center shrink-0">
        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/>
        </svg>
      </div>
      <div class="min-w-0">
        <p class="font-semibold text-sm">Adicionado!</p>
        <p class="text-xs opacity-70 truncate" x-text="itemName"></p>
      </div>
    </div>
    {# Actions #}
    <div class="flex gap-2 px-4 pb-4">
      <button @click="dismiss(); openCartDrawer();"
              class="flex-1 py-2.5 bg-primary text-white rounded-lg text-sm font-medium"
              style="min-height: var(--touch-min);">
        Ver carrinho
      </button>
      <button @click="dismiss()"
              class="flex-1 py-2.5 bg-white/10 rounded-lg text-sm font-medium"
              style="min-height: var(--touch-min);">
        Continuar
      </button>
    </div>
  </div>
</div>

<script>
function cartConfirmation() {
  return {
    visible: false,
    itemName: '',
    _timer: null,
    show(detail) {
      this.itemName = detail.name || detail.sku || '';
      this.visible = true;
      if (this._timer) clearTimeout(this._timer);
      var self = this;
      this._timer = setTimeout(function() { self.visible = false; }, 4000);
    },
    dismiss() {
      this.visible = false;
      if (this._timer) clearTimeout(this._timer);
    }
  };
}
</script>
