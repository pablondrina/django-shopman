[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "shopman-doorman"
version = "0.1.0"
description = "Shopman Doorman — Phone-First Authentication"
requires-python = ">=3.12"
dependencies = [
    "Django>=6.0,<6.1",
]

[project.optional-dependencies]
guestman = [
    "shopman-guestman>=0.1.0",
]
dev = [
    "pytest>=8.0",
    "pytest-django>=4.5",
]

[tool.setuptools.packages.find]
include = ["shopman.doorman*"]

# Embarca templates/static/locale no build (sem isto o setuptools instala só os .py).
[tool.setuptools.package-data]
"*" = ["templates/**/*", "static/**/*", "locale/**/*.mo"]

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "doorman_test_settings"
pythonpath = [".", "../guestman", "../utils"]
