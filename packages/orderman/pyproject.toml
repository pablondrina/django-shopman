[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "shopman-orderman"
version = "0.1.0"
description = "Shopman Orderman — Omnichannel Order Kernel"
requires-python = ">=3.12"
dependencies = [
    "Django>=6.0,<6.1",
    "shopman-utils>=0.3.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-django>=4.5",
]

[tool.setuptools.packages.find]
include = ["shopman.orderman*"]

# Embarca templates/static/locale no build (pip install ./packages/orderman); sem isto
# o setuptools instala só os .py e o Admin quebra com TemplateDoesNotExist no deploy.
[tool.setuptools.package-data]
"*" = ["templates/**/*", "static/**/*", "locale/**/*.mo"]

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "orderman_test_settings"
pythonpath = [".", "../utils", "../refs"]
