[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "shopman-offerman"
version = "0.3.0"
description = "Shopman Offerman — Product Catalog"
requires-python = ">=3.12"
dependencies = [
    "Django>=6.0,<6.1",
    "shopman-utils>=0.3.0",
    "django-taggit>=6.1,<7.0",
    "django-simple-history>=3.11,<4.0",
]

[project.optional-dependencies]
api = [
    "djangorestframework>=3.17,<4.0",
    "django-filter>=25.2,<26.0",
]
import_export = [
    "django-import-export>=4.4,<5.0",
]
unfold = [
    "django-unfold>=0.92,<0.93",
    "django-import-export>=4.4,<5.0",
]
dev = [
    "pytest>=8.0",
    "pytest-django>=4.5",
    "djangorestframework>=3.17,<4.0",
    "django-filter>=25.2,<26.0",
    "django-import-export>=4.4,<5.0",
]

[tool.setuptools.packages.find]
include = ["shopman.offerman*"]

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "offerman_test_settings"
pythonpath = [".", "../utils"]
