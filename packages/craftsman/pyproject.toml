[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "shopman-craftsman"
version = "0.3.0"
description = "Shopman Craftsman — Production Management (MRP)"
requires-python = ">=3.12"
dependencies = [
    "Django>=6.0,<6.1",
    "shopman-utils",
]

[project.optional-dependencies]
api = [
    "djangorestframework>=3.17,<4.0",
]
unfold = [
    "django-unfold>=0.92,<0.93",
]
dev = [
    "pytest>=8.0",
    "pytest-django>=4.5",
    "djangorestframework>=3.17,<4.0",
]

[tool.setuptools.packages.find]
include = ["shopman.craftsman*"]

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "craftsman_test_settings"
pythonpath = [".", "../utils"]
